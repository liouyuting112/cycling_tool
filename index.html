<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Road Master - 智慧單車導遊 (v12.0 Final)</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Noto+Sans+TC:wght@400;700;900&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --p: #f97316;
            --bg: #0f172a;
            --c: #1e293b;
            --t: #f1f5f9;
            --m: #94a3b8;
            --e: #ef4444;
            --s: #22c55e;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', 'Noto Sans TC', sans-serif;
        }

        body {
            background: var(--bg);
            color: var(--t);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        .ac {
            max-width: 850px;
            margin: 0 auto;
            width: 100%;
            flex: 1;
            padding: 1.5rem;
        }

        header {
            text-align: center;
            padding: 1.5rem 0;
        }

        h1 {
            font-size: 2.8rem;
            color: var(--p);
            font-weight: 900;
            font-style: italic;
            letter-spacing: -2px;
        }

        .v-tag {
            color: var(--m);
            font-size: 0.7rem;
            font-weight: 800;
            letter-spacing: 2px;
        }

        .pw {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 32px;
            padding: 2rem;
            margin-bottom: 2rem;
        }

        .wg {
            margin-bottom: 20px;
        }

        .wg label {
            display: block;
            font-size: 0.75rem;
            font-weight: 900;
            color: var(--p);
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        /* 選或填的標籤樣式 */
        .chips {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 10px;
        }

        .chip {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--m);
            padding: 5px 12px;
            border-radius: 100px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .chip:hover {
            border-color: var(--p);
            color: var(--p);
        }

        .chip.active {
            background: var(--p);
            color: #fff;
            border-color: var(--p);
        }

        .wi {
            width: 100%;
            background: #000;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 16px;
            border-radius: 14px;
            outline: none;
            transition: 0.3s;
            font-size: 1rem;
        }

        .wi:focus {
            border-color: var(--p);
            box-shadow: 0 0 20px rgba(249, 115, 22, 0.1);
        }

        .wb {
            width: 100%;
            background: var(--p);
            color: #fff;
            border: none;
            font-weight: 900;
            border-radius: 14px;
            cursor: pointer;
            height: 55px;
            margin-top: 10px;
            font-size: 1.15rem;
            box-shadow: 0 10px 25px rgba(249, 115, 22, 0.3);
            transition: 0.2s;
        }

        .wb:hover {
            transform: translateY(-3px);
        }

        .da {
            padding-bottom: 140px;
        }

        .rc {
            background: var(--c);
            border-radius: 32px;
            padding: 2.5rem;
            border-left: 8px solid var(--p);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
            animation: sweep 0.6s ease-out;
        }

        .rc h3 {
            margin-bottom: 1.5rem;
            font-size: 1.8rem;
            color: #fff;
        }

        .rc table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 16px;
            overflow: hidden;
        }

        .rc th {
            background: rgba(249, 115, 22, 0.3);
            color: #fff;
            padding: 15px;
            text-align: left;
        }

        .rc td {
            padding: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .iw {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, var(--bg) 95%, transparent);
            padding: 2rem 1.5rem;
            z-index: 1000;
        }

        .ibc {
            max-width: 850px;
            margin: 0 auto;
            display: flex;
            gap: 10px;
            background: rgba(30, 41, 59, 0.95);
            border-radius: 100px;
            padding: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
        }

        .ibc input {
            flex: 1;
            background: transparent;
            border: none;
            color: #fff;
            padding: 0 25px;
            outline: none;
            font-size: 1.1rem;
        }

        .ibc button {
            background: var(--p);
            border: none;
            color: #fff;
            border-radius: 100px;
            padding: 0 30px;
            font-weight: 900;
            cursor: pointer;
            height: 48px;
        }

        /* 除錯小工具 */
        .debug-panel {
            margin-top: 15px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 12px;
            font-size: 0.75rem;
            border: 1px dashed rgba(255, 255, 255, 0.1);
        }

        .url-input {
            background: #000;
            border: 1px solid #333;
            color: #0f0;
            padding: 5px 10px;
            width: 100%;
            font-family: monospace;
            border-radius: 5px;
            margin-top: 5px;
        }

        @keyframes sweep {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <div class="ac">
        <header>
            <h1>Road Master ⚡</h1>
            <p class="v-tag">ULTIMATE SECURITY VERSION 12.0</p>
        </header>

        <div class="pw">
            <!-- 起點 -->
            <div class="wg">
                <label>起點區域</label>
                <div class="chips">
                    <span class="chip" onclick="setV('sp','台北')">台北</span>
                    <span class="chip" onclick="setV('sp','桃園')">桃園</span>
                    <span class="chip" onclick="setV('sp','台中')">台中</span>
                    <span class="chip" onclick="setV('sp','高雄')">高雄</span>
                </div>
                <input type="text" id="sp" class="wi" placeholder="或手動輸入...">
            </div>

            <!-- 終點 -->
            <div class="wg">
                <label>終點目標</label>
                <div class="chips">
                    <span class="chip" onclick="setV('ep','花蓮')">花蓮</span>
                    <span class="chip" onclick="setV('ep','墾丁')">墾丁</span>
                    <span class="chip" onclick="setV('ep','逆風環島')">環島</span>
                    <span class="chip" onclick="setV('ep','台東')">台東</span>
                </div>
                <input type="text" id="ep" class="wi" placeholder="或手動輸入...">
            </div>

            <!-- 天數 -->
            <div class="wg">
                <label>行程天數</label>
                <div class="chips">
                    <span class="chip" onclick="setV('du','1天')">1天</span>
                    <span class="chip" onclick="setV('du','3天')">3天</span>
                    <span class="chip" onclick="setV('du','7天')">7天</span>
                    <span class="chip" onclick="setV('du','環島9天')">環島</span>
                </div>
                <input type="text" id="du" class="wi" placeholder="或手動輸入...">
            </div>

            <button class="wb" onclick="_gp()">⚡ 生成精準規劃小卡</button>

            <!-- 手動填寫 Cloudflare URL (如果自動抓失敗) -->
            <div class="debug-panel">
                <label style="color:var(--m);font-size:0.6rem;">🛡️ CLOUDFLARE GATEWAY URL (自動抓取失敗時可手動修正)</label>
                <input type="text" id="gw-url" class="url-input"
                    value="https://hidden-surf-0579.love7053150.workers.dev/">
            </div>
        </div>

        <div id="ca" class="da">
            <div class="rc">
                <h3>🚵 v12.0 全功能解鎖</h3>
                <p>1. 已支援「選或填」快速輸入。</p>
                <p>2. 已鎖定您的 Cloudflare 保險箱。</p>
                <p id="setup-msg" style="color:var(--p);margin-top:15px;font-weight:900;">連線中...</p>
            </div>
        </div>

        <div class="iw">
            <div class="ibc">
                <input type="text" id="ui" placeholder="或是問任何單車問題..." onkeypress="if(event.keyCode===13)_sm()">
                <button onclick="_sm()">發送</button>
            </div>
        </div>
    </div>

    <script>
        (function () {
            let _busy = false;

            window.setV = (id, v) => {
                document.getElementById(id).value = v;
                // 視覺回饋
                event.target.parentElement.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
                event.target.classList.add('active');
            };

            window._am = (r, c) => {
                const a = document.getElementById('ca');
                const d = document.createElement('div');
                if (r === 'ai') d.innerHTML = `<div class="rc"><h3>🔍 規劃結果產出</h3>${marked.parse(c)}</div>`;
                else d.innerHTML = `<p style="text-align:center;padding:20px;color:var(--e);font-weight:900;">${c}</p>`;
                a.appendChild(d);
                window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
            };

            window._gp = () => {
                const s = document.getElementById('sp').value, e = document.getElementById('ep').value, d = document.getElementById('du').value;
                if (!s || !e || !d) return alert("請填寫起點、終點與天數");
                window._sm(`請直接產出行程 Markdown 表格。起點：${s}，終點：${e}，天數：${d}。嚴禁廢話。`);
            };

            window._sm = async (ot = null) => {
                const i = document.getElementById('ui');
                const t = ot || i.value.trim();
                const gw = document.getElementById('gw-url').value.trim();
                if (!t || _busy) return;
                _busy = true; if (!ot) i.value = '';
                document.getElementById('ca').innerHTML = '<p style="text-align:center;padding:80px;color:var(--p);">🚀 透過 Cloudflare 密鑰保險箱計算中...</p>';

                try {
                    const res = await fetch(gw, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: t }] }] })
                    });

                    if (!res.ok) {
                        const errData = await res.json();
                        throw new Error(errData.error || "Server Error");
                    }

                    const data = await res.json();
                    document.getElementById('ca').innerHTML = '';
                    if (data.candidates?.[0]?.content?.parts?.[0]?.text) {
                        window._am('ai', data.candidates[0].content.parts[0].text);
                    } else {
                        window._am('error', "產出失敗，請檢查 Cloudflare 的 API_KEY 是否正確設定。");
                    }
                } catch (e) {
                    window._am('error', `❌ 連線失敗: ${e.message}<br><br>請確認您的 Cloudflare Worker 網址正確無誤，且已點擊 Save and Deploy。`);
                } finally { _busy = false; }
            };

            // 啟動連線測試
            const gw = document.getElementById('gw-url').value;
            fetch(gw, { method: 'OPTIONS' }).then(r => {
                if (r.ok) document.getElementById('setup-msg').innerHTML = "✅ 通訊正常：Cloudflare 保險箱已成功解鎖！";
            }).catch(e => {
                document.getElementById('setup-msg').innerHTML = "❌ 連線異常：請確認下方手動輸入的 Cloudflare URL 是否正確。";
            });
        })();
    </script>
</body>

</html>
