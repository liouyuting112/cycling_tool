<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Road Master - 智慧單車規劃助理 (v6.1)</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Noto+Sans+TC:wght@400;700;900&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="security-v3.js?v=6.1"></script>
    <style>
        :root {
            --p: #f97316;
            --bg: #0f172a;
            --c: #1e293b;
            --t: #f1f5f9;
            --m: #94a3b8;
            --d: #ff4757;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', 'Noto Sans TC', sans-serif;
        }

        body {
            background: var(--bg);
            color: var(--t);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .ac {
            max-width: 850px;
            margin: 0 auto;
            width: 100%;
            flex: 1;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
        }

        header {
            text-align: center;
            margin-bottom: 2rem;
        }

        h1 {
            font-size: 2.5rem;
            color: var(--p);
            font-weight: 900;
            font-style: italic;
            letter-spacing: -2px;
        }

        .tg {
            color: var(--m);
            font-size: 0.75rem;
            letter-spacing: 2px;
            font-weight: 800;
            margin-top: 5px;
        }

        .pw {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .wg label {
            display: block;
            font-size: 0.75rem;
            font-weight: 900;
            color: var(--p);
            margin-bottom: 8px;
        }

        .wi {
            width: 100%;
            background: #000;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 14px;
            border-radius: 12px;
            font-size: 1rem;
            outline: none;
        }

        .wi:focus {
            border-color: var(--p);
        }

        .wb {
            background: var(--p);
            color: #fff;
            border: none;
            font-weight: 900;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
            height: 50px;
            margin-top: 25px;
            font-size: 1rem;
            box-shadow: 0 10px 20px rgba(249, 115, 22, 0.2);
        }

        .wb:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(249, 115, 22, 0.4);
        }

        .da {
            flex: 1;
            padding-bottom: 140px;
        }

        .rc {
            background: var(--c);
            border-radius: 28px;
            padding: 2rem;
            border-left: 6px solid var(--p);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            animation: fadeIn 0.5s ease-out;
        }

        .rc h3 {
            margin-bottom: 1.5rem;
            font-size: 1.6rem;
            color: #fff;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 10px;
        }

        .rc p,
        .rc li {
            line-height: 1.8;
        }

        .rc table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            overflow: hidden;
        }

        .rc th {
            background: rgba(249, 115, 22, 0.3);
            color: #fff;
            padding: 15px;
            text-align: left;
            font-size: 0.85rem;
        }

        .rc td {
            padding: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 1rem;
        }

        .iw {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, var(--bg) 90%, transparent);
            padding: 2rem 1rem;
            z-index: 100;
        }

        .ibc {
            max-width: 850px;
            margin: 0 auto;
            display: flex;
            gap: 10px;
            background: rgba(30, 41, 59, 0.95);
            border-radius: 100px;
            padding: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
        }

        .ibc input {
            flex: 1;
            background: transparent;
            border: none;
            color: #fff;
            padding: 0 25px;
            outline: none;
            font-size: 1.1rem;
        }

        .ibc button {
            background: var(--p);
            border: none;
            color: #fff;
            border-radius: 100px;
            padding: 0 30px;
            font-weight: 900;
            cursor: pointer;
            height: 48px;
        }

        .tp {
            display: flex;
            gap: 8px;
            justify-content: center;
            padding: 50px;
        }

        .tp span {
            width: 12px;
            height: 12px;
            background: var(--p);
            border-radius: 50%;
            animation: bn 1s infinite alternate;
        }

        @keyframes bn {
            from {
                opacity: 0.2;
                transform: scale(0.8);
            }

            to {
                opacity: 1;
                transform: scale(1.2);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .st {
            text-align: center;
            font-size: 0.65rem;
            color: var(--m);
            letter-spacing: 2px;
            margin-bottom: 8px;
            font-weight: 900;
        }
    </style>
</head>

<body>
    <div class="ac">
        <header>
            <h1>Road Master ⚡</h1>
            <p class="tg">智慧單車導遊 · 自動規劃版 v6.1</p>
        </header>

        <div class="pw">
            <div class="wg"><label>起點區域</label><input type="text" id="sp" class="wi" placeholder="例如：台北"></div>
            <div class="wg"><label>最終目標</label><input type="text" id="ep" class="wi" placeholder="例如：高雄"></div>
            <div class="wg"><label>天數安排</label><input type="text" id="du" class="wi" placeholder="例如：5天"></div>
            <button class="wb" onclick="_gp()">⚡ 一鍵自動規劃</button>
        </div>

        <div class="da" id="ca">
            <div class="rc">
                <h3>🚵 v6.1 行程系統就緒</h3>
                <p>填寫起點、終點和天數，按下按鈕即可自動產出完整行程表。AI 不會問您問題，而是直接為您規劃。</p>
            </div>
        </div>

        <div class="iw">
            <div class="st">v6.1 ENCRYPTED TUNNEL ACTIVE</div>
            <div class="ibc">
                <input type="text" id="ui" placeholder="或是直接問單車問題..." onkeypress="if(event.keyCode===13)_sm()">
                <button onclick="_sm()">發送</button>
            </div>
        </div>
    </div>

    <script>
        (function () {
            if (typeof _SECURITY_CORE === 'undefined' || !_SECURITY_CORE.isAuthorized) {
                document.getElementById('ca').innerHTML = '<p style="color:var(--d);text-align:center;padding:2rem;">🔒 未授權的網域</p>';
                return;
            }

            const _k = _SECURITY_CORE.getKey();
            let _busy = false;
            let _model = null;

            function _show(type, content) {
                const a = document.getElementById('ca');
                const d = document.createElement('div');
                if (type === 'ai') {
                    d.innerHTML = '<div class="rc"><h3>🗺️ 自動行程規劃</h3>' + marked.parse(content) + '</div>';
                } else {
                    d.innerHTML = '<p style="text-align:center;padding:20px;color:var(--d);font-size:0.9rem;">' + content + '</p>';
                }
                a.appendChild(d);
                window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
            }

            window._gp = function () {
                var s = document.getElementById('sp').value;
                var e = document.getElementById('ep').value;
                var d = document.getElementById('du').value;
                if (!s || !e || !d) return alert("請填妥行程資料");
                // 嚴格指令：禁止 AI 提問，必須直接產出行程
                var prompt = "你是一個全自動單車行程產生器。規則：1.嚴禁提問 2.嚴禁寒暄 3.嚴禁說前言 4.必須直接輸出完整行程。" +
                    "請為以下需求直接產出一份詳細的單車行程規劃（含 Markdown 表格）：" +
                    "起點：" + s + "，終點：" + e + "，天數：" + d + "。" +
                    "表格需包含：日期、出發地、目的地、距離（km）、預計騎乘時間、沿途景點、住宿建議。";
                _send(prompt);
            };

            window._sm = function () {
                var i = document.getElementById('ui');
                var t = i.value.trim();
                if (!t) return;
                i.value = '';
                // 一般問題也加上指令，不要反問
                var prompt = "你是單車專家。規則：嚴禁提問、嚴禁寒暄，直接回答。問題：" + t;
                _send(prompt);
            };

            async function _findModel() {
                try {
                    var r = await fetch('https://generativelanguage.googleapis.com/v1beta/models?key=' + _k);
                    var d = await r.json();
                    if (d.models) {
                        var m = d.models.find(function (it) {
                            return it.supportedGenerationMethods && it.supportedGenerationMethods.indexOf('generateContent') !== -1;
                        });
                        if (m) return m.name;
                    }
                } catch (e) { console.error('Model probe failed:', e); }
                return 'models/gemini-pro';
            }

            async function _send(text) {
                if (_busy) return;
                _busy = true;
                document.getElementById('ca').innerHTML = '';
                var tph = document.createElement('div');
                tph.id = 'ti'; tph.className = 'tp';
                tph.innerHTML = '<span></span><span></span><span></span>';
                document.getElementById('ca').appendChild(tph);

                try {
                    // 第一次呼叫時，先偵測可用模型
                    if (!_model) {
                        _model = await _findModel();
                        console.log('[v6.1] Auto-detected model:', _model);
                    }

                    var url = 'https://generativelanguage.googleapis.com/v1beta/' + _model + ':generateContent?key=' + _k;
                    var res = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: text }] }] })
                    });

                    var data = await res.json();
                    if (document.getElementById('ti')) document.getElementById('ti').remove();

                    if (res.ok && data.candidates && data.candidates[0] && data.candidates[0].content) {
                        _show('ai', data.candidates[0].content.parts[0].text);
                    } else {
                        var errMsg = (data.error && data.error.message) ? data.error.message : '未知錯誤';
                        _show('error', '❌ 錯誤 [' + res.status + ']: ' + errMsg);
                        _model = null; // 下次重新偵測
                    }
                } catch (e) {
                    if (document.getElementById('ti')) document.getElementById('ti').remove();
                    _show('error', '❌ 連線失敗: ' + e.message);
                    _model = null;
                }
                _busy = false;
            }
        })();
    </script>
</body>

</html>
