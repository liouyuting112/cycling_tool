<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Road Master - 智慧單車規劃助理 (v3.9)</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Noto+Sans+TC:wght@400;700;900&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="security-v3.js?v=3.9"></script>
    <style>
        :root {
            --p: #f97316;
            --bg: #0f172a;
            --c: #1e293b;
            --t: #f1f5f9;
            --m: #94a3b8;
            --d: #ff4757;
            --blu: #3b82f6;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', 'Noto Sans TC', sans-serif;
        }

        body {
            background: var(--bg);
            color: var(--t);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .ac {
            max-width: 850px;
            margin: 0 auto;
            width: 100%;
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 1rem;
        }

        header {
            text-align: center;
            margin: 1.5rem 0;
        }

        h1 {
            font-size: 2.2rem;
            color: var(--p);
            font-weight: 900;
            letter-spacing: -2px;
            font-style: italic;
        }

        .tg {
            font-size: 0.7rem;
            color: var(--m);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 800;
            display: block;
            margin-top: 5px;
        }

        .pw {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 1.2rem;
            margin-bottom: 1rem;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 12px;
        }

        .wg {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .wg label {
            font-size: 0.75rem;
            font-weight: 900;
            color: var(--p);
            padding-left: 5px;
            opacity: 0.8;
        }

        .wi {
            background: #111827;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 0.9rem;
            outline: none;
        }

        .wb {
            background: var(--p);
            border: none;
            color: #fff;
            font-weight: 900;
            border-radius: 12px;
            cursor: pointer;
            height: 44px;
            margin-top: 22px;
            transition: 0.2s;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-bottom: 1.5rem;
        }

        .rnd-btn {
            background: #334155;
            color: #fff;
            border: none;
            padding: 10px 15px;
            border-radius: 10px;
            font-weight: 800;
            font-size: 0.75rem;
            cursor: pointer;
        }

        .diag-btn {
            background: var(--blu);
            color: #fff;
            border: none;
            padding: 10px 15px;
            border-radius: 10px;
            font-weight: 800;
            font-size: 0.75rem;
            cursor: pointer;
        }

        .da {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            padding-bottom: 140px;
        }

        .msg {
            width: 100%;
            animation: si 0.3s ease-out;
        }

        .msg.user {
            text-align: right;
        }

        .msg.user .bubble {
            display: inline-block;
            background: var(--p);
            color: #fff;
            padding: 0.8rem 1.4rem;
            border-radius: 20px 20px 4px 20px;
            font-weight: 800;
        }

        .rc {
            background: var(--c);
            border-radius: 28px;
            padding: 1.8rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
            border-left: 6px solid var(--p);
        }

        .rc h3 {
            color: #fff;
            font-size: 1.4rem;
            font-weight: 900;
            margin-bottom: 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 10px;
        }

        .rc table {
            width: 100%;
            border-collapse: collapse;
            margin: 1rem 0;
            border-radius: 12px;
            overflow: hidden;
            background: rgba(0, 0, 0, 0.2);
        }

        .rc th {
            background: rgba(249, 115, 22, 0.2);
            color: var(--p);
            text-align: left;
            padding: 12px;
            font-size: 0.8rem;
        }

        .rc td {
            padding: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 0.9rem;
            font-weight: 600;
        }

        .iw {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, var(--bg) 90%, transparent);
            padding: 1.5rem 1rem 2rem;
            z-index: 100;
        }

        .ibc {
            max-width: 850px;
            margin: 0 auto;
            width: 100%;
        }

        .ib {
            background: rgba(30, 41, 59, 0.9);
            border-radius: 100px;
            padding: 8px;
            display: flex;
            gap: 10px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 0 1.5rem;
            color: #fff;
            font-size: 1rem;
            outline: none;
            font-weight: 600;
        }

        .sb {
            background: var(--p);
            border: none;
            padding: 0 25px;
            border-radius: 100px;
            cursor: pointer;
            font-weight: 900;
            color: #fff;
            height: 44px;
        }

        .st {
            text-align: center;
            font-size: 0.65rem;
            color: var(--m);
            margin-bottom: 0.5rem;
            font-weight: 800;
            letter-spacing: 1px;
        }

        .tp {
            display: flex;
            gap: 5px;
            padding: 1rem;
            justify-content: center;
        }

        .tp span {
            width: 6px;
            height: 6px;
            background: var(--p);
            border-radius: 50%;
            animation: bn 1.2s infinite;
        }

        @keyframes bn {

            0%,
            100% {
                transform: scale(0.5);
                opacity: 0.3;
            }

            40% {
                transform: scale(1.1);
                opacity: 1;
            }
        }

        @keyframes si {
            from {
                opacity: 0;
                transform: translateY(15px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .lo {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--bg);
            z-index: 999;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            text-align: center;
            padding: 2rem;
        }
    </style>
</head>

<body>
    <div class="lo" id="lock" style="display:none">
        <h2 style="color:var(--d);margin-bottom:1rem">🔒 授權鎖定中</h2>
        <p style="color:var(--m)">Security v3.9 | AI Studio Auto-Discovery</p>
    </div>

    <div class="ac" id="main">
        <header>
            <h1>Road Master ⚡</h1>
            <p class="tg">智慧單車規畫師 · 安全加固版 v3.9</p>
        </header>

        <div class="pw">
            <div class="wg"><label>起點區域</label><input type="text" id="sp" class="wi" placeholder="例如：台北"></div>
            <div class="wg"><label>目標終點</label><input type="text" id="ep" class="wi" placeholder="例如：100公里"></div>
            <div class="wg"><label>天數/強度</label><input type="text" id="du" class="wi" placeholder="例如：2天"></div>
            <button class="wb" onclick="_gp()">生成規劃小卡</button>
        </div>

        <div class="btn-group">
            <button class="diag-btn" onclick="_diag()">🔍 檢查 API 金鑰健康度</button>
            <button class="rnd-btn" onclick="_rnd()">🎲 隨機推薦行程</button>
        </div>

        <div class="da" id="ca">
            <div class="rc">
                <h3>🛡️ v3.9 自動偵測版</h3>
                <p>本版本會自動偵測您的金鑰權限，並精準匹配對應的 AI 線路。請點擊「生成規劃小卡」開始測試。</p>
            </div>
        </div>

        <div class="iw">
            <div class="st" id="as">Connected: Auto-Adapting AI Studio (v3.9)</div>
            <div class="ibc">
                <div class="ib">
                    <input type="text" id="ui" placeholder="輸入單車需求..." onkeypress="if(event.keyCode===13)_sm()">
                    <button class="sb" id="sn" onclick="_sm()">發送</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        (function () {
            if (typeof _SECURITY_CORE === 'undefined' || !_SECURITY_CORE.isAuthorized) {
                document.getElementById('lock').style.display = 'flex';
                document.getElementById('main').style.display = 'none';
                return;
            }

            const _k = _SECURITY_CORE.getKey();
            let _busy = false;
            let _cachedModels = null;

            window._am = (r, c) => {
                const a = document.getElementById('ca');
                const d = document.createElement('div');
                d.className = 'msg ' + r;
                if (r === 'user') d.innerHTML = `<div class="bubble">${c}</div>`;
                else if (r === 'ai') d.innerHTML = `<div class="rc"><h3>顧問規劃建議</h3>${marked.parse(c)}</div>`;
                else d.innerHTML = `<div style="text-align:center;color:var(--d);font-size:0.8rem;font-weight:900;background:rgba(255,71,87,0.1);padding:1rem;border-radius:12px;">${c}</div>`;
                a.appendChild(d);
                window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
            };

            window._diag = async () => {
                window._am('user', '正在執行深度環境掃描...');
                try {
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${_k}`);
                    const d = await res.json();
                    if (!res.ok) {
                        window._am('ai', '❌ **金鑰診斷失敗**\n\nGoogle 回報訊息：' + (d.error?.message || "未知錯誤"));
                    } else {
                        _cachedModels = d.models.filter(m => m.supportedGenerationMethods.includes('generateContent')).map(m => m.name);
                        window._am('ai', `✅ **金鑰狀態優良**\n\n探測到可用模型：\n${_cachedModels.map(m => m.split('/').pop()).join(', ')}\n\n系統已完成自動適應，直接點擊生成即可。`);
                    }
                } catch (e) {
                    window._am('ai', '❌ **連線超時**\n\n請確認您的網路是否有攔截 Google API 請求。');
                }
            };

            window._gp = () => {
                const s = document.getElementById('sp').value;
                const e = document.getElementById('ep').value;
                const d = document.getElementById('du').value;
                if (!s || !e || !d) { alert("請填寫所有欄位！"); return; }
                window._sm(`規劃從「${s}」出發，目標「${e}」，預計天數「${d}」。請用 Markdown 表格。`);
            };

            window._rnd = () => {
                const routes = ["兩塔挑戰規劃", "花東海岸規劃", "台北陽明山單日", "台中單車一日遊"];
                window._sm("請針對這個建議提供規劃：" + routes[Math.floor(Math.random() * routes.length)]);
            };

            window._sm = async (ot = null) => {
                const i = document.getElementById('ui');
                const t = ot || i.value.trim();
                if (!t || _busy) return;
                _busy = true;
                if (!ot) i.value = '';
                document.getElementById('ca').innerHTML = '';
                window._am('user', t);

                const tph = document.createElement('div');
                tph.id = 'ti'; tph.className = 'tp'; tph.innerHTML = '<span></span><span></span><span></span>';
                document.getElementById('ca').appendChild(tph);

                // 一、先探測可用模型 (如果還未探測)
                if (!_cachedModels) {
                    try {
                        const dr = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${_k}`);
                        const dd = await dr.json();
                        _cachedModels = dd.models.filter(m => m.supportedGenerationMethods.includes('generateContent')).map(m => m.name);
                    } catch (e) { _cachedModels = ["models/gemini-pro", "models/gemini-1.5-flash"]; }
                }

                // 二、使用探測到的第一個模型路徑
                let ok = false;
                let err = "";

                // 嘗試清單中的前兩個模型
                const testModels = _cachedModels.slice(0, 2);
                for (let mName of testModels) {
                    try {
                        // 強制使用 v1beta 進行調用
                        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/${mName}:generateContent?key=${_k}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                contents: [{ parts: [{ text: "你是單車顧問。用 Markdown 表格規劃行程。需求：" + t }] }]
                            })
                        });
                        const data = await res.json();
                        if (res.ok && data.candidates?.[0]?.content?.parts?.[0]?.text) {
                            if (document.getElementById('ti')) document.getElementById('ti').remove();
                            window._am('ai', data.candidates[0].content.parts[0].text);
                            ok = true; break;
                        } else {
                            err = data.error?.message || "核心拒絕連線";
                        }
                    } catch (e) { err = "連線失敗"; }
                }

                if (!ok) {
                    if (document.getElementById('ti')) document.getElementById('ti').remove();
                    window._am('system', `❌ 核心連線失敗。\n\n**報錯原因：** ${err}\n\n**解決建議：** 請重新整理網頁並點擊藍色 [診斷] 按鈕。`);
                }
                _busy = false;
            };
        })();
    </script>
</body>

</html>
