<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>台灣騎跡</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<style>
:root{
  --bg:#F0F2F5;--sf:#fff;--s2:#F8F9FB;
  --tx:#1A1D23;--t2:#4A5568;--mu:#8896AB;
  --bd:#E4E8EE;--bd2:#D1D8E3;
  --pr:#0D9668;--pl:#D1FAE5;--pd:#047857;--pb:#ECFDF5;
  --ac:#E8920D;--al:#FEF3C7;
  --re:#E53E3E;--rl:#FEE2E2;
  --bl:#3B82F6;--bll:#DBEAFE;
  --pu:#7C3AED;--pul:#EDE9FE;
  --r:12px;--rs:8px;--tr:.2s ease;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--tx);font-size:16px}
button{cursor:pointer;border:none;background:none;font-family:inherit}
input,select{font-family:inherit}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:3px}
#app{display:flex;flex-direction:column;height:100%}

.hdr{height:58px;padding:0 14px;background:var(--sf);border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:8px;flex-shrink:0;z-index:100}
.logo{font-size:18px;font-weight:900;color:var(--pr);white-space:nowrap}
.logo small{font-size:13px;color:var(--mu);font-weight:400;margin-left:3px}
.hdr-mid{flex:1;display:flex;justify-content:center;overflow:hidden}
.stepper{display:flex;gap:4px;align-items:center;font-size:13px;font-weight:600}
.si{display:flex;align-items:center;gap:3px;color:var(--mu);transition:var(--tr)}
.si.on{color:var(--pr)}.si.ok{color:var(--pd)}
.sn{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;border:2px solid var(--bd);transition:var(--tr)}
.si.on .sn{border-color:var(--pr);background:var(--pr);color:#fff}
.si.ok .sn{border-color:var(--pr);background:var(--pl);color:var(--pr)}
.ssep{width:10px;height:2px;background:var(--bd);border-radius:1px}
#hdrX{width:40px;height:40px;border-radius:50%;display:none;align-items:center;justify-content:center;font-size:18px;color:#fff;background:var(--re);flex-shrink:0;font-weight:bold}
#hdrX.on{display:flex}

.scr{flex:1;overflow:hidden;display:none;flex-direction:column}
.scr.on{display:flex}

#hero{align-items:center;justify-content:center;text-align:center;padding:24px 18px;gap:14px;background:linear-gradient(160deg,#ECFDF5,#F0F2F5)}
#hero h1{font-size:clamp(28px,7vw,44px);font-weight:900;background:linear-gradient(135deg,var(--pr),#3B82F6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
#hero p{font-size:16px;color:var(--t2);max-width:340px;line-height:1.7}
.fg3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;width:100%;max-width:320px}
.fi{background:var(--sf);border-radius:var(--r);border:1px solid var(--bd);padding:12px 4px;display:flex;flex-direction:column;align-items:center;gap:4px;font-size:13px;font-weight:600;color:var(--t2)}
.fi span{font-size:22px}
.hbtn{background:linear-gradient(135deg,var(--pr),#10B981);color:#fff;padding:16px 0;border-radius:var(--r);font-size:17px;font-weight:700;box-shadow:0 4px 18px rgba(13,150,104,.3);width:100%;max-width:300px}
.hres{font-size:15px;color:var(--pr);text-decoration:underline;cursor:pointer;display:none}

#wiz{overflow-y:auto;padding:14px;background:var(--bg);align-items:center}
.wk{background:var(--sf);width:100%;max-width:440px;border-radius:var(--r);box-shadow:0 4px 16px rgba(0,0,0,.08);padding:18px;display:none;flex-direction:column;gap:13px}
.wk.on{display:flex}
.wt{font-size:20px;font-weight:900}
.wd{font-size:15px;color:var(--t2);line-height:1.5}
.fg{display:flex;flex-direction:column;gap:6px}
.fl{font-size:15px;font-weight:700;color:var(--tx)}
select,input[type=number],input[type=text]{padding:11px 12px;border:2px solid var(--bd);border-radius:var(--rs);font-size:15px;outline:none;width:100%;background:var(--sf)}
select:focus,input:focus{border-color:var(--pr)}
.cg{display:flex;flex-wrap:wrap;gap:8px}
.ch{padding:10px 16px;border:2px solid var(--bd);border-radius:18px;font-size:14px;font-weight:500;color:var(--t2);min-height:42px;display:flex;align-items:center}
.ch.on{border-color:var(--pr);background:var(--pl);color:var(--pd);font-weight:700}
.hint{font-size:13px;color:var(--mu)}.hint.g{color:var(--pr)}
.wrow{display:flex;gap:8px}
.wnx{flex:1;background:linear-gradient(135deg,var(--pr),#10B981);color:#fff;padding:14px;border-radius:var(--rs);font-size:15px;font-weight:700;text-align:center}
.wbk{padding:14px 16px;border-radius:var(--rs);font-size:15px;font-weight:700;color:var(--t2);border:2px solid var(--bd)}

#work{position:relative}
#mapW{position:absolute;inset:0;z-index:0}
#map{width:100%;height:100%}

.mfabs{position:absolute;top:10px;left:10px;z-index:5;display:flex;flex-direction:column;gap:6px}
@media(min-width:769px){.mfabs{left:358px}}
.mfab{background:var(--sf);border:1px solid var(--bd);border-radius:var(--rs);padding:9px 14px;font-size:14px;font-weight:700;color:var(--t2);box-shadow:0 2px 8px rgba(0,0,0,.1)}

/* ===== 篩選按鈕列 - 顯示在地圖頂部中央，明顯位置 ===== */
.filter-bar{
  position:absolute;
  top:12px;
  left:50%;
  transform:translateX(-50%);
  z-index:8;
  display:none;
  gap:8px;
  background:rgba(255,255,255,0.97);
  padding:10px 16px;
  border-radius:28px;
  box-shadow:0 4px 18px rgba(0,0,0,.22);
  max-width:90%;
  overflow-x:auto;
  white-space:nowrap;
  align-items:center;
}
.filter-bar.on{display:flex}
.fbtn{
  background:var(--s2);
  border:2px solid var(--bd);
  border-radius:18px;
  padding:8px 16px;
  font-size:14px;
  font-weight:700;
  color:var(--t2);
  white-space:nowrap;
  flex-shrink:0;
  transition:var(--tr);
}
.fbtn.on{background:var(--pr);color:#fff;border-color:var(--pr)}
.filter-label{font-size:13px;font-weight:700;color:var(--mu);white-space:nowrap;flex-shrink:0}

/* POI列表 */
.poi-list{position:absolute;bottom:10px;right:10px;z-index:5;background:var(--sf);border-radius:var(--rs);box-shadow:0 2px 12px rgba(0,0,0,.15);max-width:250px;max-height:240px;overflow-y:auto;display:none}
.poi-list.on{display:block}
.poi-list-header{padding:10px 12px;border-bottom:1px solid var(--bd);font-size:14px;font-weight:700;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:var(--sf)}
.poi-list-close{width:26px;height:26px;display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--mu);cursor:pointer}
.poi-item{padding:10px 12px;border-bottom:1px solid var(--bd);cursor:pointer;font-size:14px;display:flex;align-items:center;gap:8px}
.poi-item:hover{background:var(--pb)}
.poi-num{width:26px;height:26px;border-radius:50%;background:var(--bl);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.poi-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.poi-est{font-size:12px;color:var(--pr);flex-shrink:0;font-weight:700}

.sht{position:absolute;bottom:0;left:0;right:0;z-index:10;background:var(--sf);border-radius:16px 16px 0 0;box-shadow:0 -3px 18px rgba(0,0,0,.11);display:flex;flex-direction:column;transition:height .3s}
.sht.sm{height:100px}.sht.md{height:52%}.sht.lg{height:86%}
@media(min-width:769px){
  .sht{top:0;left:0;bottom:0;right:auto;width:360px;border-radius:0;height:auto!important}
  #mapW{left:360px}
  .dgh{display:none}
}

.dgh{height:28px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.dgp{width:36px;height:4px;background:var(--bd2);border-radius:2px}

.ph{padding:0 12px 10px;flex-shrink:0}
.ptr{display:flex;align-items:center;gap:6px}
.ptl{font-size:17px;font-weight:900;flex:1}
.hb{font-size:14px;font-weight:700;padding:7px 11px;border-radius:var(--rs);min-height:34px;display:flex;align-items:center}
.hb.un{color:var(--pr);border:1px solid var(--pl)}
.hb.se{color:#fff;background:var(--bl);border:none}
.hb.sh{color:#fff;background:#7c3aed;border:none}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:8px}
.sc{background:var(--s2);border:1px solid var(--bd);border-radius:var(--rs);padding:8px 10px}
.sl{font-size:13px;color:var(--mu);font-weight:700}
.sv{font-family:'JetBrains Mono',monospace;font-size:17px;font-weight:700;margin-top:2px}
.sv.ok{color:var(--pr)}.sv.no{color:var(--re)}
.sv2{font-size:13px;font-weight:600;margin-top:3px;color:var(--mu)}

.il{flex:1;overflow-y:auto;padding:6px 10px}

.dc{border:1px solid var(--bd);border-radius:var(--r);margin-bottom:8px;background:var(--sf);overflow:hidden}
.dc.act{border-color:var(--pr);box-shadow:0 0 0 2px var(--pl)}
.dh{padding:12px 10px;display:flex;align-items:center;cursor:pointer;gap:8px;min-height:56px}
.dnum{width:32px;height:32px;border-radius:50%;background:var(--pb);color:var(--pd);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;flex-shrink:0;border:2px solid var(--pl)}
.dc.act .dnum{background:var(--pr);color:#fff;border-color:var(--pr)}
.dinfo{flex:1;min-width:0}
.drt{font-weight:800;font-size:15px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dmt{font-size:13px;color:var(--mu);margin-top:2px}
.darr{font-size:12px;color:var(--mu);transition:transform .25s}
.dc.op .darr{transform:rotate(180deg)}

.db{max-height:0;overflow:hidden;transition:max-height .3s}
.dc.op .db{max-height:2000px}
.dbi{padding:6px 8px;display:flex;flex-direction:column;gap:5px}

.pc{background:var(--s2);border-radius:var(--rs);padding:10px;display:flex;align-items:center;gap:8px;min-height:50px}
.pci{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.pci.a{background:var(--al)}.pci.f{background:var(--bll)}.pci.p{background:var(--pul)}
.pcin{flex:1;min-width:0}
.pcn{font-weight:700;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pcm{font-size:12px;color:var(--mu);margin-top:4px;display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.pcm .pct{color:var(--mu)}
.pcm a.nav-btn{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:20px;font-size:12px;font-weight:700;text-decoration:none;background:#1a73e8;color:#fff;white-space:nowrap}
.pcm a.nav-btn:active{opacity:.85}
.pcm a.srch-btn{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:20px;font-size:12px;font-weight:700;text-decoration:none;background:var(--sf);color:var(--tx);border:1px solid var(--bd);white-space:nowrap}
.pdl{width:30px;height:30px;display:flex;align-items:center;justify-content:center;border-radius:8px;font-size:14px;color:var(--mu);border:1px solid var(--bd);background:var(--sf);flex-shrink:0}
.empty-hint{background:var(--sf);border:1.5px dashed var(--bd);border-radius:10px;padding:12px 14px;margin:6px 0 8px}

.da{padding:5px 2px 6px;display:grid;grid-template-columns:repeat(4,1fr);gap:5px}
.dab{padding:10px 2px;font-size:13px;font-weight:700;border-radius:8px;text-align:center;border:2px solid;min-height:44px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-direction:column;gap:2px}
.dab.a{background:#FFFBEB;border-color:#FCD34D;color:#92400E}
.dab.f{background:#EFF6FF;border-color:#93C5FD;color:#1E40AF}
.dab.p{background:var(--pb);border-color:#86EFAC;color:#166534}
.dab.e{background:#1a73e8;border-color:#1a73e8;color:#fff}
.dab.loading{opacity:.7;pointer-events:none;position:relative}
.dab.loading::after{content:'';position:absolute;top:50%;left:50%;width:16px;height:16px;margin:-8px 0 0 -8px;border:2px solid currentColor;border-top-color:transparent;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.pf{padding:8px 10px;border-top:1px solid var(--bd);display:flex;gap:6px;flex-shrink:0}
.pfb{flex:1;padding:12px 4px;border-radius:var(--rs);font-weight:700;text-align:center;font-size:14px;min-height:44px;display:flex;align-items:center;justify-content:center}
.pfb.pri{background:linear-gradient(135deg,var(--pr),#10B981);color:#fff}
.pfb.sec{background:var(--s2);color:var(--tx);border:1px solid var(--bd)}

.ld{position:fixed;inset:0;background:rgba(255,255,255,.95);z-index:999;display:none;flex-direction:column;align-items:center;justify-content:center}
.ld.on{display:flex}
.sp{width:42px;height:42px;border:4px solid var(--pl);border-top-color:var(--pr);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:14px}
@keyframes spin{to{transform:rotate(360deg)}}
.lt{font-size:16px;font-weight:700;color:var(--pd)}

.mo{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9000;display:none;align-items:center;justify-content:center;padding:16px}
.mo.on{display:flex}
.mb{background:var(--sf);width:100%;max-width:440px;border-radius:var(--r);max-height:85vh;display:flex;flex-direction:column}
.mth{padding:16px 18px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between}
.mtl{font-size:18px;font-weight:900}
.mcl{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;color:#fff;background:var(--re)}
.mbd{padding:16px 18px;overflow-y:auto;flex:1}
.mft{padding:13px 16px;border-top:1px solid var(--bd);display:flex;gap:8px}
.mft .wnx{flex:1;padding:13px}.mft .wbk{text-align:center;padding:13px 18px}

.day-section{border:1.5px solid var(--bd);border-radius:var(--rs);margin-bottom:10px;overflow:hidden;transition:box-shadow .2s}
.day-section.open{border-color:var(--pr);box-shadow:0 0 0 2px rgba(13,150,104,.12)}
.day-header{padding:12px 14px;background:var(--s2);display:flex;align-items:center;justify-content:space-between;cursor:pointer;font-weight:700;font-size:15px;user-select:none;gap:8px}
.day-header:active{background:var(--bd)}
.day-header .dh-left{display:flex;align-items:center;gap:8px;flex:1;min-width:0}
.day-header .dh-arrow{font-size:13px;color:var(--mu);transition:transform .25s;flex-shrink:0}
.day-section.open .dh-arrow{transform:rotate(180deg);color:var(--pr)}
.day-header .total{font-family:'JetBrains Mono',monospace;color:var(--pr);font-size:15px;flex-shrink:0}
.day-body{padding:8px 12px;display:none;border-top:1px solid var(--bd)}
.day-section.open .day-body{display:block}
.place-row{display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid var(--bd)}
.place-row:last-child{border-bottom:none}
.place-row .name{flex:1;font-size:14px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.place-row .est-tag{font-size:12px;color:var(--mu);flex-shrink:0}
.place-row input{width:85px;padding:7px 8px;font-size:14px;text-align:right}

.sr{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--bd);font-size:15px}
.sr span:last-child{font-weight:700;font-family:'JetBrains Mono',monospace}

.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1A1D23;color:#fff;padding:12px 22px;border-radius:10px;font-size:15px;font-weight:600;z-index:99999;pointer-events:none;white-space:nowrap}
.mday{border-radius:50%;border:3px solid #fff;display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;box-shadow:0 3px 10px rgba(0,0,0,.35);cursor:pointer}
@keyframes dayPulse{0%,100%{box-shadow:0 0 0 5px rgba(13,150,104,.45),0 3px 10px rgba(0,0,0,.3)}50%{box-shadow:0 0 0 10px rgba(13,150,104,.15),0 3px 10px rgba(0,0,0,.3)}}
.mday-active{animation:dayPulse 1.8s infinite}
.poi-marker{width:28px;height:28px;border-radius:50%;border:2px solid #fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;box-shadow:0 2px 6px rgba(0,0,0,.3);cursor:pointer}
.leaflet-popup-content-wrapper{border-radius:12px!important;font-family:'Noto Sans TC',sans-serif}
.leaflet-popup-content{margin:12px 14px!important;font-size:14px;line-height:1.6}

.cci{font-weight:800;margin:12px 0 5px;font-size:15px;color:var(--t2)}
.ci{display:flex;align-items:center;gap:8px;padding:10px 0;border-bottom:1px solid var(--bd);font-size:15px}
.ci input[type=checkbox]{width:18px;height:18px;accent-color:var(--pr)}
</style>
</head>
<body>
<div id="app">
<header class="hdr">
  <div class="logo">🚴 台灣騎跡</div>
  <div class="hdr-mid">
    <div class="stepper" id="stp" style="display:none">
      <div class="si on" data-s="1"><div class="sn">1</div>路線</div>
      <div class="ssep"></div><div class="si" data-s="2"><div class="sn">2</div>偏好</div>
      <div class="ssep"></div><div class="si" data-s="3"><div class="sn">3</div>預算</div>
    </div>
  </div>
  <button id="hdrX" onclick="closeWiz()">✕</button>
</header>

<section class="scr on" id="hero">
  <div style="font-size:13px;font-weight:700;color:var(--pd);background:var(--pb);padding:6px 14px;border-radius:18px">🇹🇼 單車旅遊規劃</div>
  <h1>台灣騎跡</h1>
  <p>從火車站出發，智能規劃路線<br>搜尋真實店家，一鍵 Google Maps 導航</p>
  <div class="fg3">
    <div class="fi"><span>🚉</span>從車站出發</div>
    <div class="fi"><span>📍</span>真實店家</div>
    <div class="fi"><span>🧭</span>精準導航</div>
  </div>
  <button class="hbtn" onclick="startWiz()">開始規劃 →</button>
  <div class="hres" id="hres" onclick="loadSaved()">📂 繼續上次行程</div>
</section>

<section class="scr" id="wiz">
  <div class="wk on" id="s1">
    <div><div class="wt">路線規劃</div></div>
    <div class="fg"><label class="fl">出發火車站</label>
      <select id="stSt">
        <option value="taipei">台北車站</option>
        <option value="taoyuan">桃園火車站</option>
        <option value="hsinchu">新竹火車站</option>
        <option value="taichung">台中火車站</option>
        <option value="chiayi">嘉義火車站</option>
        <option value="tainan">台南火車站</option>
        <option value="kaohsiung">高雄火車站</option>
        <option value="pingtung">屏東火車站</option>
        <option value="taitung">台東火車站</option>
        <option value="hualien">花蓮火車站</option>
        <option value="yilan">宜蘭火車站</option>
        <option value="keelung">基隆火車站</option>
      </select>
    </div>
    <div class="fg"><label class="fl">旅行天數</label>
      <div style="display:flex;align-items:center;gap:10px">
        <input type="number" id="daysInput" value="7" min="1" max="21" style="width:90px;font-size:20px;font-weight:700;text-align:center;padding:10px 8px"
          oninput="S.pr.days=Math.max(1,Math.min(21,+this.value||7));syncDayChips()">
        <span style="font-size:15px;color:var(--mu)">天（1–21天）</span>
      </div>
      <div class="cg" id="dC" style="margin-top:6px">
        <button class="ch" onclick="setDays(this,3)">3天</button>
        <button class="ch" onclick="setDays(this,5)">5天</button>
        <button class="ch on" onclick="setDays(this,7)">7天</button>
        <button class="ch" onclick="setDays(this,10)">10天</button>

  {id:'taitung', name:'台東', lat:22.7581, lng:121.1440, city:'台東縣'},

function hav(a,b){const R=6371,dLat=(b.lat-a.lat)*Math.PI/180,dLng=(b.lng-a.lng)*Math.PI/180,x=Math.sin(dLat/2)**2+Math.cos(a.lat*Math.PI/180)*Math.cos(b.lat*Math.PI/180)*Math.sin(dLng/2)**2;return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x))}

// 🧭 導航：search/店名/@緯度,經度,19z（zoom 19 = 約 100m 範圍，幾乎只顯示該店）
// 這是目前最可靠的方式：把地圖中心定在 OSM 座標，然後搜尋店名
// Google Maps 會在那個位置找到最近的符合店家並顯示資訊卡
function gMapsNav(name, lat, lng){
  return `https://www.google.com/maps/search/${encodeURIComponent(name)}/@${lat},${lng},19z`;
}
// 🔍 備用搜尋（無座標限制，適合 Google Maps 資料與 OSM 位置偏差時）
function gMapsSearch(name){
  return `https://www.google.com/maps/search/${encodeURIComponent(name)}`;
}
function gMapsPin(name, lat, lng){ return gMapsNav(name, lat, lng); }

function showMd(id){document.getElementById(id).classList.add('on')}
function hideMd(id){document.getElementById(id).classList.remove('on')}

function toast(m){

}

function initSheet(){
  const sh=document.getElementById('sht'),dh=document.getElementById('dgh');
  const sts=['sm','md','lg'];

    const c=sts.findIndex(s=>sh.classList.contains(s));

async function gen(){
  S.pr.start=document.getElementById('stSt').value;
  S.pr.days=Math.max(1,Math.min(21,+document.getElementById('daysInput').value||7));
  S.pr.budget=+document.getElementById('bgt').value;
  show('work');
  document.getElementById('ld').classList.add('on');

  const sn=NODES.find(n=>n.id===S.pr.start)||NODES[0];
  let shouldRound=S.pr.routeType==='round';
  if(S.pr.routeType==='auto')shouldRound=S.pr.days>=9;

  let route=[];
  let si=RING.findIndex(n=>n.id===sn.id);
  if(si<0)si=0;

  if(shouldRound){
    let stops=[];
    for(let i=0;i<RING.length;i++)stops.push(RING[(si+i)%RING.length]);
    stops.push(RING[si]);
    let cum=[0];
    for(let i=1;i<stops.length;i++)cum.push(cum[i-1]+hav(stops[i-1],stops[i]));
    const tot=cum[cum.length-1],daily=tot/S.pr.days;
    route=[stops[0]];
    let last=0;
    for(let d=1;d<=S.pr.days;d++){
      let best=last+1,bd=Infinity;
      for(let j=last+1;j<stops.length;j++){if(Math.abs(cum[j]-d*daily)<bd){bd=Math.abs(cum[j]-d*daily);best=j}}
      best=Math.max(best,last+1);
      best=Math.min(best,stops.length-1-(S.pr.days-d));
      route.push(stops[best]);last=best;
    }
  } else {
    route=[sn];
    let idx=si;
    const half=Math.ceil(S.pr.days/2);
    for(let d=1;d<=S.pr.days;d++){
      if(d<=half){idx=Math.min(idx+1,RING.length-1);}
      else{idx=Math.max(idx-1,si);}
      route.push(RING[idx]);
    }
    route[route.length-1]=sn;
  }

  S.it=[];S.cost=0;undoStk=[];openDay=-1;
  for(let i=0;i<S.pr.days;i++){
    document.getElementById('ldT').textContent=`Day ${i+1} 規劃中...`;
    const sc=route[i]||sn,ec=route[i+1]||sn;
    S.it.push({day:i+1,start:sc,end:ec,dist:Math.round(hav(sc,ec)*1.3),places:[]});
    await new Promise(r=>setTimeout(r,30));
  }

  document.getElementById('ld').classList.remove('on');
  initMap();renderL();saveLS();
}

function toggleDay(idx){
  openDay=openDay===idx?-1:idx;
  hideFilters();
  closePoiList();
  if(poiL)poiL.clearLayers();
  renderL();

  if(openDay>=0&&map){
    // 展開面板
    const sh=document.getElementById('sht');
    if(sh.classList.contains('sm')){
      sh.classList.remove('sm');
      sh.classList.add('md');
    }
    const d=S.it[openDay];
    const bounds=L.latLngBounds([[d.start.lat,d.start.lng],[d.end.lat,d.end.lng]]);
    (d.places||[]).forEach(p=>bounds.extend([p.lat,p.lng]));
    // 稍延遲確保面板動畫完成後再縮放地圖
    setTimeout(()=>{
      map.invalidateSize();
      map.fitBounds(bounds,{padding:[50,50],maxZoom:13});
    },350);
  }
  drawMap();
}

function renderL(){
  const el=document.getElementById('itL');el.innerHTML='';
  S.cost=0;
  S.it.forEach(d=>(d.places||[]).forEach(p=>{S.cost+=(p.price||0)}));
  document.getElementById('tCost').textContent='$'+S.cost.toLocaleString();
  const mx=S.pr.budget*S.pr.days;
  const bs=document.getElementById('bSt');
  if(S.cost>mx){
    bs.innerHTML='<span style="color:var(--re)">超$'+(S.cost-mx).toLocaleString()+'</span>';
    document.getElementById('tCost').className='sv no';
  }else{
    bs.textContent='剩$'+(mx-S.cost).toLocaleString();
    document.getElementById('tCost').className='sv ok';
  }

  S.it.forEach((d,idx)=>{
    const isO=openDay===idx,np=(d.places||[]).length;
    const c=document.createElement('div');
    c.className='dc'+(isO?' op act':'');

    let ph='';
    (d.places||[]).forEach((p,pi)=>{
      const ic=p.cat==='住宿'?'a':p.cat==='飲食'?'f':'p';
      const em=p.cat==='住宿'?'🛌':p.cat==='飲食'?'🍽️':'📍';
      const pr=p.price?` · 預估$${p.price}`:'';
      ph+=`<div class="pc">
        <div class="pci ${ic}">${em}</div>
        <div class="pcin">
          <div class="pcn">${p.name}</div>
          <div class="pcm"><span class="pct">${p.cat}${pr}</span><a class="nav-btn" href="${gMapsNav(p.name,p.lat,p.lng)}" target="_blank">🧭 導航</a><a class="srch-btn" href="${gMapsSearch(p.name)}" target="_blank">🔍 搜尋</a></div>
        </div>
        <button class="pdl" onclick="event.stopPropagation();dlP(${idx},${pi})" title="移除">✕</button>
      </div>`;
    });

    c.innerHTML=`
      <div class="dh" onclick="toggleDay(${idx})">
        <div class="dnum">${d.day}</div>
        <div class="dinfo">
          <div class="drt">${d.start.name} → ${d.end.name}</div>
          <div class="dmt">${(()=>{
            const hrs = Math.round(d.dist/15*10)/10;
            const warn = hrs>6 ? ' ⚠️' : hrs>8 ? ' 🔴' : '';
            const hc = hrs>6 ? 'color:var(--re)' : 'color:var(--mu)';
            return `約 ${d.dist}km · <span style="${hc};font-weight:700">⏱ ${hrs}h${warn}</span>${np?' · '+np+'個地點':' · 展開新增'}`;
          })()}</div>
        </div>
        <div class="darr">▼</div>
      </div>
      <div class="db"><div class="dbi">
        ${ph}
        <div class="da">
          <button class="dab a" onclick="event.stopPropagation();searchOSM(${idx},'住宿')">🛌<span style="font-size:11px">住宿</span></button>
          <button class="dab f" onclick="event.stopPropagation();searchOSM(${idx},'飲食')">🍽️<span style="font-size:11px">餐廳</span></button>
          <button class="dab p" onclick="event.stopPropagation();searchOSM(${idx},'景點')">📍<span style="font-size:11px">景點</span></button>
          <button class="dab e" onclick="event.stopPropagation();expDay(${idx})" title="開啟 Google 地圖，含當天所有停靠點路線">🗺️<span style="font-size:11px">當天行程</span></button>
        </div>
      </div></div>`;
    el.appendChild(c);
  });
}

function dlP(di,pi){saveU();S.it[di].places.splice(pi,1);renderL();drawMap();saveLS()}
function undo(){if(!undoStk.length)return;const p=JSON.parse(undoStk.pop());S.it=p.it;S.cost=p.cost;renderL();drawMap();saveLS();toast('已復原')}

/* ========== 預估金額 ========== */
function getDefaultPrice(cat, filterType){
  if(cat==='住宿'){
    if(filterType==='飯店')return 2500;
    if(filterType==='民宿')return 1200;
    return 500; // 青旅
  }
  if(cat==='飲食'){
    if(filterType==='超商')return 80;
    if(filterType==='咖啡廳')return 120;
    if(filterType==='素食')return 150;
    return 180; // 一般餐廳
  }
  return 0;
}

/* ========== OSM 搜尋 ========== */
// 儲存搜尋中心點供 filterPOI 使用
let searchCenterLat = 0, searchCenterLng = 0;

// 住宿過濾：排除學生宿舍、月子中心、醫療機構等非旅遊住宿
// 特別處理：清齋/誠齋/忠齋等台灣大學宿舍命名習慣；A棟/B棟等建築編號
const ACC_BAD = /宿舍|學苑|dormitory|月子|產後|護理之家|安養|長照|療養|診所|醫院|齋[A-Z]|齋\d|[A-Za-z]\d?棟|男宿|女宿|學生|學校|大學|學院|書院|國軍|英雄館|軍人|眷村|招待所|little house|公務|員工|職工|會館(?!.*旅)|college|university/i;

async function searchOSM(dayIdx, cat) {
  currentDayIdx = dayIdx;
  currentCat = cat;
  const d = S.it[dayIdx];
  const city = d.end.city || '';

  // 找對應天卡的按鈕，顯示搜尋中狀態
  const catBtnClass = cat==='住宿'?'a':cat==='飲食'?'f':'p';
  const cards = document.querySelectorAll('.dc');
  const btn = cards[dayIdx]?.querySelector(`.dab.${catBtnClass}`);
  const origHTML = btn?.innerHTML;
  if(btn){ btn.classList.add('loading'); btn.innerHTML='<span style="font-size:11px">搜尋中</span>'; }

  // ── 搜尋策略 ──
  // 住宿：只在終點附近 10km（晚上要睡覺的地方）
  // 飲食/景點：在路線的「起點」和「終點」分別搜尋，用 Overpass union 一次撈完
  //            這樣沿整段路線上的店家都能找到
  const accRadius = 10000;
  const routeRadius = 8000;

  let queries = {};
  // nwr = node + way + relation，台灣很多店家是 way（建築面），node 查不到
  if (cat === '住宿') {
    if(S.pr.acc.includes('hostel')) queries['青旅'] = 'nwr["tourism"="hostel"]';
    if(S.pr.acc.includes('hotel'))  queries['飯店'] = 'nwr["tourism"="hotel"]';
    if(S.pr.acc.includes('bnb'))    queries['民宿'] = 'nwr["tourism"="guest_house"]';
    if(!Object.keys(queries).length) queries['住宿'] = 'nwr["tourism"~"hostel|hotel|motel|guest_house"]';
  } else if (cat === '飲食') {
    if(S.pr.diet.includes('all'))         queries['餐廳']  = 'nwr["amenity"="restaurant"]';
    if(S.pr.diet.includes('veg'))         queries['素食']  = 'nwr["diet:vegetarian"="yes"]';
    if(S.pr.diet.includes('cafe'))        queries['咖啡廳'] = 'nwr["amenity"="cafe"]';
    if(S.pr.diet.includes('convenience')) queries['超商']  = 'nwr["shop"="convenience"]';
  } else {
    queries['景點'] = 'nwr["tourism"~"attraction|viewpoint|museum"]';
    queries['公園'] = 'nwr["leisure"="park"]';
  }

  const sl = cat==='住宿' ? `終點${accRadius/1000}km` : `路線起終點各${routeRadius/1000}km`;
  toast(`🔍 搜尋${cat}（${sl}）...`);

  let allResults = [];
  let failCount = 0;

  for(const [label, q] of Object.entries(queries)) {
    // 在 Overpass 查詢層過濾已停業店家
    // disused=yes / closed=yes / disused:amenity / abandoned:amenity → 店家已關閉但 OSM 資料未刪除
    // 停業過濾（精簡版，避免 query 過長造成 API 拒絕）
    const qClean = q + '["disused"!="yes"]["closed"!="yes"][!"disused:amenity"][!"abandoned:amenity"]';
    let overpassQuery;
    if(cat === '住宿') {
      overpassQuery = `[out:json][timeout:30];(${qClean}(around:${accRadius},${d.end.lat},${d.end.lng}););out center 30;`;
    } else {
      // 飲食/景點：起點 + 終點 union，一次涵蓋整段路線
      // out center → way/relation 回傳中心點座標
      overpassQuery = `[out:json][timeout:30];(${qClean}(around:${routeRadius},${d.start.lat},${d.start.lng});${qClean}(around:${routeRadius},${d.end.lat},${d.end.lng}););out center 40;`;
    }

    const cacheKey = `${d.start.id||d.start.lat}_${d.end.id||d.end.lat}_${label}_${cat}`;
    if(searchCache[cacheKey]) {
      allResults.push(...searchCache[cacheKey].map(r=>({...r,filterType:label})));
      continue;
    }

    // 備用 Overpass API 端點（主站限流時自動切換）
    const OVERPASS_APIS = [
      'https://overpass-api.de/api/interpreter',
      'https://overpass.kumi.systems/api/interpreter',
      'https://maps.mail.ru/osm/tools/overpass/api/interpreter'
    ];
    let data = null;
    for(const apiUrl of OVERPASS_APIS){
      try {
        // 用 AbortController + setTimeout 取代 AbortSignal.timeout（相容性較好）
        const ctrl = new AbortController();
        const timer = setTimeout(() => ctrl.abort(), 22000);
        let res;
        try {
          res = await fetch(apiUrl, {method:'POST', body:overpassQuery, signal: ctrl.signal});
        } finally {
          clearTimeout(timer);
        }
        if(!res.ok) continue;
        data = await res.json();
        break;
      } catch(e){ continue; }
    }
    try {
      if(!data) throw new Error('all apis failed');
      // node → el.lat/el.lon；way/relation → el.center.lat/el.center.lon
      const TW_LAT = [21.9, 25.4], TW_LNG = [119.9, 122.1];
      let results = data.elements
        .map(el => {
          const lat = el.lat ?? el.center?.lat;
          const lon = el.lon ?? el.center?.lon;
          return { el, lat, lon };
        })
        .filter(({el, lat, lon}) =>
          el.tags?.name && lat && lon
          && lat >= TW_LAT[0] && lat <= TW_LAT[1]
          && lon >= TW_LNG[0] && lon <= TW_LNG[1]
        )
        .map(({el, lat, lon}) => ({
          name: el.tags.name,
          lat,
          lng: lon,
          cat,
          city,
          filterType: label,
          addr: el.tags['addr:full'] || el.tags['addr:street'] || el.tags['addr:city'] || '',
          _tags: el.tags
        }));

      // 二次過濾：排除已停業 / 廢棄店家（client-side 補強 Overpass 層漏網之魚）
      results = results.filter(r => {
        const t = r._tags || {};
        if(t.disused === 'yes' || t.closed === 'yes') return false;
        if(t['disused:amenity'] || t['abandoned:amenity']) return false;
        if(t['disused:shop'] || t['disused:tourism']) return false;
        if(t.opening_hours === 'off' || t.opening_hours === 'closed') return false;
        if(t.end_date && new Date(t.end_date) < new Date()) return false;
        // 名稱含停業相關關鍵字
        const n = (t.name || '').toLowerCase();
        if(/\(已停業\)|\(closed\)|歇業|停業|廢棄/.test(n)) return false;
        return true;
      });

      // 住宿過濾：排除非旅遊性住宿
      if(cat === '住宿') {
        results = results.filter(r => !ACC_BAD.test(r.name));
      }

      // 去重（起+終兩圈可能重疊）
      const seen = new Set();
      results = results.filter(r => {
        const k = r.name + '|' + r.lat.toFixed(3) + '|' + r.lng.toFixed(3);
        return seen.has(k) ? false : (seen.add(k), true);
      });

      // 清除暫存的 _tags，節省 cache 空間
      results.forEach(r => delete r._tags);
      searchCache[cacheKey] = results;
      allResults.push(...results);
    } catch(e) {
      console.error(e);
      failCount++;  // 靜默計數，不立刻 toast
    }
  }

  // 只有全部查詢都失敗才顯示網路錯誤
  if(failCount > 0 && allResults.length === 0) {
    if(btn){ btn.classList.remove('loading'); btn.innerHTML = origHTML; }
    toast('⚠️ 伺服器無回應，請稍後再按一次試試');
    return;
  }

  if(!allResults.length) {
    const accTip = cat==='住宿'
      ? `終點 ${accRadius/1000}km 內無符合住宿<br><b>建議：</b>點右上角 ⚙️ 設定，切換住宿類型（青旅／民宿／飯店都勾選）再試`
      : `路線沿途找不到${cat}，此段路較偏僻`;
    if(btn){ btn.classList.remove('loading'); btn.innerHTML = origHTML; }
    showEmptyHint(dayIdx, cat, accTip);
    return;
  }
  toast(`✅ 找到 ${allResults.length} 筆${cat}`);

  currentPOI = allResults;
  activeFilter = '';

  // 地圖中心：住宿→終點；飲食景點→路線中點
  if(cat === '住宿') {
    searchCenterLat = d.end.lat; searchCenterLng = d.end.lng;
  } else {
    searchCenterLat = (d.start.lat+d.end.lat)/2;
    searchCenterLng = (d.start.lng+d.end.lng)/2;
  }

  // 恢復按鈕
  if(btn){ btn.classList.remove('loading'); btn.innerHTML = origHTML; }

  showFilters(Object.keys(queries));
  displayPOI(allResults, dayIdx, searchCenterLat, searchCenterLng);
}

function showEmptyHint(dayIdx, cat, msg){
  // 在行程列表對應的天卡內插入提示區
  const cards = document.querySelectorAll('.dc');
  const card = cards[dayIdx];
  if(!card) { toast(`😔 找不到${cat}`); return; }
  // 移除同 cat 的舊提示
  card.querySelectorAll(`.empty-hint[data-cat="${cat}"]`).forEach(e=>e.remove());
  const div = document.createElement('div');
  div.className = 'empty-hint';
  div.dataset.cat = cat;
  div.innerHTML = `
    <div style="display:flex;gap:10px;align-items:flex-start">
      <span style="font-size:20px">😔</span>
      <div style="flex:1">
        <div style="font-weight:700;font-size:14px;margin-bottom:4px">找不到${cat}</div>
        <div style="font-size:13px;color:var(--mu);line-height:1.6">${msg}</div>
        <div style="margin-top:10px;display:flex;gap:8px;flex-wrap:wrap">
          <button onclick="searchOSM(${dayIdx},'${cat}')"
            style="padding:6px 14px;background:var(--pr);color:#fff;border:none;border-radius:20px;font-size:13px;font-weight:700;cursor:pointer">
            🔄 再搜尋一次
          </button>
          <button onclick="this.closest('.empty-hint').remove()"
            style="padding:6px 14px;background:var(--sf);color:var(--tx);border:1px solid var(--bd);border-radius:20px;font-size:13px;cursor:pointer">
            關閉
          </button>
        </div>
      </div>
    </div>`;
  // 插入到 .dbi 裡面（地點卡片上方）
  const dbi = card.querySelector('.dbi');
  if(dbi) dbi.prepend(div); else card.appendChild(div);
  // 確保天卡展開
  if(!card.classList.contains('op')) card.classList.add('op','act');
}

function showFilters(types) {
  const bar = document.getElementById('filterBar');
  bar.innerHTML =
    `<span class="filter-label">篩選：</span>` +
    `<button class="fbtn on" onclick="filterPOI('')">全部 (${currentPOI.length})</button>` +
    types.map(t => {
      const cnt = currentPOI.filter(p=>p.filterType===t).length;
      return `<button class="fbtn" onclick="filterPOI('${t}')">${t} (${cnt})</button>`;
    }).join('');
  bar.classList.add('on');
}

function hideFilters() {
  const bar = document.getElementById('filterBar');
  bar.classList.remove('on');
}

function filterPOI(type) {
  activeFilter = type;
  document.querySelectorAll('.fbtn').forEach(b => {
    const isAll = type==='' && b.textContent.startsWith('全部');
    const isType = type!=='' && b.textContent.startsWith(type);
    b.classList.toggle('on', isAll || isType);
  });

  const filtered = type ? currentPOI.filter(p => p.filterType === type) : currentPOI;
  displayPOI(filtered, currentDayIdx, searchCenterLat, searchCenterLng);
}

function displayPOI(results, dayIdx, centerLat, centerLng) {
  if(poiL) poiL.clearLayers();
  poiL = L.layerGroup().addTo(map);
  _poiData = [];

  const co = {住宿:'#D97706', 飲食:'#3B82F6', 景點:'#7C3AED'};

  if(!results.length) {
    toast('😔 沒有符合的結果');
    closePoiList();
    return;
  }

  map.setView([centerLat, centerLng], 14);

  const listBody = document.getElementById('poiListBody');
  listBody.innerHTML = '';
  const total = results.length;
  document.getElementById('poiListTitle').textContent = `${results[0].cat} · ${total}筆`;
  document.getElementById('poiList').classList.add('on');

  results.forEach((r, i) => {
    const num = i + 1;
    const cat = r.cat;
    const defaultPrice = getDefaultPrice(cat, r.filterType);
    const idx = _poiData.length;
    _poiData.push({dayIdx, lat:r.lat, lng:r.lng, name:r.name, cat, city:r.city, filterType:r.filterType, price:defaultPrice});

    const marker = L.marker([r.lat, r.lng], {
      icon: L.divIcon({
        className:'',
        html:`<div class="poi-marker" style="background:${co[cat]||'#059669'}">${num}</div>`,
        iconSize:[28,28], iconAnchor:[14,14]
      })
    }).addTo(poiL);

    const priceTag = defaultPrice>0 ? `<br><span style="color:#0D9668;font-weight:700">預估費用：NT$ ${defaultPrice}</span>` : '';
    const addrTag = r.addr ? `<br><span style="color:#64748B;font-size:13px">📍 ${r.addr}</span>` : '';

    marker.bindPopup(`
      <div style="min-width:180px">
        <b style="font-size:15px">${r.name}</b>
        ${addrTag}
        <br><span style="color:#64748B;font-size:13px">${r.filterType||cat}</span>
        ${priceTag}
        <br style="margin:4px 0">
        <a href="${gMapsNav(r.name,r.lat,r.lng)}" target="_blank"
           style="display:block;background:#0D9668;color:#fff;padding:9px 10px;border-radius:7px;font-size:14px;font-weight:700;text-align:center;margin-top:6px;text-decoration:none">
          🧭 Google Maps 導航（附近搜尋）
        </a>
        <a href="${gMapsSearch(r.name)}" target="_blank"
           style="display:block;text-align:center;margin-top:6px;font-size:13px;color:#3B82F6;font-weight:600">
          🔍 全台搜尋店名（位置偏差時用）
        </a>
        <br>
        <button onclick="addByIdx(${idx},this)"
          style="margin-top:10px;background:#0D9668;color:#fff;border:none;padding:10px 12px;border-radius:8px;cursor:pointer;font-weight:700;font-size:14px;width:100%">
          ➕ 加入 Day${dayIdx+1}${defaultPrice>0?' · 預估$'+defaultPrice:''}
        </button>
      </div>
    `);

    const item = document.createElement('div');
    item.className = 'poi-item';
    item.innerHTML = `
      <div class="poi-num" style="background:${co[cat]||'#059669'}">${num}</div>
      <div class="poi-name">${r.name}</div>
      ${defaultPrice>0?`<div class="poi-est">$${defaultPrice}</div>`:''}
    `;
    item.onclick = () => {
      map.setView([r.lat, r.lng], 16);
      marker.openPopup();
    };
    listBody.appendChild(item);
  });
}

function addByIdx(idx, btn) {
  const p = _poiData[idx];
  if(!p) return;
  if(S.it[p.dayIdx].places.find(x=>x.name===p.name)) {
    toast('此地點已加入');
    return;
  }
  saveU();
  S.it[p.dayIdx].places.push({name:p.name, lat:p.lat, lng:p.lng, cat:p.cat, city:p.city, price:p.price});
  if(btn){
    btn.textContent='✅ 已加入';
    btn.disabled=true;
    btn.style.background='#D1FAE5';
    btn.style.color='#047857';
  }
  renderL();drawMap();saveLS();
  toast(`✅ 已加入 Day${p.dayIdx+1}：${p.name}`);
}

function closePoiList() {
  document.getElementById('poiList').classList.remove('on');
}

function initMap(){
  if(!map){
    map = L.map('map',{zoomControl:false}).setView([23.7,121],7);
    L.control.zoom({position:'topright'}).addTo(map);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',{
      attribution:'© OpenStreetMap contributors'
    }).addTo(map);
    routeL = L.layerGroup().addTo(map);
    markL  = L.layerGroup().addTo(map);
  }
  drawMap();initSheet();
  setTimeout(()=>map.invalidateSize(),300);
}

function drawMap(){
  if(!map)return;
  routeL.clearLayers();markL.clearLayers();
  if(!S.it.length)return;

  const pts=[[S.it[0].start.lat,S.it[0].start.lng]];
  S.it.forEach(d=>{
    (d.places||[]).forEach(p=>{
      pts.push([p.lat,p.lng]);
      const co={住宿:'#D97706',飲食:'#3B82F6',景點:'#7C3AED'};
      const em={住宿:'🛌',飲食:'🍽️',景點:'📍'};
      L.marker([p.lat,p.lng],{icon:L.divIcon({className:'',
        html:`<div style="background:${co[p.cat]||'#059669'};width:24px;height:24px;border-radius:50%;border:2px solid #fff;display:flex;align-items:center;justify-content:center;font-size:12px;box-shadow:0 2px 5px rgba(0,0,0,.25)">${em[p.cat]||'📍'}</div>`,
        iconSize:[24,24],iconAnchor:[12,12]})}).addTo(markL)
        .bindPopup(`<b style="font-size:14px">${p.name}</b><br><a href="${gMapsNav(p.name,p.lat,p.lng)}" target="_blank" style="color:#0D9668;font-weight:700">🧭 座標導航</a>&nbsp;<a href="${gMapsSearch(p.name)}" target="_blank" style="color:#3B82F6;font-weight:700">🔍 Google搜尋</a>`);
    });
    pts.push([d.end.lat,d.end.lng]);
  });

  L.polyline(pts,{color:'#059669',weight:4,opacity:.8,dashArray:'6,4'}).addTo(routeL);

  if(openDay<0){
    try{map.fitBounds(L.latLngBounds(pts),{padding:[40,40]})}catch(e){}
  }

  // stops[0] = 起點(idx:-1), stops[1]=Day1終點(idx:0), stops[2]=Day2終點(idx:1)...
  // 當 openDay=N，高亮 stops[N](該天起點) 和 stops[N+1](該天終點)
  const stops=[{...S.it[0].start,lb:'起',idx:-1}];
  S.it.forEach((d,i)=>stops.push({...d.end,lb:String(i+1),idx:i}));

  stops.forEach((p,i)=>{
    const isVeryStart = i===0;
    // 當天起點：stops[openDay] → idx = openDay-1 (或 i===0 when openDay===0)
    const isDayStart = openDay>=0 && ((openDay===0 && i===0) || (openDay>0 && p.idx===openDay-1));
    // 當天終點：stops[openDay+1] → idx = openDay
    const isDayEnd   = openDay>=0 && p.idx===openDay;
    const isActive   = isDayStart || isDayEnd;
    const bg = isVeryStart ? '#E8920D' : isDayEnd ? '#0D9668' : isDayStart ? '#10B981' : '#059669';
    const sz = isActive ? 36 : 28;

    L.marker([p.lat,p.lng],{icon:L.divIcon({className:'',
      html:`<div class="mday${isActive?' mday-active':''}" style="background:${bg};width:${sz}px;height:${sz}px;font-size:${isActive?14:11}px;border-width:${isActive?4:3}px">${p.lb}</div>`,
      iconSize:[sz,sz],iconAnchor:[sz/2,sz/2]})}).addTo(markL)
      .bindPopup(`<b style="font-size:14px">${p.name}</b><br><a href="${gMapsNav(p.name,p.lat,p.lng)}" target="_blank" style="color:#0D9668;font-weight:700">🧭 座標導航</a>&nbsp;<a href="${gMapsSearch(p.name)}" target="_blank" style="color:#3B82F6;font-weight:700">🔍 Google搜尋</a>`)
      .on('click',()=>{if(p.idx>=0)toggleDay(p.idx)});
  });
}

function fitR(){
  if(!map||!S.it.length)return;
  openDay=-1;hideFilters();closePoiList();
  if(poiL)poiL.clearLayers();
  const pts=S.it.flatMap(d=>[[d.start.lat,d.start.lng],[d.end.lat,d.end.lng]]);
  try{map.fitBounds(L.latLngBounds(pts),{padding:[40,40]})}catch(e){}
  renderL();
}

function expDay(idx){
  const d=S.it[idx];
  const wp=(d.places||[]).filter(p=>p.lat);

  // 用斜線格式：每個停靠點傳「店名,城市」讓 Google 地圖比對真實店家
  // 比 &waypoints=lat,lng 更能顯示正確店家名稱卡片
  const stops = [
    `${d.start.lat},${d.start.lng}`,
    ...wp.map(p => {
      // 優先用地址（更精準），沒有就用「店名 城市」
      const label = p.addr
        ? p.addr
        : `${p.name}${p.city ? ' ' + p.city : ''}`;
      return encodeURIComponent(label);
    }),
    `${d.end.lat},${d.end.lng}`
  ];

  const url = `https://www.google.com/maps/dir/${stops.join('/')}`;
  window.open(url,'_blank');
}

function expAll(){
  for(let i=0;i<Math.min(S.it.length,5);i++){
    setTimeout(()=>expDay(i),i*600);
  }
}

              <th style="padding:7px 12px;text-align:left;font-size:13px;color:#888;font-weight:600;border-bottom:1px solid #eee">地點</th>
              <th style="padding:7px 12px;text-align:left;font-size:13px;color:#888;font-weight:600;border-bottom:1px solid #eee">類別</th>
              <th style="padding:7px 12px;text-align:right;font-size:13px;color:#888;font-weight:600;border-bottom:1px solid #eee">費用</th>
            </tr>
          </thead>
          <tbody>${placeRows}</tbody>
        </table>
      </div>`;
  });

  const html = `<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>台灣環島費用明細</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Noto Sans TC',sans-serif;background:#f4f7f5;color:#1a1a1a;padding:20px}
  .wrap{max-width:600px;margin:0 auto}
  .print-btn{display:block;width:100%;padding:14px;background:#0D9668;color:#fff;font-size:16px;font-weight:700;border:none;border-radius:10px;cursor:pointer;margin-bottom:20px;letter-spacing:.5px}
  .print-btn:active{background:#0a7a55}
  .card{background:#fff;border-radius:12px;padding:16px;margin-bottom:16px;box-shadow:0 1px 6px rgba(0,0,0,.08)}
  .stat-row{display:flex;justify-content:space-between;padding:6px 0;font-size:15px;border-bottom:1px solid #f0f0f0}
  .stat-row:last-child{border:none}
  .total-row{display:flex;justify-content:space-between;padding:12px 16px;background:#fff;border-radius:10px;font-size:17px;font-weight:900;border:2px solid ${overBudget?'#ef4444':'#0D9668'};margin-bottom:20px}
  .total-val{color:${overBudget?'#ef4444':'#0D9668'};font-family:monospace}
  .hint{font-size:12px;color:#999;text-align:center;margin-top:16px;line-height:1.8}
  @media print{.print-btn{display:none}}
</style>
</head>
<body>
<div class="wrap">
  <button class="print-btn" onclick="window.print()">🖨️ 列印 / 儲存 PDF</button>

  <div class="card">
    <div style="font-size:18px;font-weight:900;margin-bottom:12px;color:#0D9668">📊 台灣環島費用明細</div>
    <div class="stat-row"><span>總天數</span><span>${S.pr.days} 天</span></div>
    <div class="stat-row"><span>每日預算</span><span>NT$ ${S.pr.budget.toLocaleString()}</span></div>
    <div class="stat-row"><span>預算上限</span><span>NT$ ${budgetLimit.toLocaleString()}</span></div>
    <div class="stat-row"><span>匯出日期</span><span>${dateStr}</span></div>
  </div>

  ${rows}

  <div class="total-row">
    <span>總計費用</span>
    <span class="total-val">NT$ ${(S.cost||0).toLocaleString()}</span>
  </div>
  ${overBudget?`<div style="background:#fef2f2;border:1px solid #fca5a5;border-radius:8px;padding:10px 14px;font-size:13px;color:#dc2626;margin-bottom:16px">⚠️ 已超出預算 NT$ ${(S.cost-budgetLimit).toLocaleString()}</div>`:''}

  <div class="hint">
    此頁面可直接截圖儲存<br>
    電腦點「列印 / 儲存 PDF」可存成 PDF 檔案
  </div>
</div>
</body>
</html>`;

  const w = window.open('','_blank');
  if(w){ w.document.write(html); w.document.close(); }
  else { toast('⚠️ 請允許彈出視窗'); }
}

function showSum(){
  let h = `
    <div class="sr"><span>總天數</span><span>${S.pr.days}天</span></div>
    <div class="sr"><span>每日預算</span><span>$${S.pr.budget.toLocaleString()}</span></div>
    <div class="sr"><span>預算上限</span><span>$${(S.pr.budget*S.pr.days).toLocaleString()}</span></div>
    <div style="background:rgba(13,150,104,.08);border-radius:8px;padding:10px 12px;margin:10px 0 4px;font-size:13px;color:var(--tx);line-height:1.7">
      🗺️ <b>Google 地圖導航</b>：每天行程卡的 <b>Google地圖</b> 按鈕，可開啟當天完整騎行路線（含所有停靠點）<br>
      💡 <b>費用</b>：金額為預估值，可直接在下方欄位輸入實際費用
    </div>
  `;

  S.it.forEach((d,di)=>{
    const dayTotal = (d.places||[]).reduce((s,p)=>s+(p.price||0),0);
    const hasPlaces = d.places?.length > 0;
    h += `<div class="day-section ${hasPlaces?'open':''}">
      <div class="day-header" onclick="this.parentElement.classList.toggle('open')">
        <div class="dh-left">
          <span class="dh-arrow">▼</span>
          <span>Day ${d.day} &nbsp;${d.start.name} → ${d.end.name}</span>
        </div>
        <span class="total">$${dayTotal.toLocaleString()}</span>
      </div>
      <div class="day-body">`;
    if(hasPlaces){
      d.places.forEach((p,pi)=>{
        const isEst = p.price>0;
        h += `<div class="place-row">
          <span class="name">${p.name}</span>
          ${isEst?'<span class="est-tag">預估</span>':''}
          <span style="color:var(--mu);font-size:15px">$</span>
          <input type="number" value="${p.price||0}" onchange="updatePrice(${di},${pi},this.value)" placeholder="0" min="0">
        </div>`;
      });
    } else {
      h += `<div style="font-size:14px;color:var(--mu);padding:8px 0">尚未新增地點</div>`;
    }
    h += `</div></div>`;
  });

  h += `<div class="sr" style="margin-top:14px;border-top:2px solid var(--pr);padding-top:14px">
    <span style="font-weight:900;font-size:16px">總計</span>
    <span style="color:var(--pr);font-size:18px;font-family:'JetBrains Mono',monospace" id="sumTotal">$${S.cost.toLocaleString()}</span>
  </div>`;

  document.getElementById('sumBd').innerHTML = h;
  showMd('sumM');
}

function updatePrice(di,pi,val){
  S.it[di].places[pi].price = +val || 0;
  S.cost = 0;
  S.it.forEach(d=>(d.places||[]).forEach(p=>{S.cost+=(p.price||0)}));
  const dayTotal = (S.it[di].places||[]).reduce((s,p)=>s+(p.price||0),0);
  const sections = document.querySelectorAll('.day-section');
  if(sections[di]) sections[di].querySelector('.total').textContent='$'+dayTotal.toLocaleString();
  const st = document.getElementById('sumTotal');
  if(st) st.textContent='$'+S.cost.toLocaleString();
  renderL();saveLS();
}

function openSet(){
  document.getElementById('sDays').value = S.pr.days;
  document.getElementById('sBu').value   = S.pr.budget;
  document.getElementById('sAc').innerHTML = `
    <button class="ch ${S.pr.acc.includes('hostel')?'on':''}" data-v="hostel" onclick="toggleSetMulti(this)">🎒 青旅</button>
    <button class="ch ${S.pr.acc.includes('hotel')?'on':''}"  data-v="hotel"  onclick="toggleSetMulti(this)">🏨 飯店</button>
    <button class="ch ${S.pr.acc.includes('bnb')?'on':''}"    data-v="bnb"    onclick="toggleSetMulti(this)">🏠 民宿</button>
  `;
  document.getElementById('sDt').innerHTML = `
    <button class="ch ${S.pr.diet.includes('all')?'on':''}"         data-v="all"         onclick="toggleSetMulti(this)">🍽️ 餐廳</button>
    <button class="ch ${S.pr.diet.includes('veg')?'on':''}"         data-v="veg"         onclick="toggleSetMulti(this)">🥬 素食</button>
    <button class="ch ${S.pr.diet.includes('cafe')?'on':''}"        data-v="cafe"        onclick="toggleSetMulti(this)">☕ 咖啡</button>
    <button class="ch ${S.pr.diet.includes('convenience')?'on':''}" data-v="convenience" onclick="toggleSetMulti(this)">🏪 超商</button>
  `;
  showMd('setM');
}

function toggleSetMulti(b){b.classList.toggle('on')}
function closeSet(){hideMd('setM')}

function applySet(){
  const newDays = +document.getElementById('sDays').value;
  S.pr.budget = +document.getElementById('sBu').value;
  S.pr.acc  = Array.from(document.querySelectorAll('#sAc .ch.on')).map(b=>b.dataset.v);
  S.pr.diet = Array.from(document.querySelectorAll('#sDt .ch.on')).map(b=>b.dataset.v);
  if(!S.pr.acc.length)  S.pr.acc=['hostel'];
  if(!S.pr.diet.length) S.pr.diet=['all'];
  if(newDays!==S.pr.days){
    S.pr.days=newDays;
    closeSet();gen();return;
  }
  searchCache={};
  closeSet();renderL();saveLS();
  toast('✅ 設定已更新');
}

function saveLS(){try{localStorage.setItem('twc7',JSON.stringify({pr:S.pr,it:S.it,cost:S.cost}))}catch(e){}}

function shareTrip(){
  try{
    const payload = JSON.stringify({pr:S.pr, it:S.it, cost:S.cost});
    const encoded = btoa(unescape(encodeURIComponent(payload)));
    const url = location.origin + location.pathname + '#s=' + encoded;
    if(navigator.clipboard){
      navigator.clipboard.writeText(url).then(()=>{
        toast('✅ 連結已複製！貼給對方開啟即可載入相同行程');
      }).catch(()=>fallbackCopy(url));
    } else { fallbackCopy(url); }
  }catch(e){ toast('⚠️ 行程過大，無法產生連結'); }
}
function fallbackCopy(url){
  const ta = document.createElement('textarea');
  ta.value = url; ta.style.position='fixed'; ta.style.opacity='0';
  document.body.appendChild(ta); ta.select();
  try{ document.execCommand('copy'); toast('✅ 連結已複製！貼給對方開啟即可載入相同行程'); }
  catch(e){ prompt('請手動複製此連結：', url); }
  document.body.removeChild(ta);
}
function loadFromHash(){
  try{
    const h = location.hash;
    if(!h.startsWith('#s=')) return false;
    const json = decodeURIComponent(escape(atob(h.slice(3))));
    const d = JSON.parse(json);
    if(!d?.it) return false;
    Object.assign(S.pr, d.pr); S.it = d.it; S.cost = d.cost; openDay = -1;
    history.replaceState(null,'',location.pathname); // 清除 hash 避免重複載入
    show('work');
    setTimeout(()=>{ initMap(); renderL(); toast('✅ 行程已從分享連結載入'); }, 150);
    return true;
  }catch(e){ return false; }
}

function loadSaved(){
  try{
    const d=JSON.parse(localStorage.getItem('twc7'));
    if(!d?.it)return;
    Object.assign(S.pr,d.pr);S.it=d.it;S.cost=d.cost;openDay=-1;
    show('work');
    setTimeout(()=>{initMap();renderL()},100);
  }catch(e){startWiz()}
}

document.addEventListener('change',e=>{
  if(e.target.dataset.ck){
    const ck=JSON.parse(localStorage.getItem('twck')||'{}');
    ck[e.target.dataset.ck]=e.target.checked;
    localStorage.setItem('twck',JSON.stringify(ck));
  }
});

window.addEventListener('DOMContentLoaded',()=>{
  const ck=JSON.parse(localStorage.getItem('twck')||'{}');
  Object.keys(ck).forEach(k=>{
    const el=document.querySelector('[data-ck="'+k+'"]');
    if(el)el.checked=ck[k];
  });
  if(localStorage.getItem('twc7'))document.getElementById('hres').style.display='block';
  loadFromHash(); // 若網址有 #s= 行程資料則自動載入
});
</script>
</body>
</html>
