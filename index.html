<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Road Master - 智慧單車規劃助理 (v5.1 - Final)</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Noto+Sans+TC:wght@400;700;900&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="security-v3.js?v=5.1"></script>
    <style>
        :root {
            --p: #f97316;
            --bg: #0f172a;
            --c: #1e293b;
            --t: #f1f5f9;
            --m: #94a3b8;
            --d: #ff4757;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', 'Noto Sans TC', sans-serif;
        }

        body {
            background: var(--bg);
            color: var(--t);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        .ac {
            max-width: 850px;
            margin: 0 auto;
            width: 100%;
            flex: 1;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
        }

        header {
            text-align: center;
            margin-bottom: 2rem;
        }

        h1 {
            font-size: 2.5rem;
            color: var(--p);
            font-weight: 900;
            font-style: italic;
            letter-spacing: -2px;
        }

        .tg {
            color: var(--m);
            font-size: 0.75rem;
            letter-spacing: 2px;
            font-weight: 800;
            margin-top: 5px;
        }

        .pw {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .wg label {
            display: block;
            font-size: 0.7rem;
            font-weight: 900;
            color: var(--p);
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .wi {
            width: 100%;
            background: #111827;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 1rem;
            outline: none;
        }

        .wi:focus {
            border-color: var(--p);
        }

        .wb {
            background: var(--p);
            color: #fff;
            border: none;
            font-weight: 900;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.2s;
            height: 50px;
            margin-top: 22px;
            font-size: 1rem;
            box-shadow: 0 10px 20px rgba(249, 115, 22, 0.2);
        }

        .wb:active {
            transform: scale(0.98);
        }

        .da {
            flex: 1;
            padding-bottom: 120px;
        }

        .rc {
            background: var(--c);
            border-radius: 28px;
            padding: 2rem;
            border-left: 6px solid var(--p);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            animation: fadeIn 0.4s ease-out;
        }

        .rc h3 {
            margin-bottom: 1.2rem;
            font-size: 1.5rem;
            color: #fff;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 10px;
        }

        .rc table {
            width: 100%;
            border-collapse: collapse;
            margin: 15px 0;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            overflow: hidden;
        }

        .rc th {
            background: rgba(249, 115, 22, 0.2);
            color: var(--p);
            padding: 12px;
            text-align: left;
            font-size: 0.8rem;
        }

        .rc td {
            padding: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 0.9rem;
        }

        .iw {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, var(--bg) 80%, transparent);
            padding: 2rem 1rem;
            z-index: 100;
        }

        .ibc {
            max-width: 850px;
            margin: 0 auto;
            display: flex;
            gap: 10px;
            background: rgba(30, 41, 59, 0.9);
            border-radius: 100px;
            padding: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
        }

        .ibc input {
            flex: 1;
            background: transparent;
            border: none;
            color: #fff;
            padding: 0 20px;
            outline: none;
            font-size: 1rem;
        }

        .ibc button {
            background: var(--p);
            border: none;
            color: #fff;
            border-radius: 100px;
            padding: 0 25px;
            font-weight: 900;
            cursor: pointer;
            height: 44px;
        }

        .tp {
            display: flex;
            gap: 5px;
            justify-content: center;
            padding: 40px;
        }

        .tp span {
            width: 10px;
            height: 10px;
            background: var(--p);
            border-radius: 50%;
            animation: bn 1.2s infinite;
        }

        @keyframes bn {

            0%,
            100% {
                opacity: 0.3;
                transform: scale(0.6);
            }

            40% {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .err-box {
            text-align: center;
            background: rgba(255, 71, 87, 0.1);
            border: 1px solid var(--d);
            color: var(--d);
            padding: 1.5rem;
            border-radius: 15px;
            font-weight: 600;
            font-size: 0.9rem;
            margin-top: 20px;
        }
    </style>
</head>

<body>
    <div class="ac">
        <header>
            <h1>Road Master ⚡</h1>
            <p class="tg">智慧單車導遊 · 最終校正版 v5.1</p>
        </header>

        <div class="pw">
            <div class="wg"><label>起點區域</label><input type="text" id="sp" class="wi" placeholder="例如：台北"></div>
            <div class="wg"><label>終點目標</label><input type="text" id="ep" class="wi" placeholder="例如：台東"></div>
            <div class="wg"><label>天數安排</label><input type="text" id="du" class="wi" placeholder="例如：3天"></div>
            <button class="wb" onclick="_gp()">自動規劃行程</button>
        </div>

        <div class="da" id="ca">
            <div class="rc">
                <h3>🚵 行程看板就緒</h3>
                <p>版本 v5.1：已切換為「動態路徑適應」。系統將自動抓取您的金鑰適用權限。如遇錯誤，請確認您的金鑰具備 Gemini 預覽權限。</p>
            </div>
        </div>

        <div class="iw">
            <div class="ibc">
                <input type="text" id="ui" placeholder="或是問任何單車問題..." onkeypress="if(event.keyCode===13)_sm()">
                <button onclick="_sm()">發送</button>
            </div>
        </div>
    </div>

    <script>
        (function () {
            // 檢查安全模組與金鑰
            if (typeof _SECURITY_CORE === 'undefined') {
                document.getElementById('ca').innerHTML = '<div class="err-box">❌ 安全偵測失敗：請確認 security-v3.js 已正確上傳。</div>';
                return;
            }

            const _k = _SECURITY_CORE.getKey();
            let _busy = false;
            let _activeModel = null;

            window._am = (r, c) => {
                const a = document.getElementById('ca');
                const d = document.createElement('div');
                d.className = 'msg ' + r;
                if (r === 'ai') d.innerHTML = `<div class="rc"><h3>行程顧問建議</h3>${marked.parse(c)}</div>`;
                else d.innerHTML = `<div class="err-box">${c}</div>`;
                a.appendChild(d);
                window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
            };

            window._gp = () => {
                const s = document.getElementById('sp').value, e = document.getElementById('ep').value, d = document.getElementById('du').value;
                if (!s || !e || !d) return alert("請填妥行程資料");
                window._sm(`規劃從「${s}」到「${e}」，天數「${d}」。請務必用 Markdown 表格呈現。`);
            };

            // 自動尋找可用模型代號
            async function _probe() {
                try {
                    const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${_k}`);
                    const d = await r.json();
                    if (d.models) {
                        const m = d.models.find(it => it.supportedGenerationMethods.includes('generateContent'));
                        if (m) return m.name;
                    }
                } catch (e) { console.error("Discovery error", e); }
                return "models/gemini-pro"; // 備援
            }

            window._sm = async (ot = null) => {
                const i = document.getElementById('ui');
                const t = ot || i.value.trim();
                if (!t || _busy) return;
                _busy = true; if (!ot) i.value = '';
                document.getElementById('ca').innerHTML = '';

                const tph = document.createElement('div');
                tph.id = 'ti'; tph.className = 'tp'; tph.innerHTML = '<span></span><span></span><span></span>';
                document.getElementById('ca').appendChild(tph);

                try {
                    // 自動適應您的金鑰模型權限
                    if (!_activeModel) {
                        console.log("Probing for models...");
                        _activeModel = await _probe();
                        console.log("Using model:", _activeModel);
                    }

                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/${_activeModel}:generateContent?key=${_k}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: t }] }] })
                    });

                    const data = await res.json();
                    document.getElementById('ti')?.remove();

                    if (res.ok && data.candidates?.[0]?.content?.parts?.[0]?.text) {
                        window._am('ai', data.candidates[0].content.parts[0].text);
                    } else {
                        const msg = data.error?.message || "線路不通";
                        const code = res.status;
                        window._am('error', `❌ 生成失敗 [代碼 ${code}]：${msg}\n\n這通常是金鑰權限未開通或網址限制不符。`);
                        _activeModel = null; // 失敗則下次重啟探測
                    }
                } catch (e) {
                    document.getElementById('ti')?.remove();
                    window._am('error', "❌ 連線異常：請確認網路通暢或金鑰有效。");
                } finally { _busy = false; }
            };
        })();
    </script>
</body>

</html>
