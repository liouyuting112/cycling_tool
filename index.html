<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Road Master - 智慧單車助理 (v8.0 Stealth)</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Noto+Sans+TC:wght@400;700;900&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="security-v3.js?v=8.0"></script>
    <style>
        :root {
            --p: #f97316;
            --bg: #0f172a;
            --c: #1e293b;
            --t: #f1f5f9;
            --m: #94a3b8;
            --d: #ff4757;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', 'Noto Sans TC', sans-serif;
        }

        body {
            background: var(--bg);
            color: var(--t);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .ac {
            max-width: 850px;
            margin: 0 auto;
            width: 100%;
            padding: 1.5rem;
            padding-bottom: 120px;
        }

        header {
            text-align: center;
            margin-bottom: 2rem;
        }

        h1 {
            font-size: 2.5rem;
            color: var(--p);
            font-weight: 900;
            font-style: italic;
            letter-spacing: -2px;
        }

        .tg {
            color: var(--m);
            font-size: 0.75rem;
            letter-spacing: 2px;
            font-weight: 800;
            text-transform: uppercase;
            margin-top: 8px;
        }

        .pw {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 28px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .wg label {
            display: block;
            font-size: 0.7rem;
            font-weight: 900;
            color: var(--p);
            margin-bottom: 5px;
        }

        .wi {
            width: 100%;
            background: #111827;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            padding: 14px;
            border-radius: 12px;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
        }

        .wi:focus {
            border-color: var(--p);
            box-shadow: 0 0 15px rgba(249, 115, 22, 0.15);
        }

        .wb {
            background: var(--p);
            color: #fff;
            border: none;
            font-weight: 900;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.2s;
            height: 50px;
            margin-top: 22px;
            font-size: 1.1rem;
            box-shadow: 0 10px 20px rgba(249, 115, 22, 0.2);
        }

        .wb:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(249, 115, 22, 0.4);
        }

        .rc {
            background: var(--c);
            border-radius: 28px;
            padding: 2.5rem;
            border-left: 8px solid var(--p);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fIn 0.6s ease-out;
        }

        .rc h3 {
            margin-bottom: 1.5rem;
            font-size: 1.8rem;
            color: #fff;
            font-weight: 900;
        }

        .rc table {
            width: 100%;
            border-collapse: collapse;
            margin: 25px 0;
            border-radius: 16px;
            overflow: hidden;
            background: rgba(0, 0, 0, 0.3);
        }

        .rc th {
            background: rgba(249, 115, 22, 0.2);
            color: var(--p);
            padding: 15px;
            text-align: left;
            font-size: 0.8rem;
        }

        .rc td {
            padding: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 1rem;
        }

        .iw {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, var(--bg) 90%, transparent);
            padding: 2.5rem 1.5rem;
            z-index: 1000;
        }

        .ibc {
            max-width: 850px;
            margin: 0 auto;
            display: flex;
            gap: 12px;
            background: rgba(30, 41, 59, 0.95);
            border-radius: 100px;
            padding: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(25px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .ibc input {
            flex: 1;
            background: transparent;
            border: none;
            color: #fff;
            padding: 0 25px;
            outline: none;
            font-size: 1.1rem;
        }

        .ibc button {
            background: var(--p);
            border: none;
            color: #fff;
            border-radius: 100px;
            padding: 0 32px;
            font-weight: 900;
            cursor: pointer;
            height: 48px;
            transition: 0.2s;
        }

        .ibc button:hover {
            transform: scale(1.05);
        }

        .tp {
            display: flex;
            gap: 8px;
            justify-content: center;
            padding: 60px;
        }

        .tp span {
            width: 14px;
            height: 14px;
            background: var(--p);
            border-radius: 50%;
            animation: bn 0.8s infinite alternate;
        }

        .tp span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .tp span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes bn {
            from {
                opacity: 0.2;
                transform: translateY(0);
            }

            to {
                opacity: 1;
                transform: translateY(-10px);
            }
        }

        @keyframes fIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .shield-icon {
            display: block;
            text-align: center;
            color: var(--m);
            font-size: 0.6rem;
            letter-spacing: 3px;
            font-weight: 900;
            margin-bottom: 10px;
            opacit: 0.6;
        }
    </style>
</head>

<body>
    <div class="ac">
        <header>
            <h1>Road Master ⚡</h1>
            <p class="tg">智慧單車導遊 · 碎片防護版 v8.0</p>
        </header>

        <div class="pw">
            <div class="wg"><label>出發起點</label><input type="text" id="sp" class="wi" placeholder="例如：台北市"></div>
            <div class="wg"><label>抵達目標</label><input type="text" id="ep" class="wi" placeholder="例如：花蓮市"></div>
            <div class="wg"><label>預計天數</label><input type="text" id="du" class="wi" placeholder="例如：3天"></div>
            <button class="wb" onclick="_gp()">⚡ 生成精準規劃小卡</button>
        </div>

        <div id="ca">
            <div class="rc">
                <h3>🚵 行程系統已升級 v8.0</h3>
                <p>已啟用「碎片化密鑰隱形技術」。本版重點：</p>
                <ul style="margin-left: 20px; margin-top: 10px; color: var(--m); line-height: 2;">
                    <li>核心代碼經過碎片混淆，無法被簡單還原。</li>
                    <li>一鍵強制生成：AI 將直接產出表格，不回問問題。</li>
                    <li>支援動態模型偵測，大幅降低當機率。</li>
                </ul>
            </div>
        </div>

        <div class="iw">
            <div class="shield-icon">FRAGMENTED STEALTH SHIELD ACTIVE (v8.0)</div>
            <div class="ibc">
                <input type="text" id="ui" placeholder="或是請教環島疑難雜症..." onkeypress="if(event.keyCode===13)_sm()">
                <button onclick="_sm()">發送</button>
            </div>
        </div>
    </div>

    <script>
        (function () {
            if (!window._R_M_S || !window._R_M_S.check) return alert("Security Blocked.");
            let _busy = false;
            let _mdl = null;

            window._am = (r, c) => {
                const a = document.getElementById('ca');
                const d = document.createElement('div');
                if (r === 'ai') d.innerHTML = `<div class="rc"><h3>🔍 規劃小卡产出</h3>${marked.parse(c)}</div>`;
                else d.innerHTML = `<p style="text-align:center;padding:20px;color:var(--d);font-weight:900;">[系統提示] ${c}</p>`;
                a.appendChild(d);
                window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
            };

            window._gp = () => {
                const s = document.getElementById('sp').value, e = document.getElementById('ep').value, d = document.getElementById('du').value;
                if (!s || !e || !d) return alert("請填寫完整行程資訊");
                const p = `你現在是全自動單車行程生成器。指令：嚴禁聊天、嚴禁反問、嚴禁前言。請直接為起點「${s}」，終點「${e}」，天數「${d}」產出一份 Markdown 行程表格。`;
                window._sm(p);
            };

            async function _p() {
                try {
                    const k = window._R_M_S.build();
                    const r = await fetch('https://generativelanguage.googleapis.com/v1beta/models?key=' + k);
                    const d = await r.json();
                    return d.models.find(it => it.supportedGenerationMethods.includes('generateContent'))?.name;
                } catch (e) { }
                return "models/gemini-1.5-flash";
            }

            window._sm = async (ot = null) => {
                const i = document.getElementById('ui');
                const t = ot || i.value.trim();
                if (!t || _busy) return;
                _busy = true; if (!ot) i.value = '';
                document.getElementById('ca').innerHTML = '';

                const tph = document.createElement('div');
                tph.id = 'ti'; tph.className = 'tp'; tph.innerHTML = '<span></span><span></span><span></span>';
                document.getElementById('ca').appendChild(tph);

                try {
                    if (!_mdl) _mdl = await _p();
                    const k = window._R_M_S.build();
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/${_mdl}:generateContent?key=${k}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: t }] }] })
                    });

                    const data = await res.json();
                    document.getElementById('ti')?.remove();

                    if (res.ok && data.candidates?.[0]?.content?.parts?.[0]?.text) {
                        window._am('ai', data.candidates[0].content.parts[0].text);
                    } else {
                        window._am('error', data.error?.message || "伺服器暫時無回應，請稍後。");
                        _mdl = null;
                    }
                } catch (e) {
                    document.getElementById('ti')?.remove();
                    window._am('error', "連線不穩，請確認網路與權限。");
                } finally { _busy = false; }
            };
        })();
    </script>
</body>

</html>
