<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Road Master - 智慧單車導遊 (v12.1 Diagnostic)</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Noto+Sans+TC:wght@400;700;900&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --p: #f97316;
            --bg: #0f172a;
            --c: #1e293b;
            --t: #f1f5f9;
            --m: #94a3b8;
            --e: #ef4444;
            --s: #22c55e;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', 'Noto Sans TC', sans-serif;
        }

        body {
            background: var(--bg);
            color: var(--t);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        .ac {
            max-width: 850px;
            margin: 0 auto;
            width: 100%;
            flex: 1;
            padding: 1.5rem;
        }

        header {
            text-align: center;
            padding: 1rem 0;
        }

        h1 {
            font-size: 2.5rem;
            color: var(--p);
            font-weight: 900;
            font-style: italic;
            letter-spacing: -2px;
        }

        .v-tag {
            color: var(--m);
            font-size: 0.6rem;
            font-weight: 800;
            letter-spacing: 2px;
        }

        .pw {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 28px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .wg {
            margin-bottom: 15px;
        }

        .wg label {
            display: block;
            font-size: 0.7rem;
            font-weight: 900;
            color: var(--p);
            margin-bottom: 6px;
            text-transform: uppercase;
        }

        .chips {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 8px;
        }

        .chip {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--m);
            padding: 4px 10px;
            border-radius: 100px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .chip:hover {
            border-color: var(--p);
            color: var(--p);
        }

        .chip.active {
            background: var(--p);
            color: #fff;
            border-color: var(--p);
        }

        .wi {
            width: 100%;
            background: #000;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 14px;
            border-radius: 12px;
            outline: none;
            transition: 0.3s;
            font-size: 0.95rem;
        }

        .wb {
            width: 100%;
            background: var(--p);
            color: #fff;
            border: none;
            font-weight: 900;
            border-radius: 12px;
            cursor: pointer;
            height: 50px;
            margin-top: 10px;
            font-size: 1.1rem;
            box-shadow: 0 10px 20px rgba(249, 115, 22, 0.2);
        }

        .da {
            padding-bottom: 140px;
        }

        .rc {
            background: var(--c);
            border-radius: 28px;
            padding: 2rem;
            border-left: 8px solid var(--p);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            animation: sweep 0.6s ease-out;
        }

        .rc h3 {
            margin-bottom: 1.2rem;
            font-size: 1.6rem;
            color: #fff;
        }

        .rc table {
            width: 100%;
            border-collapse: collapse;
            margin: 15px 0;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            overflow: hidden;
        }

        .rc th {
            background: rgba(249, 115, 22, 0.3);
            color: #fff;
            padding: 12px;
            text-align: left;
            font-size: 0.85rem;
        }

        .rc td {
            padding: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 0.95rem;
        }

        .iw {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, var(--bg) 95%, transparent);
            padding: 1.5rem;
            z-index: 1000;
        }

        .ibc {
            max-width: 850px;
            margin: 0 auto;
            display: flex;
            gap: 8px;
            background: rgba(30, 41, 59, 0.95);
            border-radius: 100px;
            padding: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
        }

        .ibc input {
            flex: 1;
            background: transparent;
            border: none;
            color: #fff;
            padding: 0 20px;
            outline: none;
            font-size: 1rem;
        }

        .ibc button {
            background: var(--p);
            border: none;
            color: #fff;
            border-radius: 100px;
            padding: 0 25px;
            font-weight: 900;
            cursor: pointer;
            height: 44px;
        }

        .debug-panel {
            margin-top: 12px;
            padding: 12px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            font-size: 0.7rem;
            color: var(--m);
            border: 1px dashed rgba(255, 255, 255, 0.08);
        }

        .url-input {
            background: #000;
            border: 1px solid #333;
            color: #4ade80;
            padding: 5px 10px;
            width: 100%;
            font-family: monospace;
            border-radius: 6px;
            margin-top: 5px;
            font-size: 0.7rem;
        }

        .error-box {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid var(--e);
            color: #fda4af;
            padding: 1.5rem;
            border-radius: 15px;
            margin-top: 10px;
            font-family: monospace;
            font-size: 0.8rem;
            line-height: 1.6;
        }

        @keyframes sweep {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <div class="ac">
        <header>
            <h1>Road Master ⚡ <span
                    style="font-size:0.8rem;background:#f97316;color:#fff;padding:2px 8px;border-radius:5px;font-style:normal;">v14.0
                    FINAL</span></h1>
            <p class="v-tag">VERSION 14.0 · MULTI-PATH AUTO SCANNER</p>
        </header>

        <div class="pw">
            <div class="wg">
                <label>起點</label>
                <div class="chips">
                    <span class="chip" onclick="setV('sp','台北')">台北</span>
                    <span class="chip" onclick="setV('sp','桃園')">桃園</span>
                    <span class="chip" onclick="setV('sp','台中')">台中</span>
                    <span class="chip" onclick="setV('sp','高雄')">高雄</span>
                </div>
                <input type="text" id="sp" class="wi" placeholder="...">
            </div>

            <div class="wg">
                <label>終點</label>
                <div class="chips">
                    <span class="chip" onclick="setV('ep','花蓮')">花蓮</span>
                    <span class="chip" onclick="setV('ep','墾丁')">墾丁</span>
                    <span class="chip" onclick="setV('ep','逆風環島')">環島</span>
                    <span class="chip" onclick="setV('ep','台東')">台東</span>
                </div>
                <input type="text" id="ep" class="wi" placeholder="...">
            </div>

            <div class="wg">
                <label>天數</label>
                <div class="chips">
                    <span class="chip" onclick="setV('du','1天')">1天</span>
                    <span class="chip" onclick="setV('du','3天')">3天</span>
                    <span class="chip" onclick="setV('du','7天')">7天</span>
                    <span class="chip" onclick="setV('du','9天')">環島</span>
                </div>
                <input type="text" id="du" class="wi" placeholder="...">
            </div>

            <button class="wb" onclick="_gp()">⚡ 生成精準規劃小卡</button>

            <div class="debug-panel">
                ⚙️ GATEWAY: <input type="text" id="gw-url" class="url-input"
                    value="https://hidden-surf-0579.love7053150.workers.dev/">
                <div id="setup-msg" style="margin-top:8px;">正在偵測伺服器健康度...</div>
            </div>
        </div>

        <div id="ca" class="da">
            <div class="rc">
                <h3>🚵 行程系統已備就緒</h3>
                <p>正在等候 Cloudflare 密鑰保險箱連線...</p>
            </div>
        </div>

        <div class="iw">
            <div class="ibc">
                <input type="text" id="ui" placeholder="或是問任何單車問題..." onkeypress="if(event.keyCode===13)_sm()">
                <button onclick="_sm()">發送</button>
            </div>
        </div>
    </div>

    <script>
        (function () {
            let _busy = false;

            window.setV = (id, v) => {
                document.getElementById(id).value = v;
                event.target.parentElement.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
                event.target.classList.add('active');
            };

            window._am = (r, c) => {
                const a = document.getElementById('ca');
                const d = document.createElement('div');
                if (r === 'ai') d.innerHTML = `<div class="rc"><h3>🔍 規劃結果產出</h3>${marked.parse(c)}</div>`;
                else d.innerHTML = `<div class="error-box"><strong>❌ 連線錯誤報報：</strong><br>${c}</div>`;
                a.appendChild(d);
                window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
            };

            window._gp = () => {
                const s = document.getElementById('sp').value, e = document.getElementById('ep').value, d = document.getElementById('du').value;
                if (!s || !e || !d) return alert("請填妥行程資料");
                window._sm(`產出 Markdown 表格行程。起點：${s}，終點：${e}，天數：${d}。`);
            };

            window._sm = async (ot = null) => {
                const i = document.getElementById('ui');
                const t = ot || i.value.trim();
                const gw = document.getElementById('gw-url').value.trim();
                if (!t || _busy) return;
                _busy = true; if (!ot) i.value = '';
                document.getElementById('ca').innerHTML = '<p style="text-align:center;padding:80px;color:var(--p);">🚀 正在與 Cloudflare 保險箱通訊...</p>';

                try {
                    const res = await fetch(gw, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: t }] }] })
                    });

                    if (!res.ok) {
                        const raw = await res.text();
                        let msg = `伺服器回報代碼：${res.status} (${res.statusText})`;
                        if (raw.includes("API_KEY missing")) msg += "<br>原因：Cloudflare 裡面的 API_KEY 沒設好！";
                        if (res.status === 403) msg += "<br>原因：被 Cloudflare 安全機制擋住了 (CORS)。";
                        throw new Error(msg + "<br>原始回傳：" + raw.substring(0, 100));
                    }

                    const data = await res.json();
                    document.getElementById('ca').innerHTML = '';
                    if (data.candidates?.[0]?.content?.parts?.[0]?.text) {
                        window._am('ai', data.candidates[0].content.parts[0].text);
                    } else {
                        window._am('ai', "產出失敗，可能 API Key 額度用盡或內容違規。");
                    }
                } catch (e) {
                    window._am('error', e.message || "發生未知連線故障");
                } finally { _busy = false; }
            };

            fetch(document.getElementById('gw-url').value, { method: 'OPTIONS' }).then(r => {
                const m = document.getElementById('setup-msg');
                if (r.ok) m.innerHTML = "✅ 通訊正常：保險箱已解鎖！";
                else m.innerHTML = "⚠️ 注意：伺服器拒絕存取，請重新點擊上方網址檢查內容。";
            }).catch(e => {
                document.getElementById('setup-msg').innerHTML = "❌ 無法觸及伺服器。請確認網址正確且已 Deploy。";
            });
        })();
    </script>
</body>

</html>
