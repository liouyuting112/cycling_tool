<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Road Master - 智慧單車規劃助理 (v6.0 - 隱身特仕版)</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Noto+Sans+TC:wght@400;700;900&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="security-v3.js?v=6.0"></script>
    <style>
        :root {
            --p: #f97316;
            --bg: #0f172a;
            --c: #1e293b;
            --t: #f1f5f9;
            --m: #94a3b8;
            --d: #ff4757;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', 'Noto Sans TC', sans-serif;
        }

        body {
            background: var(--bg);
            color: var(--t);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        .ac {
            max-width: 850px;
            margin: 0 auto;
            width: 100%;
            flex: 1;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
        }

        header {
            text-align: center;
            margin-bottom: 2rem;
        }

        h1 {
            font-size: 2.5rem;
            color: var(--p);
            font-weight: 900;
            font-style: italic;
            letter-spacing: -2px;
        }

        .tg {
            color: var(--m);
            font-size: 0.75rem;
            letter-spacing: 2px;
            font-weight: 800;
            margin-top: 5px;
        }

        .pw {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .wg label {
            display: block;
            font-size: 0.75rem;
            font-weight: 900;
            color: var(--p);
            margin-bottom: 8px;
        }

        .wi {
            width: 100%;
            background: #000;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 14px;
            border-radius: 12px;
            font-size: 1rem;
            outline: none;
        }

        .wb {
            background: var(--p);
            color: #fff;
            border: none;
            font-weight: 900;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
            height: 50px;
            margin-top: 25px;
            font-size: 1rem;
            box-shadow: 0 10px 20px rgba(249, 115, 22, 0.2);
        }

        .wb:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(249, 115, 22, 0.4);
        }

        .da {
            flex: 1;
            padding-bottom: 140px;
        }

        .rc {
            background: var(--c);
            border-radius: 28px;
            padding: 2rem;
            border-left: 6px solid var(--p);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            animation: fadeIn 0.5s ease-out;
        }

        .rc h3 {
            margin-bottom: 1.5rem;
            font-size: 1.6rem;
            color: #fff;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 10px;
        }

        .rc table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            overflow: hidden;
        }

        .rc th {
            background: rgba(249, 115, 22, 0.3);
            color: #fff;
            padding: 15px;
            text-align: left;
            font-size: 0.85rem;
        }

        .rc td {
            padding: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 1rem;
        }

        .iw {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, var(--bg) 90%, transparent);
            padding: 2rem 1rem;
            z-index: 100;
        }

        .ibc {
            max-width: 850px;
            margin: 0 auto;
            display: flex;
            gap: 10px;
            background: rgba(30, 41, 59, 0.95);
            border-radius: 100px;
            padding: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
        }

        .ibc input {
            flex: 1;
            background: transparent;
            border: none;
            color: #fff;
            padding: 0 25px;
            outline: none;
            font-size: 1.1rem;
        }

        .ibc button {
            background: var(--p);
            border: none;
            color: #fff;
            border-radius: 100px;
            padding: 0 30px;
            font-weight: 900;
            cursor: pointer;
            height: 48px;
        }

        .tp {
            display: flex;
            gap: 8px;
            justify-content: center;
            padding: 50px;
        }

        .tp span {
            width: 12px;
            height: 12px;
            background: var(--p);
            border-radius: 50%;
            animation: bn 1s infinite alternate;
        }

        @keyframes bn {
            from {
                opacity: 0.2;
                transform: scale(0.8);
            }

            to {
                opacity: 1;
                transform: scale(1.2);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .st {
            text-align: center;
            font-size: 0.65rem;
            color: var(--m);
            letter-spacing: 2px;
            margin-bottom: 8px;
            font-weight: 900;
        }
    </style>
</head>

<body>
    <div class="ac">
        <header>
            <h1>Road Master ⚡</h1>
            <p class="tg">智慧單車導遊 · 潛行加固版 v6.0</p>
        </header>

        <div class="pw">
            <div class="wg"><label>起點區域</label><input type="text" id="sp" class="wi" placeholder="例如：台北市"></div>
            <div class="wg"><label>最終目標</label><input type="text" id="ep" class="wi" placeholder="例如：台南市"></div>
            <div class="wg"><label>天數安排</label><input type="text" id="du" class="wi" placeholder="例如：4天環台"></div>
            <button class="wb" onclick="_gp()">⚡ 立即生成自動產出</button>
        </div>

        <div class="da" id="ca">
            <div class="rc">
                <h3>🚵 行程系統已備就緒</h3>
                <p>版本 v6.0 已升級「潛行加密」與「一鍵生成」功能。您現在點擊按鈕，AI 將跳過聊天，直接为您自動規劃。</p>
            </div>
        </div>

        <div class="iw">
            <div class="st">SECURE TUNNEL: GHOST SHIELD ACTIVE (v6.0)</div>
            <div class="ibc">
                <input type="text" id="ui" placeholder="或是問任何單車救援問題..." onkeypress="if(event.keyCode===13)_sm()">
                <button onclick="_sm()">發送</button>
            </div>
        </div>
    </div>

    <script>
        (function () {
            if (typeof _SECURITY_CORE === 'undefined') return alert("Security Error: Check your deployment.");
            const _k = _SECURITY_CORE.getKey();
            let _busy = false;
            let _am = null;

            window._am = (r, c) => {
                const a = document.getElementById('ca');
                const d = document.createElement('div');
                d.className = 'msg ' + r;
                if (r === 'ai') d.innerHTML = `<div class="rc"><h3>行程顧問建議</h3>${marked.parse(c)}</div>`;
                else d.innerHTML = `<p style="text-align:center;padding:20px;color:var(--d);font-size:0.9rem;">${c}</p>`;
                a.appendChild(d);
                window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
            };

            window._gp = () => {
                const s = document.getElementById('sp').value, e = document.getElementById('ep').value, d = document.getElementById('du').value;
                if (!s || !e || !d) return alert("請填妥行程資料");
                // 強制 AI 進入「生成模式」，嚴禁廢話
                const p = `你現在是一個全自動單車行程生成器。嚴禁提問，嚴禁聊天，嚴禁給前言。請直接分析以下需求並產出一份詳細的 Markdown 行程表格：起點「${s}」，終點「${e}」，預計天數「${d}」。`;
                window._sm(p);
            };

            async function _probe() {
                try {
                    // API Key 被放在 Header 中，不再出現在 URL
                    const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models`, {
                        headers: { 'x-goog-api-key': _k }
                    });
                    const d = await r.json();
                    if (d.models) return d.models.find(it => it.supportedGenerationMethods.includes('generateContent'))?.name;
                } catch (e) { }
                return "models/gemini-1.5-flash";
            }

            window._sm = async (ot = null) => {
                const i = document.getElementById('ui');
                const t = ot || i.value.trim();
                if (!t || _busy) return;
                _busy = true; if (!ot) i.value = '';
                document.getElementById('ca').innerHTML = '';

                const tph = document.createElement('div');
                tph.id = 'ti'; tph.className = 'tp'; tph.innerHTML = '<span></span><span></span><span></span>';
                document.getElementById('ca').appendChild(tph);

                try {
                    if (!_am) _am = await _probe();

                    // 改用 Header 傳輸 Key，避開 Network Tab 的 URL 偵測
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/${_am}:generateContent`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'x-goog-api-key': _k
                        },
                        body: JSON.stringify({ contents: [{ parts: [{ text: t }] }] })
                    });

                    const data = await res.json();
                    document.getElementById('ti')?.remove();

                    if (res.ok && data.candidates?.[0]?.content?.parts?.[0]?.text) {
                        window._am('ai', data.candidates[0].content.parts[0].text);
                    } else {
                        window._am('error', "產出失敗，請確認 API 狀態。");
                    }
                } catch (e) {
                    document.getElementById('ti')?.remove();
                    window._am('error', "系統重連中，請稍後再試。");
                } finally { _busy = false; }
            };
        })();
    </script>
</body>

</html>
