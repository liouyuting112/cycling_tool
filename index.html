<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Road Master - 智慧單車導遊 (v11.0 Ultimate)</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Noto+Sans+TC:wght@400;700;900&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --p: #f97316;
            --bg: #0f172a;
            --c: #1e293b;
            --t: #f1f5f9;
            --m: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', 'Noto Sans TC', sans-serif;
        }

        body {
            background: var(--bg);
            color: var(--t);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .ac {
            max-width: 850px;
            margin: 0 auto;
            width: 100%;
            flex: 1;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
        }

        header {
            text-align: center;
            padding: 2.5rem 0;
        }

        h1 {
            font-size: 3rem;
            color: var(--p);
            font-weight: 900;
            font-style: italic;
            letter-spacing: -2px;
        }

        .pw {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 32px;
            padding: 2rem;
            margin-bottom: 2rem;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .wg label {
            display: block;
            font-size: 0.75rem;
            font-weight: 900;
            color: var(--p);
            margin-bottom: 8px;
        }

        .wi {
            width: 100%;
            background: #000;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 16px;
            border-radius: 14px;
            outline: none;
            transition: 0.3s;
        }

        .wb {
            background: var(--p);
            color: #fff;
            border: none;
            font-weight: 900;
            border-radius: 14px;
            cursor: pointer;
            height: 55px;
            margin-top: 25px;
            box-shadow: 0 10px 25px rgba(249, 115, 22, 0.3);
        }

        .da {
            flex: 1;
            padding-bottom: 140px;
        }

        .rc {
            background: var(--c);
            border-radius: 32px;
            padding: 2.5rem;
            border-left: 8px solid var(--p);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
        }

        .rc h3 {
            margin-bottom: 1.5rem;
            font-size: 1.8rem;
            color: #fff;
        }

        .rc table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 16px;
            overflow: hidden;
        }

        .rc th {
            background: rgba(249, 115, 22, 0.2);
            color: #fff;
            padding: 15px;
            text-align: left;
        }

        .rc td {
            padding: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .iw {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, var(--bg) 95%, transparent);
            padding: 2rem 1.5rem;
            z-index: 1000;
        }

        .ibc {
            max-width: 850px;
            margin: 0 auto;
            display: flex;
            gap: 10px;
            background: rgba(30, 41, 59, 0.95);
            border-radius: 100px;
            padding: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
        }

        .ibc input {
            flex: 1;
            background: transparent;
            border: none;
            color: #fff;
            padding: 0 25px;
            outline: none;
        }

        .ibc button {
            background: var(--p);
            border: none;
            color: #fff;
            border-radius: 100px;
            padding: 0 30px;
            font-weight: 900;
            cursor: pointer;
            height: 48px;
        }

        .status {
            text-align: center;
            color: var(--m);
            font-size: 0.6rem;
            letter-spacing: 3px;
            font-weight: 900;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>
    <div class="ac">
        <header>
            <h1>Road Master ⚡</h1>
            <p style="text-align:center;color:var(--m);font-weight:800;font-size:0.7rem;">ULTIMATE SECURITY VERSION 11.0
            </p>
        </header>

        <div class="pw">
            <div class="wg"><label>起點</label><input type="text" id="sp" class="wi" placeholder="例如：台北市"></div>
            <div class="wg"><label>終點</label><input type="text" id="ep" class="wi" placeholder="例如：台南市"></div>
            <div class="wg"><label>天數</label><input type="text" id="du" class="wi" placeholder="例如：4天"></div>
            <button class="wb" onclick="_gp()">⚡ 立即生成自動產出</button>
        </div>

        <div id="ca" class="da">
            <div class="rc">
                <h3>🚵 行程系統已備就緒</h3>
                <p>本版本使用 **Cloudflare Workers** 進行後端加密。</p>
                <div style="background:rgba(255,255,255,0.05);padding:1.5rem;border-radius:15px;margin-top:1.5rem;">
                    <p style="font-weight:bold;color:var(--p);">🚀 狀態確認：</p>
                    <p id="setup-msg" style="margin-top:10px;color:var(--m);">正在尋找您的 Cloudflare 代理節點...</p>
                </div>
            </div>
        </div>

        <div class="iw">
            <div class="status">ENCRYPTED GATEWAY ACTIVE</div>
            <div class="ibc">
                <input type="text" id="ui" placeholder="或是問任何單車問題..." onkeypress="if(event.keyCode===13)_sm()">
                <button onclick="_sm()">發送</button>
            </div>
        </div>
    </div>

    <script>
        (function () {
            let _busy = false;
            // 🔒 這是您的 Cloudflare 網址
            const _CF_GATEWAY = "https://hidden-surf-0579.love7053150.workers.dev/";

            window._am = (r, c) => {
                const a = document.getElementById('ca');
                const d = document.createElement('div');
                if (r === 'ai') d.innerHTML = `<div class="rc"><h3>🔍 規劃結果產出</h3>${marked.parse(c)}</div>`;
                else d.innerHTML = `<p style="text-align:center;padding:20px;color:var(--p);font-size:0.9rem;">${c}</p>`;
                a.appendChild(d);
                window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
            };

            window._gp = () => {
                const s = document.getElementById('sp').value, e = document.getElementById('ep').value, d = document.getElementById('du').value;
                if (!s || !e || !d) return alert("請填妥行程資料");
                window._sm(`你現在是全自動單車行程生成器。請直接為起點「${s}」，終點「${e}」，天數「${d}」產出一份 Markdown 表格。嚴禁廢話與反問！`);
            };

            window._sm = async (ot = null) => {
                const i = document.getElementById('ui');
                const t = ot || i.value.trim();
                if (!t || _busy) return;
                _busy = true; if (!ot) i.value = '';
                document.getElementById('ca').innerHTML = '<p style="text-align:center;padding:80px;color:var(--p);">🚀 正在透過伺服器進行計算...</p>';

                try {
                    const res = await fetch(_CF_GATEWAY, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: t }] }] })
                    });

                    if (!res.ok) throw new Error("Server Response Error");
                    const data = await res.json();
                    document.getElementById('ca').innerHTML = '';
                    if (data.candidates?.[0]?.content?.parts?.[0]?.text) {
                        window._am('ai', data.candidates[0].content.parts[0].text);
                    } else {
                        window._am('error', "產出失敗，請確認 Cloudflare 端已設定 API_KEY。");
                    }
                } catch (e) {
                    window._am('error', "❌ 無法連接到您的 Cloudflare 伺服器。<br>請確認您的 Worker 網址為：" + _CF_GATEWAY);
                } finally { _busy = false; }
            };

            // 啟動自我檢查
            fetch(_CF_GATEWAY, { method: 'OPTIONS' }).then(r => {
                if (r.ok) document.getElementById('setup-msg').innerHTML = "✅ 已成功連線至 Cloudflare！資安防護已完全開啟。";
            }).catch(e => {
                document.getElementById('setup-msg').innerHTML = "⚠️ 伺服器目前離線。請依照下一動教學架設 Cloudflare Worker。";
            });
        })();
    </script>
</body>

</html>
