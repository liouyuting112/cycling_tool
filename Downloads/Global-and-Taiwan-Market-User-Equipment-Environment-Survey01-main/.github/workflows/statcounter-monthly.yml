name: StatCounter Daily Fast Update

on:
  schedule:
    # 每天 台灣時間 07:00 執行一次
    # 台灣 UTC+8 → 換算成 UTC 為 23:00
    - cron: "0 23 * * *"
  workflow_dispatch: {}

jobs:
  batch1:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Python dependencies
        working-directory: 資料
        run: |
          python -m pip install --upgrade pip
          pip install selenium
      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1
      - name: Run batch 1
        working-directory: 資料
        env:
          CHROME_BIN: google-chrome
        run: python fetch_statcounter_batch1.py
      - name: Upload batch 1 data
        uses: actions/upload-artifact@v4
        with:
          name: statcounter-batch1
          path: 資料/statcounter_data/

  batch2:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Python dependencies
        working-directory: 資料
        run: |
          python -m pip install --upgrade pip
          pip install selenium
      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1
      - name: Run batch 2
        working-directory: 資料
        env:
          CHROME_BIN: google-chrome
        run: python fetch_statcounter_batch2.py
      - name: Upload batch 2 data
        uses: actions/upload-artifact@v4
        with:
          name: statcounter-batch2
          path: 資料/statcounter_data/

  batch3:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Python dependencies
        working-directory: 資料
        run: |
          python -m pip install --upgrade pip
          pip install selenium
      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1
      - name: Run batch 3
        working-directory: 資料
        env:
          CHROME_BIN: google-chrome
        run: python fetch_statcounter_batch3.py
      - name: Upload batch 3 data
        uses: actions/upload-artifact@v4
        with:
          name: statcounter-batch3
          path: 資料/statcounter_data/

  batch4:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Python dependencies
        working-directory: 資料
        run: |
          python -m pip install --upgrade pip
          pip install selenium
      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1
      - name: Run batch 4
        working-directory: 資料
        env:
          CHROME_BIN: google-chrome
        run: python fetch_statcounter_batch4.py
      - name: Upload batch 4 data
        uses: actions/upload-artifact@v4
        with:
          name: statcounter-batch4
          path: 資料/statcounter_data/

  batch5:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Python dependencies
        working-directory: 資料
        run: |
          python -m pip install --upgrade pip
          pip install selenium
      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1
      - name: Run batch 5
        working-directory: 資料
        env:
          CHROME_BIN: google-chrome
        run: python fetch_statcounter_batch5.py
      - name: Upload batch 5 data
        uses: actions/upload-artifact@v4
        with:
          name: statcounter-batch5
          path: 資料/statcounter_data/

  batch6:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Python dependencies
        working-directory: 資料
        run: |
          python -m pip install --upgrade pip
          pip install selenium
      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1
      - name: Run batch 6
        working-directory: 資料
        env:
          CHROME_BIN: google-chrome
        run: python fetch_statcounter_batch6.py
      - name: Upload batch 6 data
        uses: actions/upload-artifact@v4
        with:
          name: statcounter-batch6
          path: 資料/statcounter_data/

  sync-and-deploy:
    runs-on: ubuntu-latest
    needs: [batch1, batch2, batch3, batch4, batch5, batch6]
    steps:
      - uses: actions/checkout@v4
      - name: Download all batch artifacts and merge
        uses: actions/download-artifact@v4
        with:
          pattern: statcounter-batch*
          path: merged_data
          merge-multiple: true
      - name: Copy merged JSON into 資料/statcounter_data
        run: |
          mkdir -p 資料/statcounter_data
          cp merged_data/*.json 資料/statcounter_data/ || true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Sync JSON to deploy/statcounter_data
        working-directory: 資料
        run: |
          python monthly_update_statcounter.py

      - name: Check for changes
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "no_changes=true" >> $GITHUB_ENV
          else
            echo "no_changes=false" >> $GITHUB_ENV
          fi

      - name: Commit and push updated data
        if: env.no_changes == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add statcounter_data deploy/statcounter_data 資料/statcounter_data || true
          git commit -m "chore: fast statcounter update [skip ci]" || true
          git push
