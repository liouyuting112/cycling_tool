<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Road Master | 單車智慧導航</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Noto+Sans+TC:wght@400;700;900&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --p: #f97316;
            --bg: #030712;
            --c: #1e293b;
            --t: #f1f5f9;
            --m: #94a3b8;
            --border: rgba(255, 255, 255, 0.08);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', 'Noto Sans TC', sans-serif;
        }

        body {
            background: var(--bg);
            background-image: radial-gradient(circle at top right, rgba(249, 115, 22, 0.05), transparent);
            color: var(--t);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Header */
        header {
            padding: 1rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(3, 7, 18, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            z-index: 10;
        }

        .logo {
            font-weight: 900;
            font-size: 1.2rem;
            color: var(--p);
            letter-spacing: 1px;
        }

        /* Chat Area */
        #chat-scroller {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            scroll-behavior: smooth;
        }

        .m {
            max-width: 85%;
            align-self: flex-start;
            animation: slideUp 0.3s ease-out;
        }

        .m.u {
            align-self: flex-end;
        }

        .bubble {
            padding: 1.2rem;
            border-radius: 20px;
            background: var(--c);
            border: 1px solid var(--border);
            line-height: 1.6;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .m.u .bubble {
            background: var(--p);
            color: white;
            border: none;
            border-radius: 20px 20px 0 20px;
            font-weight: 600;
        }

        /* Interactive Form inside AI card */
        .plan-form {
            background: rgba(0, 0, 0, 0.2);
            padding: 1.5rem;
            border-radius: 16px;
            margin-top: 1rem;
            display: flex;
            flex-direction: column;
            gap: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .plan-row {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .plan-row label {
            font-size: 0.8rem;
            color: var(--p);
            font-weight: 800;
            text-transform: uppercase;
        }

        .plan-row input {
            background: #0f172a;
            border: 1px solid #334155;
            color: white;
            padding: 10px;
            border-radius: 8px;
            outline: none;
        }

        .plan-row input:focus {
            border-color: var(--p);
        }

        .quick-chips {
            display: flex;
            gap: 6px;
            overflow-x: auto;
            padding-bottom: 4px;
        }

        .chip {
            background: #334155;
            color: #cbd5e1;
            padding: 4px 10px;
            border-radius: 50px;
            font-size: 0.75rem;
            white-space: nowrap;
            cursor: pointer;
        }

        .chip:hover {
            background: var(--p);
            color: white;
        }

        /* Table & Content Styling */
        .bubble table {
            width: 100%;
            border-collapse: collapse;
            margin: 1rem 0;
            font-size: 0.9rem;
        }

        .bubble th {
            background: rgba(255, 255, 255, 0.05);
            color: var(--p);
            padding: 8px;
            text-align: left;
            border-bottom: 2px solid #334155;
        }

        .bubble td {
            padding: 8px;
            border-bottom: 1px solid #444;
            color: #cbd5e1;
        }

        .bubble ul {
            padding-left: 20px;
            margin: 0.5rem 0;
        }

        .bubble h3 {
            color: var(--p);
            margin-bottom: 0.8rem;
            font-size: 1.1rem;
        }

        /* Input Panel */
        .input-dock {
            padding: 1rem 1.5rem 2.5rem;
            background: linear-gradient(transparent, var(--bg) 50%);
        }

        .input-box {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 24px;
            display: flex;
            padding: 8px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        #chat-input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            padding: 0 15px;
            font-size: 1rem;
            outline: none;
        }

        .send-btn {
            background: var(--p);
            color: white;
            border: none;
            padding: 0 20px;
            height: 44px;
            border-radius: 18px;
            font-weight: 800;
            cursor: pointer;
        }

        /* Animations */
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(15px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .typing {
            display: flex;
            gap: 4px;
            padding: 10px;
        }

        .dot {
            width: 6px;
            height: 6px;
            background: var(--p);
            border-radius: 50%;
            animation: blink 1s infinite alternate;
        }

        .dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes blink {
            from {
                opacity: 0.3;
            }

            to {
                opacity: 1;
            }
        }

        /* Hide Scrollbar */
        #chat-scroller::-webkit-scrollbar {
            width: 5px;
        }

        #chat-scroller::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 10px;
        }
    </style>
</head>

<body>

    <header>
        <div class="logo">ROAD MASTER</div>
        <div style="font-size:0.8rem; color:var(--m);">AI 專家在線</div>
    </header>

    <main id="chat-scroller">
        <!-- Initial Welcome with Inline Form -->
        <div class="m">
            <div class="bubble">
                <h3>🚵 你好！我是您的環島嚮導</h3>
                <p>讓我幫您規劃最精簡、無廢話的單車行程。您可以直接在下面填寫需求，或是在對話框問我任何單車問題。</p>

                <div class="plan-form">
                    <div class="plan-row">
                        <label>📍 起點</label>
                        <div class="quick-chips">
                            <span class="chip" onclick="iv('start','台北')">台北</span>
                            <span class="chip" onclick="iv('start','新竹')">新竹</span>
                            <span class="chip" onclick="iv('start','高雄')">高雄</span>
                        </div>
                        <input type="text" id="start" placeholder="例：台北">
                    </div>
                    <div class="plan-row">
                        <label>🏁 終點</label>
                        <div class="quick-chips">
                            <span class="chip" onclick="iv('end','花蓮')">花蓮</span>
                            <span class="chip" onclick="iv('end','恆春')">恆春</span>
                            <span class="chip" onclick="iv('end','環島')">環島</span>
                        </div>
                        <input type="text" id="end" placeholder="例：台東">
                    </div>
                    <div class="plan-row">
                        <label>⏱️ 天數</label>
                        <div class="quick-chips">
                            <span class="chip" onclick="iv('days','1天')">1天</span>
                            <span class="chip" onclick="iv('days','3天')">3天</span>
                            <span class="chip" onclick="iv('days','9天')">9天</span>
                        </div>
                        <input type="text" id="days" placeholder="例：3天">
                    </div>
                    <button class="send-btn" style="width:100%; margin-top:5px;" onclick="formPlan()">⚡ 開始規劃</button>
                </div>
            </div>
        </div>
    </main>

    <div class="input-dock">
        <div class="input-box">
            <input type="text" id="chat-input" placeholder="有任何單車問題嗎？直接問..."
                onkeypress="if(event.key==='Enter')sendChat()">
            <button class="send-btn" onclick="sendChat()">傳送</button>
        </div>
    </div>

    <script>
        const CF_GATEWAY = "https://hidden-surf-0579.love7053150.workers.dev/";
        const chatScroller = document.getElementById('chat-scroller');
        const chatInput = document.getElementById('chat-input');

        const DRY_PROMPT = `你是單車教練 Road Master。
【說話準則】：
1. 絕對不說客套話（如：你好、沒問題、我為您規劃）。
2. 直接輸出核心內容：表格（天數|路線|KM|亮點）或 精簡條列（3點以內）。
3. 嚴禁長篇大論，每句話都要有含金量。
4. 針對規劃需求，直接給表格。`;

        function iv(id, v) { document.getElementById(id).value = v; }

        function appendBubble(role, content, isMD = true) {
            const m = document.createElement('div');
            m.className = role === 'u' ? 'm u' : 'm';
            m.innerHTML = `<div class="bubble">${isMD ? marked.parse(content) : content}</div>`;
            chatScroller.appendChild(m);
            chatScroller.scrollTop = chatScroller.scrollHeight;
            return m;
        }

        function showTyping() {
            const t = document.createElement('div');
            t.id = 'typing';
            t.className = 'm';
            t.innerHTML = `<div class="bubble"><div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>`;
            chatScroller.appendChild(t);
            chatScroller.scrollTop = chatScroller.scrollHeight;
        }

        async function formPlan() {
            const s = document.getElementById('start').value;
            const e = document.getElementById('end').value;
            const d = document.getElementById('days').value;
            if (!s || !e || !d) return alert("請填好表單喔！");

            appendBubble('u', `📍從${s}出發到${e}，預計騎${d}。`, false);
            await callAI(`規劃行程：起點${s}，終點${e}，天數${d}。直接給表。`);
        }

        async function sendChat() {
            const txt = chatInput.value.trim();
            if (!txt) return;
            chatInput.value = '';
            appendBubble('u', txt, false);
            await callAI(txt);
        }

        async function callAI(text) {
            showTyping();
            try {
                const res = await fetch(CF_GATEWAY, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: DRY_PROMPT + "\n\n需求：" + text }] }] })
                });
                const data = await res.json();
                document.getElementById('typing').remove();
                const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || "連線異常";
                appendBubble('ai', reply);
            } catch (e) {
                document.getElementById('typing').remove();
                appendBubble('ai', "❌ 連線錯誤");
            }
        }
    </script>
</body>

</html>
