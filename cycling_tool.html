<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Road Master Pro | 終極單車環島規劃</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Noto+Sans+TC:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --primary-light: #eff6ff;
            --accent: #f97316;
            --bg: #f8fafc;
            --surface: rgba(255, 255, 255, 0.98);
            --text: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --radius-md: 16px;
            --radius-lg: 28px;
            --ease: cubic-bezier(0.16, 1, 0.3, 1);
            --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', 'Noto Sans TC', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg); color: var(--text); height: 100vh; display: flex; overflow: hidden; }

        .app-shell { display: flex; width: 100%; height: 100%; position: relative; }
        .map-section { flex: 1; position: relative; z-index: 1; }
        #map { width: 100%; height: 100%; }

        /* Sidebar (Desktop) */
        .desktop-sidebar {
            width: 420px;
            background: var(--surface);
            border-right: 1px solid var(--border);
            z-index: 100;
            display: flex;
            flex-direction: column;
            box-shadow: 10px 0 30px rgba(0,0,0,0.02);
        }

        /* Search Section */
        .search-container { padding: 1.5rem; background: white; z-index: 10; border-bottom: 1px solid var(--border); }
        .header-title { display: flex; align-items: center; gap: 12px; margin-bottom: 1.5rem; }
        .header-title h1 { font-size: 1.6rem; font-weight: 800; color: var(--primary); letter-spacing: -0.5px; }
        .pro-label { background: var(--primary); color: white; font-size: 0.6rem; padding: 2px 10px; border-radius: 100px; font-weight: 900; }

        .input-group { position: relative; display: flex; flex-direction: column; gap: 12px; }
        .search-wrapper { position: relative; }
        .search-wrapper input {
            width: 100%; padding: 16px 20px; border: 2px solid #f1f5f9; border-radius: 18px;
            font-size: 1rem; outline: none; transition: 0.3s; background: #f8fafc; font-weight: 500;
        }
        .search-wrapper input:focus { border-color: var(--primary); background: white; box-shadow: 0 0 0 4px rgba(37,99,235,0.08); }
        
        .autocomplete-list {
            position: absolute; top: 100%; left: 0; right: 0; background: white;
            border: 1px solid var(--border); border-radius: 12px; z-index: 1000;
            box-shadow: var(--shadow); margin-top: 5px; display: none; overflow: hidden;
            max-height: 250px; overflow-y: auto;
        }
        .autocomplete-item { padding: 12px 20px; cursor: pointer; font-size: 0.9rem; border-bottom: 1px solid #f8fafc; transition: 0.2s; }
        .autocomplete-item:hover { background: var(--primary-light); color: var(--primary); }

        .btn-main {
            background: var(--primary); color: white; border: none; padding: 18px; border-radius: 18px;
            font-weight: 800; cursor: pointer; transition: 0.3s; font-size: 1.05rem;
            display: flex; align-items: center; justify-content: center; gap: 12px; box-shadow: 0 4px 12px rgba(37,99,235,0.2);
        }
        .btn-main:active { transform: scale(0.97); }

        /* Tabs */
        .tabs-nav { display: flex; padding: 0 1rem; gap: 4px; overflow-x: auto; background: white; border-bottom: 1px solid var(--border); scrollbar-width: none; flex-shrink: 0; }
        .tabs-nav::-webkit-scrollbar { display: none; }
        .tab-trigger { padding: 14px 18px; white-space: nowrap; border: none; background: none; font-size: 0.9rem; font-weight: 700; color: var(--text-muted); cursor: pointer; border-bottom: 3px solid transparent; transition: 0.2s; }
        .tab-trigger.active { color: var(--primary); border-color: var(--primary); }

        /* Content Area */
        .main-content { flex: 1; overflow-y: auto; padding: 1.5rem; background: #fff; }
        .panel { display: none; animation: slideUp 0.4s var(--ease); }
        .panel.active { display: block; }

        /* Cards & Items */
        .card-pro { background: #f8fafc; border-radius: 20px; padding: 1.5rem; margin-bottom: 1.25rem; border: 1px solid #eef2f6; }
        .poi-block { 
            display: flex; gap: 16px; padding: 16px; border-radius: 20px; border: 1px solid #f1f5f9; transition: 0.3s; 
            cursor: pointer; margin-bottom: 12px; background: white; align-items: center;
        }
        .poi-block:hover { border-color: var(--primary); background: var(--primary-light); transform: translateY(-2px); }
        .poi-icon-box { 
            width: 54px; height: 54px; border-radius: 14px; background: var(--primary-light); 
            display: flex; align-items: center; justify-content: center; font-size: 1.6rem; flex-shrink: 0;
        }
        .poi-info { flex: 1; }
        .poi-name { font-weight: 800; font-size: 1.05rem; color: #1e293b; margin-bottom: 2px; }
        .poi-meta { font-size: 0.75rem; color: var(--text-muted); font-weight: 500; }

        /* Elevation View */
        .day-selector { display: flex; gap: 8px; margin-bottom: 12px; overflow-x: auto; padding-bottom: 4px; scrollbar-width: none; }
        .day-selector::-webkit-scrollbar { display: none; }
        .day-btn { padding: 6px 14px; border-radius: 10px; border: 1px solid var(--border); background: white; font-size: 0.8rem; font-weight: 700; cursor: pointer; white-space: nowrap; transition: 0.2s; }
        .day-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

        .elev-chart-box { height: 220px; background: white; border-radius: 16px; padding: 10px; margin-bottom: 1rem; border: 1px solid #f1f5f9; position: relative; }
        .elev-summary { display: flex; justify-content: space-between; font-size: 0.85rem; font-weight: 700; color: var(--primary); background: var(--primary-light); padding: 10px 15px; border-radius: 10px; }
        .chart-hint { font-size: 0.7rem; color: var(--text-muted); text-align: center; margin-top: 4px; }

        /* Mobile Layout */
        .mob-search-sheet {
            position: fixed; bottom: 0; left: 0; right: 0; background: white; 
            border-radius: 32px 32px 0 0; z-index: 1000; box-shadow: 0 -15px 50px rgba(0,0,0,0.15);
            transition: transform 0.5s var(--ease); max-height: 90vh; display: none; flex-direction: column;
            transform: translateY(calc(100% - 320px));
        }
        .mob-search-sheet.full { transform: translateY(0); }
        .sheet-handle-box { height: 32px; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; }
        .sheet-handle { width: 45px; height: 5px; background: #cbd5e1; border-radius: 10px; }
        .sheet-inner { flex: 1; overflow-y: auto; padding-bottom: 40px; }

        /* Loader */
        .master-loader { position: fixed; inset: 0; background: rgba(255,255,255,0.95); z-index: 2000; display: none; align-items: center; justify-content: center; flex-direction: column; gap: 1rem; }
        .master-spinner { width: 45px; height: 45px; border: 6px solid #e2e8f0; border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; }
        
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* POI Detail View */
        .poi-detail-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 3000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
        .poi-detail-card { 
            background: white; width: 90%; max-width: 450px; border-radius: 28px; overflow: hidden; 
            animation: slideUp 0.3s var(--ease); box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
        }
        .detail-img { width: 100%; height: 200px; object-fit: cover; }
        .detail-body { padding: 1.5rem; }
        .detail-title { font-size: 1.4rem; font-weight: 800; color: var(--text); margin-bottom: 8px; }
        .detail-tag { display: inline-block; background: var(--primary-light); color: var(--primary); padding: 4px 12px; border-radius: 8px; font-size: 0.75rem; font-weight: 800; margin-bottom: 1rem; }
        .detail-actions { display: flex; gap: 12px; margin-top: 1rem; }
        .btn-close { flex: 1; background: #f1f5f9; color: var(--text-muted); border: none; padding: 14px; border-radius: 14px; font-weight: 700; cursor: pointer; }

        @media (max-width: 900px) {
            .desktop-sidebar { display: none; }
            .mob-search-sheet { display: flex; }
        }
    </style>
</head>
<body>

    <div class="master-loader" id="loader">
        <div class="master-spinner"></div>
        <p style="font-weight: 800; color: var(--primary); font-size: 1.15rem; letter-spacing: 0.5px;">ROAD MASTER 正在調用精準數據...</p>
    </div>

    <div class="poi-detail-overlay" id="poi-detail">
        <div class="poi-detail-card">
            <div style="height:120px; background:var(--primary); display:flex; align-items:center; justify-content:center; font-size:4rem;">🚴‍♂️</div>
            <div class="detail-body">
                <span class="detail-tag" id="det-tag">店家資訊</span>
                <h3 class="detail-title" id="det-title">載入中...</h3>
                <p style="font-size: 0.9rem; color: var(--text-muted); line-height: 1.5;" id="det-desc">正在從 Google Maps 獲取最新狀態...</p>
                <div class="detail-actions">
                    <button class="btn-close" onclick="closeDetail()">關閉</button>
                    <a href="" target="_blank" class="btn-main" id="det-link" style="padding: 14px; flex: 2; text-decoration: none;">開啟 Google Maps 詳情</a>
                </div>
            </div>
        </div>
    </div>

    <div class="app-shell">
        <aside class="desktop-sidebar" id="ui-container-desktop"></aside>
        <main class="map-section"><div id="map"></div></main>
        <div class="mob-search-sheet" id="sheet">
            <div class="sheet-handle-box" onclick="toggleSheet()"><div class="sheet-handle"></div></div>
            <div class="sheet-inner" id="ui-container-mobile"></div>
        </div>
    </div>

    <template id="master-ui-tpl">
        <div class="search-container">
            <div class="header-title"><h1>ROAD MASTER</h1><span class="pro-label">Ultimate v6.0</span></div>
            <div class="input-group">
                <div class="search-wrapper">
                    <input type="text" class="input-start" placeholder="🔍 設定起點 (限台灣)" oninput="handleSearch(this)" autocomplete="off">
                    <div class="autocomplete-list"></div>
                </div>
                <div class="search-wrapper">
                    <input type="text" class="input-end" placeholder="🚩 設定終點 (限台灣)" oninput="handleSearch(this)" autocomplete="off">
                    <div class="autocomplete-list"></div>
                </div>
                <div style="display: flex; gap: 12px;">
                    <input type="number" class="input-days" value="9" min="1" max="30" style="width: 90px; padding: 14px; border-radius: 18px; border: 2px solid #f1f5f9; font-weight: 800; text-align: center;">
                    <button class="btn-main" style="flex: 1;" onclick="startPlanning(this)">⚡ 開始完整規劃</button>
                </div>
            </div>
        </div>
        <nav class="tabs-nav">
            <button class="tab-trigger active" onclick="showPanel('route', this)">📊 路線概覽</button>
            <button class="tab-trigger" onclick="showPanel('elev', this)">⛰️ 海拔坡度</button>
            <button class="tab-trigger" onclick="showPanel('food', this)">🍜 美食推薦</button>
            <button class="tab-trigger" onclick="showPanel('stay', this)">🏠 單車住宿</button>
            <button class="tab-trigger" onclick="showPanel('sos', this)">🆘 緊急補給</button>
        </nav>
        <div class="main-content">
            <div class="panel panel-route active"><div class="results-box"></div></div>
            <div class="panel panel-elev">
                <div class="day-selector"></div>
                <div class="elev-chart-box">
                    <canvas class="elev-canvas"></canvas>
                </div>
                <div class="chart-hint">💡 點擊圖表點：地標跳轉 | 雙擊：開啟 Google Maps</div>
                <div class="elev-info" style="margin-top:1rem;"></div>
            </div>
            <div class="panel panel-food"></div>
            <div class="panel panel-stay"></div>
            <div class="panel panel-sos"></div>
        </div>
    </template>

    <script>
        let map, routeLayer, chartDesktop, chartMobile;
        let activeMarkers = [];
        let GlobalRouteData = null; // v6.0 Storage for coordinate mapping
        const CF_GATEWAY = "https://hidden-surf-0579.love7053150.workers.dev/";

        function initApp() {
            map = L.map('map', { zoomControl: false, attributionControl: false }).setView([23.6, 121.3], 8);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);
            L.control.zoom({ position: 'topright' }).addTo(map);
            renderTemplates();
        }

        function renderTemplates() {
            const tpl = document.getElementById('master-ui-tpl').content;
            document.getElementById('ui-container-desktop').appendChild(tpl.cloneNode(true));
            document.getElementById('ui-container-mobile').appendChild(tpl.cloneNode(true));
            document.querySelectorAll('.results-box').forEach(b => b.innerHTML = `<div style="text-align:center; padding: 3rem 0; color: #94a3b8;"><div style="font-size: 3rem; margin-bottom: 1rem;">🚴‍♂️</div><h3>準備好環島了嗎？</h3><p>輸入起終點，Road Master Pro 將為您量身打造職業級行程。</p></div>`);
        }

        function toggleSheet() { document.getElementById('sheet').classList.toggle('full'); }
        function showPanel(id, btn) {
            const scope = btn.closest('.desktop-sidebar, .sheet-inner');
            scope.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            scope.querySelector('.panel-' + id).classList.add('active');
            scope.querySelectorAll('.tab-trigger').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        // --- Autocomplete Fix ---
        let acTimer;
        function handleSearch(input) {
            const list = input.nextElementSibling;
            clearTimeout(acTimer);
            if(input.value.length < 1) { list.style.display = 'none'; return; }
            acTimer = setTimeout(async () => {
                const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(input.value)}&countrycodes=tw&limit=5`);
                const data = await res.json();
                if(data.length === 0) { list.style.display = 'none'; return; }
                list.innerHTML = data.map(i => `<div class="autocomplete-item" onclick="selectAddr(this, '${i.display_name.replace(/'/g, "\\'")}', '${i.lat}', '${i.lon}')">${i.display_name.split(',')[0]} <span style="font-size:0.7rem; color:#94a3b8;">${i.display_name.split(',').slice(1,3).join(',')}</span></div>`).join('');
                list.style.display = 'block';
            }, 300);
        }

        function selectAddr(el, name, lat, lon) {
            const wrapper = el.closest('.search-wrapper');
            const input = wrapper.querySelector('input');
            input.value = name; // Use full name for better UX
            input.dataset.lat = lat;
            input.dataset.lon = lon;
            wrapper.querySelector('.autocomplete-list').style.display = 'none';
            
            // Sync both Mobile and Desktop inputs so planning works from either
            const isStart = input.classList.contains('input-start');
            const targetClass = isStart ? '.input-start' : '.input-end';
            document.querySelectorAll(targetClass).forEach(inv => {
                inv.value = name;
                inv.dataset.lat = lat;
                inv.dataset.lon = lon;
            });
        }

        // --- Planning & Accuracy ---
        async function startPlanning(btn) {
            const scope = btn.closest('.desktop-sidebar, .sheet-inner');
            const sIn = scope.querySelector('.input-start');
            const eIn = scope.querySelector('.input-end');
            const days = scope.querySelector('.input-days').value;

            if(!sIn.value || !eIn.value) return alert("請輸入起點與終點");
            document.getElementById('loader').style.display = 'flex';

            try {
                // Critical: Use accurate lat/lon from autocomplete or re-geocode
                const start = sIn.dataset.lat ? {lat: sIn.dataset.lat, lon: sIn.dataset.lon} : await geocode(sIn.value);
                const end = eIn.dataset.lat ? {lat: eIn.dataset.lat, lon: eIn.dataset.lon} : await geocode(eIn.value);
                if(!start || !end) throw new Error("地點辨別失敗，請從建議清單中選擇");

                const routeRes = await fetch(`https://router.project-osrm.org/route/v1/cycling/${start.lon},${start.lat};${end.lon},${end.lat}?overview=full&geometries=geojson`);
                const rData = await routeRes.json();
                if(!rData.routes[0]) throw new Error("無法規劃路線");

                const route = rData.routes[0];
                await renderMasterPlan(route, sIn.value, eIn.value, days);
                if(window.innerWidth <= 900) document.getElementById('sheet').classList.add('full');
            } catch(e) { alert(e.message); } finally { document.getElementById('loader').style.display = 'none'; }
        }

        async function geocode(q) {
            const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q)}&countrycodes=tw&limit=1`);
            const d = await res.json();
            return d[0] ? {lat: d[0].lat, lon: d[0].lon} : null;
        }

        async function fetchWeather(lat, lon) {
            try {
                const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,weather_code,wind_speed_10m,wind_direction_10m&timezone=Asia%2FTaipei`);
                const data = await res.json();
                const cur = data.current;
                const codes = {0:"☀️ 晴朗", 1:"🌤️ 晴時多雲", 2:"⛅ 多雲", 3:"☁️ 陰天", 45:"🌫️ 有霧", 61:"🌧️ 小雨", 95:"⚡ 雷陣雨"};
                return {
                    temp: cur.temperature_2m,
                    wind: cur.wind_speed_10m,
                    dir: cur.wind_direction_10m,
                    desc: codes[cur.weather_code] || "🌤️ 良好"
                };
            } catch(e) { return null; }
        }

        async function renderMasterPlan(route, s, e, days) {
            GlobalRouteData = route; // Store for chart mapping
            if(routeLayer) map.removeLayer(routeLayer);
            activeMarkers.forEach(m => map.removeLayer(m));
            activeMarkers = [];
            
            routeLayer = L.geoJSON(route.geometry, { style: { color:'#2563eb', weight:8, opacity:0.9 } }).addTo(map);
            map.fitBounds(routeLayer.getBounds(), { padding: [60,60] });

            const dist = (route.distance / 1000).toFixed(1);
            const time = (dist / 17).toFixed(1);
            const diff = Math.min(10, Math.ceil(dist / 110 + 2));

            const w = await fetchWeather(route.geometry.coordinates[0][1], route.geometry.coordinates[0][0]);
            const weatherUI = w ? `
                <div style="background:#f1f5f9; padding:12px; border-radius:14px; margin-top:10px; display:flex; justify-content:space-around; align-items:center; font-size:0.85rem; font-weight:700;">
                    <span title="天氣">${w.desc}</span>
                    <span title="氣溫">🌡️ ${w.temp}°C</span>
                    <span title="風速">🚩 ${w.wind} km/h</span>
                </div>
            ` : '';

            const summary = `
                <div class="card-pro">
                    <div style="display:flex; justify-content:space-between;">
                        <h2 style="font-size:1.8rem; font-weight:800;">環島里程 ${dist}km</h2>
                        <div style="background:${diff > 7 ? '#fee2e2':'#dcfce7'}; color:${diff > 7 ? '#991b1b':'#166534'}; padding:10px 15px; border-radius:15px; text-align:center;">
                            <div style="font-size:0.6rem; font-weight:900;">難度</div><div style="font-size:1.4rem; font-weight:900;">${diff}</div>
                        </div>
                    </div>
                    ${weatherUI}
                    <div style="margin-top:1rem; display:grid; grid-template-columns: 1fr 1fr; gap:12px;">
                        <div style="background:white; padding:12px; border-radius:10px; border:1px solid #f1f5f9;">天數：${days}天</div>
                        <div style="background:white; padding:12px; border-radius:10px; border:1px solid #f1f5f9;">預估：${time}時</div>
                    </div>
                </div>
            `;
            updateUX('.panel-route .results-box', summary);
            
            // Accurate Elevation Profile & Day Selector
            const elevData = generateFakeElevation(dist); 
            GlobalRouteData.elevData = elevData;
            
            // Build Day Selector UI
            const dayHtml = `<button class="day-btn active" onclick="switchDay('all', this)">全程</button>` + 
                Array.from({length: days}, (_, i) => `<button class="day-btn" onclick="switchDay(${i+1}, this)">Day ${i+1}</button>`).join('');
            document.querySelectorAll('.day-selector').forEach(el => el.innerHTML = dayHtml);

            updateElevation(elevData, dist);

            // POIs - Final Stability Fix: Unified single-fetch architecture
            currentPOIs = []; 
            await fetchAllPOIs(route);
        }

        function switchDay(day, btn) {
            const scope = btn.closest('.desktop-sidebar, .sheet-inner');
            scope.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            const dist = (GlobalRouteData.distance / 1000);
            const totalDays = parseInt(scope.querySelector('.input-days').value) || 1;
            const fullData = GlobalRouteData.elevData;

            if(day === 'all') {
                updateElevation(fullData, dist.toFixed(1));
            } else {
                const startIdx = Math.floor((day-1) * (fullData.length / totalDays));
                const endIdx = Math.floor(day * (fullData.length / totalDays));
                const subData = fullData.slice(startIdx, endIdx);
                // Adjust x-axis for segment
                const segmentDist = dist / totalDays;
                const adjusted = subData.map((d, i) => ({ x: (segmentDist / (subData.length-1) * i).toFixed(1), y: d.y }));
                updateElevation(adjusted, segmentDist.toFixed(1), true);
            }
        }

        function generateFakeElevation(dist) {
            const p = 60;
            return Array.from({length: p}, (_, i) => ({
                x: (dist / (p-1) * i).toFixed(1),
                y: Math.max(0, 30 + Math.sin(i/4)*100 + (Math.random() > 0.8 ? Math.random()*500 : 0)).toFixed(0)
            }));
        }

        function updateElevation(data, dist) {
            ['desktop', 'mobile'].forEach(m => {
                const root = document.getElementById('ui-container-' + m);
                const ctx = root.querySelector('.elev-canvas').getContext('2d');
                if(m==='desktop' && chartDesktop) chartDesktop.destroy();
                if(m==='mobile' && chartMobile) chartMobile.destroy();
                const chart = new Chart(ctx, {
                    type: 'line',
                    data: { labels: data.map(d => d.x + 'k'), datasets: [{ data: data.map(d => d.y), borderColor: '#2563eb', backgroundColor: 'rgba(37,99,235,0.08)', fill:true, pointRadius:0, tension:0.3 }] },
                    options: { 
                        maintainAspectRatio: false, 
                        plugins: { legend: { display: false } }, 
                        scales: { x: { grid: { display:false } }, y: { beginAtZero:true } },
                        onClick: (e, items) => {
                            if (items.length > 0 && GlobalRouteData) {
                                const idx = items[0].index;
                                const pts = GlobalRouteData.geometry.coordinates;
                                // Map chart sample index back to roughly the correct coordinate
                                const realIdx = Math.floor(idx * (pts.length / data.length));
                                const p = pts[realIdx];
                                if(p) {
                                    map.setView([p[1], p[0]], 16);
                                    const gLink = `https://www.google.com/maps/search/?api=1&query=${p[1]},${p[0]}`;
                                    L.popup().setLatLng([p[1], p[0]]).setContent(`海拔：${data[idx].y}m<br><a href="${gLink}" target="_blank" style="color:#2563eb;font-weight:800;">🔍 查看街景/店家</a>`).openOn(map);
                                }
                            }
                        }
                    }
                });
                if(m==='desktop') chartDesktop = chart; else chartMobile = chart;
                root.querySelector('.elev-info').innerHTML = `<div class="elev-summary"><span>起點：${data[0].y}m</span><span>最高：${Math.max(...data.map(d=>d.y))}m</span><span>累積爬升：~${(dist*4.5).toFixed(0)}m</span></div>`;
            });
        }

        let currentPOIs = [];

        async function fetchAllPOIs(route) {
            const pts = route.geometry.coordinates;
            const sampleStep = Math.max(1, Math.floor(pts.length / 8));
            const sampled = pts.filter((_, i) => i % sampleStep === 0).slice(0, 8);
            
            // Unified Query: Search multiple categories around points, exclude disused/closed
            const clauses = sampled.map(p => `
                nwr["amenity"~"restaurant|cafe|police|hospital|fire_station|pharmacy"]["disused"!~"yes"]["abandoned"!~"yes"]["closed"!~"yes"](around:2500, ${p[1]}, ${p[0]});
                nwr["tourism"~"hotel|hostel|guest_house|motel"]["disused"!~"yes"]["abandoned"!~"yes"]["closed"!~"yes"](around:2500, ${p[1]}, ${p[0]});
            `).join('');
            
            const q = `[out:json][timeout:50];(${clauses});out center;`;
            
            try {
                const res = await fetch(`https://overpass-api.de/api/interpreter?data=${encodeURIComponent(q)}`);
                if(!res.ok) throw new Error("Overpass Server Busy");
                const data = await res.json();
                
                // Deduplicate and categorized
                const seen = new Set();
                const all = data.elements.filter(e => {
                    const n = e.tags?.name;
                    if(n && !seen.has(n)) { seen.add(n); return true; }
                    return false;
                });

                currentPOIs = all;

                const renderCat = (filterFn, selector, icon, label) => {
                    const items = all.filter(filterFn).slice(0, 15);
                    const html = items.length > 0 ? items.map(p => {
                        const name = p.tags.name;
                        const idx = currentPOIs.indexOf(p);
                        return `
                        <div class="poi-block" onclick="showPoiDetail(${idx})">
                            <div class="poi-icon-box">${icon}</div>
                            <div class="poi-info">
                                <div class="poi-name">${name}</div>
                                <div class="poi-meta">🚴‍♂️ 點擊查看 | <span style="color:#e11d48">🔍 請務必確認營業狀態</span></div>
                            </div>
                        </div>`;
                    }).join('') : `<div style="text-align:center; padding:3rem; color:#94a3b8;">沿線暫無優選${label}數據</div>`;
                    
                    updateUX(selector, html);
                    
                    items.forEach(p => {
                        const lat = p.lat || p.center.lat;
                        const lon = p.lon || p.center.lon;
                        const m = L.marker([lat, lon], { icon: L.divIcon({ html: `<span>${icon}</span>`, className:'', iconSize:[28,28] }) }).addTo(map).bindPopup(p.tags.name);
                        activeMarkers.push(m);
                    });
                };

                renderCat(e => e.tags.amenity?.match(/restaurant|cafe/), '.panel-food', '🍜', '美食');
                renderCat(e => e.tags.tourism?.match(/hotel|hostel|guest_house|motel/), '.panel-stay', '🏠', '住宿');
                renderCat(e => e.tags.amenity?.match(/police|hospital|fire_station|pharmacy/), '.panel-sos', '🆘', '緊急');

                document.querySelectorAll('.poi-img').forEach(img => { if(img.dataset.src) img.src = img.dataset.src; });

            } catch(e) { 
                console.error("FetchAllPOIs Error:", e);
                ['.panel-food', '.panel-stay', '.panel-sos'].forEach(sel => 
                    updateUX(sel, `<div style="text-align:center; padding:3rem; color:#ef4444;">數據連線繁忙，請稍後再試</div>`));
            }
        }

        // --- Detail View Logic ---
        function showPoiDetail(idx) {
            const p = currentPOIs[idx];
            if(!p) return;
            const lat = p.lat || p.center.lat;
            const lon = p.lon || p.center.lon;
            const name = p.tags.name;

            document.getElementById('det-title').innerText = name;
            document.getElementById('det-tag').innerText = p.tags.amenity || p.tags.tourism || '單車友善點';
            document.getElementById('det-desc').innerText = `已鎖定實體座標：${lat.toFixed(4)}, ${lon.toFixed(4)}。點擊下方按鈕開啟 Google Maps 獲取實景照片、營業時間與評價。`;
            
            // Precision Google Link: Search by NAME and LOCATION for 100% accuracy
            const gLink = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(name)}+${lat},${lon}`;
            document.getElementById('det-link').href = gLink;

            document.getElementById('poi-detail').style.display = 'flex';
            map.setView([lat, lon], 16);
        }

        function closeDetail() { document.getElementById('poi-detail').style.display = 'none'; }

        function panToPoi(lat, lon, name) {
            map.setView([lat, lon], 16);
            if(window.innerWidth <= 900) toggleSheet();
        }

        function updateUX(sel, html) { document.querySelectorAll(sel).forEach(p => p.innerHTML = html); }

        window.onload = initApp;
    </script>
</body>
</html>
