<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Road Master | 單車智慧導航</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=Noto+Sans+TC:wght@400;500;700;900&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --p: #f97316;
            --p-light: #fdba74;
            --bg: #030712;
            --c: #1e293b;
            --t: #f1f5f9;
            --m: #94a3b8;
            --border: rgba(255, 255, 255, 0.08);
            --glass: rgba(30, 41, 59, 0.7);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', 'Noto Sans TC', sans-serif;
        }

        body {
            background: var(--bg);
            color: var(--t);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background-image:
                radial-gradient(circle at 0% 0%, rgba(249, 115, 22, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 100% 100%, rgba(56, 189, 248, 0.05) 0%, transparent 40%);
        }

        /* Header */
        header {
            padding: 1rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(3, 7, 18, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            z-index: 10;
        }

        .logo {
            font-weight: 900;
            font-size: 1.25rem;
            color: var(--p);
            letter-spacing: 0.5px;
        }

        /* Main Chat Area - Centered and Max Width */
        main {
            flex: 1;
            overflow-y: auto;
            padding: 2rem 1.5rem 6rem;
            scroll-behavior: smooth;
            display: flex;
            justify-content: center;
            /* Center the chat thread */
        }

        #chat-thread {
            width: 100%;
            max-width: 800px;
            /* limits width so text is readable */
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        /* Message Bubbles */
        .msg {
            display: flex;
            flex-direction: column;
            animation: fadeIn 0.3s ease-out;
        }

        .msg.user {
            align-items: flex-end;
        }

        .msg.ai {
            align-items: flex-start;
        }

        .bubble {
            max-width: 100%;
            padding: 1.5rem;
            border-radius: 16px;
            line-height: 1.7;
            font-size: 1rem;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        }

        .msg.user .bubble {
            background: var(--p);
            color: #fff;
            border-bottom-right-radius: 4px;
            font-weight: 500;
        }

        .msg.ai .bubble {
            background: var(--glass);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
            backdrop-filter: blur(10px);
            color: var(--t);
        }

        /* Rich content styling inside AI bubble */
        .bubble h3 {
            color: var(--p-light);
            margin: 1.5rem 0 1rem;
            font-size: 1.2rem;
        }

        .bubble h3:first-child {
            margin-top: 0;
        }

        .bubble p {
            margin-bottom: 1rem;
        }

        .bubble p:last-child {
            margin-bottom: 0;
        }

        .bubble strong {
            color: #fff;
            font-weight: 700;
            background: rgba(249, 115, 22, 0.2);
            padding: 0 4px;
            border-radius: 4px;
        }

        .bubble ul,
        .bubble ol {
            margin: 1rem 0;
            padding-left: 1.5rem;
        }

        .bubble li {
            margin-bottom: 0.5rem;
        }

        /* Premium Table */
        .bubble table {
            width: 100%;
            border-collapse: collapse;
            margin: 1.5rem 0;
            font-size: 0.95rem;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            overflow: hidden;
        }

        .bubble th {
            background: rgba(255, 255, 255, 0.05);
            color: var(--p-light);
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }

        .bubble td {
            padding: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.02);
        }

        .bubble tr:last-child td {
            border-bottom: none;
        }

        .bubble tr:nth-child(even) td {
            background: rgba(255, 255, 255, 0.01);
        }

        /* Form Card */
        .plan-card {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
            padding: 1.5rem;
            border-radius: 12px;
            margin-top: 1rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .form-row {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-label {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--p-light);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .quick-chips {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .chip {
            background: #334155;
            color: #cbd5e1;
            padding: 4px 12px;
            border-radius: 50px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid transparent;
        }

        .chip:hover {
            background: var(--p);
            color: #fff;
        }

        .form-input {
            background: #0f172a;
            border: 1px solid #334155;
            color: #fff;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            transition: 0.2s;
        }

        .form-input:focus {
            border-color: var(--p);
        }

        .btn-primary {
            background: var(--p);
            color: #fff;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            text-align: center;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .btn-primary:hover {
            background: #ea580c;
            transform: translateY(-2px);
        }

        /* Tab Widget Styling */
        .tabs-container {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            margin-top: 1rem;
        }

        .tabs-nav {
            display: flex;
            background: rgba(0, 0, 0, 0.4);
            border-bottom: 1px solid var(--border);
            overflow-x: auto;
        }

        .tab-btn {
            flex: 1;
            background: transparent;
            color: var(--m);
            border: none;
            padding: 12px 16px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            white-space: nowrap;
            border-bottom: 2px solid transparent;
        }

        .tab-btn:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.05);
        }

        .tab-btn.active {
            color: var(--p);
            border-bottom-color: var(--p);
            background: rgba(249, 115, 22, 0.05);
        }

        .tab-pane {
            display: none;
            padding: 1.5rem;
            animation: fadeIn 0.3s;
        }

        .tab-pane.active {
            display: block;
        }

        /* Input Dock */
        .dock {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 1rem 1.5rem 1.5rem;
            background: linear-gradient(transparent, var(--bg) 70%);
            display: flex;
            justify-content: center;
        }

        .dock-bar {
            width: 100%;
            max-width: 800px;
            background: var(--c);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 6px;
            display: flex;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .dock-input {
            flex: 1;
            background: transparent;
            border: none;
            color: #fff;
            padding: 10px 16px;
            font-size: 1rem;
            outline: none;
        }

        .dock-btn {
            background: var(--p);
            color: #fff;
            border: none;
            padding: 0 20px;
            height: 40px;
            border-radius: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .dock-btn:hover {
            background: #ea580c;
        }

        /* Loader */
        .typing-dots {
            display: flex;
            gap: 5px;
            padding: 10px 5px;
        }

        .dot {
            width: 8px;
            height: 8px;
            background: var(--p);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .dot:nth-child(1) {
            animation-delay: -0.32s;
        }

        .dot:nth-child(2) {
            animation-delay: -0.16s;
        }

        @keyframes bounce {

            0%,
            80%,
            100% {
                transform: scale(0);
            }

            40% {
                transform: scale(1);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Hide Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 10px;
        }
    </style>
</head>

<body>

    <header>
        <div class="logo">ROAD MASTER</div>
        <div style="font-size:0.85rem; color:var(--m); font-weight:600;">AI 單車管家</div>
    </header>

    <main id="chat-scroller">
        <div id="chat-thread">
            <!-- AI Welcome Bubble with Form -->
            <div class="msg ai">
                <div class="bubble">
                    <p>👋 您好！我是 Road Master，專門處理單車行程規劃與疑難雜症。</p>
                    <p style="color:var(--m); font-size:0.9rem;">直接填寫下方表單以產生專屬「智慧行程分類卡」，或在底部對話框問我任何裝備、路況問題。</p>

                    <div class="plan-card">
                        <div class="form-row">
                            <div class="form-label">
                                <span>📍 出發點</span>
                                <div class="quick-chips">
                                    <span class="chip" onclick="iv('start','台北火車站')">台北</span>
                                    <span class="chip" onclick="iv('start','新竹高鐵站')">新竹</span>
                                    <span class="chip" onclick="iv('start','台中朝馬')">台中</span>
                                </div>
                            </div>
                            <input type="text" id="start" class="form-input" placeholder="輸入出發地點">
                        </div>
                        <div class="form-row">
                            <div class="form-label">
                                <span>🏁 目的地</span>
                                <div class="quick-chips">
                                    <span class="chip" onclick="iv('end','花蓮太魯閣')">太魯閣</span>
                                    <span class="chip" onclick="iv('end','恆春古城')">恆春</span>
                                    <span class="chip" onclick="iv('end','大環島一圈')">環島</span>
                                </div>
                            </div>
                            <input type="text" id="end" class="form-input" placeholder="輸入目的地">
                        </div>
                        <div class="form-row">
                            <div class="form-label">
                                <span>⏱️ 騎乘天數</span>
                                <div class="quick-chips">
                                    <span class="chip" onclick="iv('days','1天')">1天</span>
                                    <span class="chip" onclick="iv('days','3天')">3天</span>
                                    <span class="chip" onclick="iv('days','9天')">9天</span>
                                </div>
                            </div>
                            <input type="text" id="days" class="form-input" placeholder="預計使用天數">
                        </div>
                        <button class="btn-primary" onclick="submitForm()">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon>
                            </svg>
                            產出行程分析報表
                        </button>
                    </div>
                </div>
            </div>

            <!-- Dynamic Messages will be injected here -->
        </div>
    </main>

    <!-- Bottom Chat Input -->
    <div class="dock">
        <div class="dock-bar">
            <input type="text" id="chat-input" class="dock-input" placeholder="或者您可以直接在這裡問我問題 (例: 蘇花公路怎麼騎?)"
                onkeypress="if(event.key==='Enter')submitChat()">
            <button class="dock-btn" onclick="submitChat()">傳送</button>
        </div>
    </div>

    <script>
        const CF_GATEWAY = "https://hidden-surf-0579.love7053150.workers.dev/";
        const scroller = document.getElementById('chat-scroller');
        const thread = document.getElementById('chat-thread');
        const input = document.getElementById('chat-input');

        // System prompt forces AI to use EXACT headings so we can parse them into tabs
        const SYSTEM_PROMPT = `你是高階單車規劃教練。
使用者需要豐富的資訊，但討厭文字冗長難讀，所以你**必須以結構化的方式產出**，並利用豐富的說明。

【強制輸出規範】：
如果是規劃行程，你必須嚴格輸出以下三個標題，不要多也不要少：
### 📅 路線排程
(在此用表格詳細列出每天的 路線、公里數、爬升、詳細重點說明)
### 🎒 裝備清單
(在此列出必備的衣服、維修工具與補給建議)
### ⚠️ 實戰守則
(在此寫出針對此路線該注意的天氣、交通、體能建議)

如果是普通問答，直接使用 Markdown 清晰條列回答即可，確保有完整的說明與分析。避免流水帳。`;

        function iv(id, val) {
            document.getElementById(id).value = val;
        }

        function scrollBottom() {
            requestAnimationFrame(() => {
                scroller.scrollTo({ top: scroller.scrollHeight, behavior: 'smooth' });
            });
        }

        function addMessage(role, htmlContent) {
            const msg = document.createElement('div');
            msg.className = `msg ${role}`;
            msg.innerHTML = `<div class="bubble">${htmlContent}</div>`;
            thread.appendChild(msg);
            scrollBottom();
            return msg;
        }

        function showLoader() {
            const id = 'loader-' + Date.now();
            const msg = document.createElement('div');
            msg.id = id;
            msg.className = `msg ai`;
            msg.innerHTML = `<div class="bubble" style="padding: 10px 15px;"><div class="typing-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>`;
            thread.appendChild(msg);
            scrollBottom();
            return id;
        }

        function removeLoader(id) {
            const el = document.getElementById(id);
            if (el) el.remove();
        }

        // Function to parse markdown and convert H3 sections into interactive tabs
        function renderTabbedContent(markdownText) {
            // Look for occurrences of "### "
            const parts = markdownText.split(/(?=### )/);

            if (parts.length <= 1) {
                // No sections found, return regular parsed markdown
                return marked.parse(markdownText);
            }

            let tabsHtml = `<div class="tabs-container"><div class="tabs-nav">`;
            let contentHtml = `</div><div class="tabs-content">`;

            let validTabs = 0;

            parts.forEach((part, index) => {
                if (part.trim() === '') return;

                // Extract the title from the line starting with ###
                let titleLine = '';
                let body = part;

                if (part.startsWith('### ')) {
                    const nlIndex = part.indexOf('\n');
                    if (nlIndex !== -1) {
                        titleLine = part.substring(4, nlIndex).trim();
                        body = part.substring(nlIndex + 1);
                    } else {
                        titleLine = part.substring(4).trim();
                        body = '';
                    }
                } else {
                    titleLine = "綜合說明";
                }

                const activeClass = validTabs === 0 ? 'active' : '';
                tabsHtml += `<button class="tab-btn ${activeClass}" onclick="switchTab(this, ${validTabs})">${marked.parseInline(titleLine)}</button>`;
                contentHtml += `<div class="tab-pane ${activeClass}" data-index="${validTabs}">${marked.parse(body)}</div>`;
                validTabs++;
            });

            contentHtml += `</div></div>`;
            return validTabs > 0 ? (tabsHtml + contentHtml) : marked.parse(markdownText);
        }

        // Global function for tab switching
        window.switchTab = function (btn, index) {
            const container = btn.closest('.tabs-container');
            // Reset all buttons
            container.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            // Reset all panes
            container.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
            container.querySelector(`.tab-pane[data-index="${index}"]`).classList.add('active');
        };

        async function submitForm() {
            const s = document.getElementById('start').value;
            const e = document.getElementById('end').value;
            const d = document.getElementById('days').value;
            if (!s || !e || !d) {
                alert("麻煩填寫一下出發點、目的地與天數喔！");
                return;
            }

            const query = `幫我規劃單車行程。起點：${s}，終點：${e}，預計天數：${d}。`;
            addMessage('user', `📍 從 **${s}** 出發，騎到 **${e}**，預計花 **${d}** 完成。請幫我出報告。`);
            await requestAI(query);
        }

        async function submitChat() {
            const txt = input.value.trim();
            if (!txt) return;
            input.value = '';
            addMessage('user', txt);
            await requestAI(txt);
        }

        async function requestAI(promptText) {
            const loaderId = showLoader();

            try {
                const res = await fetch(CF_GATEWAY, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [{
                                text: SYSTEM_PROMPT + "\\n\\n使用者：" + promptText
                            }]
                        }]
                    })
                });

                if (!res.ok) throw new Error("API 連線失敗");
                const data = await res.json();
                removeLoader(loaderId);

                const rawText = data.candidates?.[0]?.content?.parts?.[0]?.text;
                if (!rawText) throw new Error("無效內容");

                // Use our custom tab parser
                const htmlContent = renderTabbedContent(rawText);
                addMessage('ai', htmlContent);

            } catch (e) {
                console.error(e);
                removeLoader(loaderId);
                addMessage('ai', `<span style="color:#ef4444">連線中斷：${e.message}。請檢查網路狀態。</span>`);
            }
        }
    </script>
</body>

</html>
