<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Road Master | 精準單車規劃</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --primary: #f97316;
            --text: #f8fafc;
            --muted: #94a3b8;
        }

        * {
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem;
        }

        .container {
            max-width: 600px;
            width: 100%;
        }

        header {
            text-align: center;
            margin-bottom: 2rem;
        }

        header h1 {
            font-size: 2rem;
            font-weight: 900;
            color: var(--primary);
            letter-spacing: -1px;
        }

        header p {
            color: var(--muted);
            font-size: 0.9rem;
            margin-top: 0.5rem;
        }

        .card {
            background: var(--card);
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            font-weight: 700;
            margin-bottom: 0.8rem;
            color: #e2e8f0;
            font-size: 0.95rem;
        }

        .form-control {
            width: 100%;
            background: #0f172a;
            border: 1px solid #334155;
            color: white;
            padding: 14px 16px;
            border-radius: 12px;
            font-size: 1rem;
            outline: none;
            transition: 0.2s;
        }

        .form-control:focus {
            border-color: var(--primary);
        }

        .tags {
            display: flex;
            gap: 8px;
            margin-top: 8px;
            flex-wrap: wrap;
        }

        .tag {
            background: #334155;
            color: #cbd5e1;
            padding: 6px 12px;
            border-radius: 50px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .tag:hover {
            background: var(--primary);
            color: white;
        }

        .btn {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 900;
            cursor: pointer;
            margin-top: 1rem;
            transition: 0.2s;
        }

        .btn:hover {
            background: #ea580c;
            transform: translateY(-2px);
        }

        .btn:active {
            transform: translateY(0);
        }

        .result-container {
            margin-top: 2rem;
            display: none;
        }

        .ai-result {
            background: var(--card);
            border-radius: 20px;
            padding: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* 極簡 Markdown 樣式 */
        .ai-result table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 1.5rem;
            font-size: 0.95rem;
        }

        .ai-result th {
            background: rgba(255, 255, 255, 0.05);
            padding: 12px 8px;
            text-align: left;
            color: var(--primary);
            border-bottom: 2px solid #334155;
        }

        .ai-result td {
            padding: 12px 8px;
            border-bottom: 1px solid #334155;
            color: #cbd5e1;
        }

        .ai-result ul {
            padding-left: 20px;
            color: #cbd5e1;
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .ai-result li {
            margin-bottom: 6px;
        }

        .ai-result strong {
            color: white;
        }

        .loader {
            display: none;
            text-align: center;
            padding: 2rem;
            color: var(--primary);
            font-weight: 700;
            letter-spacing: 1px;
        }

        .question-bar {
            margin-top: 1rem;
            display: flex;
            gap: 10px;
        }

        .question-bar input {
            flex: 1;
        }
    </style>
</head>

<body>

    <div class="container">
        <header>
            <h1>ROAD MASTER</h1>
            <p>10秒鐘，產出最精練的單車行程</p>
        </header>

        <div class="card" id="form-card">
            <div class="form-group">
                <label>📍 起點</label>
                <input type="text" id="start" class="form-control" placeholder="例：台北火車站">
                <div class="tags">
                    <span class="tag" onclick="setVal('start', '台北')">台北</span>
                    <span class="tag" onclick="setVal('start', '新竹')">新竹</span>
                    <span class="tag" onclick="setVal('start', '台中')">台中</span>
                    <span class="tag" onclick="setVal('start', '高雄')">高雄</span>
                </div>
            </div>

            <div class="form-group">
                <label>🏁 終點</label>
                <input type="text" id="end" class="form-control" placeholder="例：墾丁大街">
                <div class="tags">
                    <span class="tag" onclick="setVal('end', '花蓮')">花蓮</span>
                    <span class="tag" onclick="setVal('end', '台東')">台東</span>
                    <span class="tag" onclick="setVal('end', '武嶺')">武嶺</span>
                    <span class="tag" onclick="setVal('end', '環島一圈')">環島一圈</span>
                </div>
            </div>

            <div class="form-group">
                <label>⏱️ 天數</label>
                <input type="text" id="days" class="form-control" placeholder="例：3天">
                <div class="tags">
                    <span class="tag" onclick="setVal('days', '1天')">1天</span>
                    <span class="tag" onclick="setVal('days', '3天')">3天</span>
                    <span class="tag" onclick="setVal('days', '5天')">5天</span>
                    <span class="tag" onclick="setVal('days', '9天')">9天</span>
                </div>
            </div>

            <button class="btn" onclick="generate()">⚡ 產出精簡行程</button>

            <div style="margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid #334155;">
                <label
                    style="display:block; font-weight:700; margin-bottom:0.8rem; color:#e2e8f0; font-size:0.95rem;">💡
                    或直接問問題</label>
                <div class="question-bar">
                    <input type="text" id="q" class="form-control" placeholder="例如：新手環島要帶什麼？"
                        onkeypress="if(event.key==='Enter')ask()">
                    <button class="btn" style="width: auto; margin-top: 0; padding: 0 20px;" onclick="ask()">問</button>
                </div>
            </div>
        </div>

        <div class="loader" id="loader">⚡ 引擎運算中...</div>

        <div class="result-container" id="result-container">
            <button class="btn" style="background:#334155; margin-bottom:1rem; padding: 10px; font-size:0.9rem;"
                onclick="reset()">← 重新規劃</button>
            <div class="ai-result" id="ai-result"></div>
        </div>
    </div>

    <script>
        const CF_GATEWAY = "https://hidden-surf-0579.love7053150.workers.dev/";

        // 強制 AI 閉嘴、只出重點的 Prompt
        const SYSTEM_PROMPT = `你是單車環島教練。使用者只想要「最乾的乾貨」。
【絕對規則 - 違反即失敗】：
1. 嚴禁廢話、自我介紹、問候語。字數越少越好！
2. 行程規劃直接輸出表格 (欄位：天數 | 路線 | 公里 | 10字短評)。
3. 其他注意事項或解答，直接條列式回答（最多 3 點，每點不超過 15 個字）。
4. 總輸出字數必須嚴格控制在 250 字以內，不要寫長篇大論！
5. 不相關的問題請用10個字拒絕。`;

        function setVal(id, val) { document.getElementById(id).value = val; }

        function reset() {
            document.getElementById('form-card').style.display = 'block';
            document.getElementById('result-container').style.display = 'none';
            window.scrollTo(0, 0);
        }

        async function generate() {
            const s = document.getElementById('start').value.trim();
            const e = document.getElementById('end').value.trim();
            const d = document.getElementById('days').value.trim();
            if (!s || !e || !d) return alert("請填寫起點、終點與天數！");

            await callAPI(`幫我規劃單車行程。起點：${s}，終點：${e}，天數：${d}。直接給表格跟3個核心注意事項。`);
        }

        async function ask() {
            const q = document.getElementById('q').value.trim();
            if (!q) return;
            document.getElementById('q').value = '';
            await callAPI(q);
        }

        async function callAPI(text) {
            document.getElementById('form-card').style.display = 'none';
            document.getElementById('result-container').style.display = 'none';
            document.getElementById('loader').style.display = 'block';

            try {
                const res = await fetch(CF_GATEWAY, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: SYSTEM_PROMPT + "\n\n使用者需求：" + text }] }]
                    })
                });

                if (!res.ok) throw new Error("連線失敗");
                const data = await res.json();

                let md = data.candidates?.[0]?.content?.parts?.[0]?.text;
                if (!md) throw new Error("無效內容");

                document.getElementById('ai-result').innerHTML = marked.parse(md);
                document.getElementById('loader').style.display = 'none';
                document.getElementById('result-container').style.display = 'block';
            } catch (e) {
                document.getElementById('loader').style.display = 'none';
                document.getElementById('result-container').style.display = 'block';
                document.getElementById('ai-result').innerHTML = "<p style='color:#ef4444'>連線異常，請稍後再試。</p>";
            }
        }
    </script>
</body>

</html>
