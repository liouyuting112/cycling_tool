<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Road Master | 單車智慧導航</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=Noto+Sans+TC:wght@400;500;700;900&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --p: #f97316;
            --p-light: #fdba74;
            --bg: #030712;
            --c: #1e293b;
            --t: #f1f5f9;
            --m: #94a3b8;
            --border: rgba(255, 255, 255, 0.12);
            --glass: rgba(15, 23, 42, 0.85);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', 'Noto Sans TC', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--bg);
            color: var(--t);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background-image:
                radial-gradient(circle at 0% 0%, rgba(249, 115, 22, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 100% 100%, rgba(56, 189, 248, 0.05) 0%, transparent 40%);
        }

        /* Header */
        header {
            padding: 1rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(3, 7, 18, 0.9);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--border);
            z-index: 100;
        }

        .logo {
            font-weight: 900;
            font-size: 1.25rem;
            color: var(--p);
            letter-spacing: 0.5px;
        }

        /* Main Area */
        main {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem 1rem 320px;
            scroll-behavior: smooth;
        }

        #chat-thread {
            max-width: 900px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 2.5rem;
            width: 100%;
        }

        /* Message Bubbles */
        .msg {
            display: flex;
            flex-direction: column;
            animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            width: 100%;
        }

        .msg.user {
            align-items: flex-end;
        }

        .msg.ai {
            align-items: center;
        }

        .bubble {
            padding: 1.25rem;
            border-radius: 24px;
            line-height: 1.6;
            font-size: 0.95rem;
            box-shadow: 0 12px 48px rgba(0, 0, 0, 0.4);
            width: 100%;
        }

        .msg.user .bubble {
            max-width: 85%;
            background: var(--p);
            color: #fff;
            border-bottom-right-radius: 4px;
            font-weight: 600;
            box-shadow: 0 4px 20px rgba(249, 115, 22, 0.3);
        }

        .msg.ai .bubble {
            background: var(--glass);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
            color: var(--t);
        }

        /* --- ✨ 旗艦級資訊展示元件 (Timeline) ✨ --- */
        .timeline-card {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border);
            border-radius: 20px;
            margin-bottom: 25px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: 0.3s;
        }

        .timeline-card:hover {
            border-color: rgba(249, 115, 22, 0.4);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
        }

        .day-header {
            background: rgba(249, 115, 22, 0.15);
            padding: 14px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            font-weight: 900;
            color: var(--p-light);
            font-size: 1.25rem;
        }

        .day-route {
            padding: 18px 20px;
            font-weight: 800;
            color: #fff;
            border-bottom: 1px dashed var(--border);
            font-size: 1.15rem;
        }

        .day-stats {
            display: flex;
            gap: 20px;
            padding: 12px 20px;
            background: rgba(0, 0, 0, 0.3);
            font-size: 0.9rem;
            color: var(--m);
            font-weight: 700;
        }

        .day-body {
            padding: 15px 20px 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* ✅ 全新設計：可點擊展開的資訊手風琴 (Accordion) ✅ */
        .info-accordion {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 14px;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .info-accordion[open] {
            background: rgba(255, 255, 255, 0.02);
            border-color: rgba(255, 255, 255, 0.15);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        }

        .info-accordion.challenge[open] {
            border-color: rgba(248, 113, 113, 0.4);
            background: rgba(248, 113, 113, 0.05);
        }

        .info-summary {
            padding: 14px 18px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            list-style: none;
            /* 隱藏原生三角形 */
            color: #e2e8f0;
            font-weight: 700;
            user-select: none;
            transition: 0.2s;
        }

        .info-summary::-webkit-details-marker {
            display: none;
        }

        .info-summary:hover {
            background: rgba(255, 255, 255, 0.04);
        }

        .info-label {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 800;
            font-size: 0.95rem;
            color: var(--p-light);
        }

        .challenge .info-label {
            color: #fca5a5;
        }

        .chevron {
            width: 18px;
            height: 18px;
            opacity: 0.6;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            color: #94a3b8;
        }

        .info-accordion[open] .chevron {
            transform: rotate(180deg);
            opacity: 1;
            color: var(--p-light);
        }

        .info-accordion.challenge[open] .chevron {
            color: #fca5a5;
        }

        .info-content {
            padding: 0 18px 18px 18px;
            color: #cbd5e1;
            font-size: 0.95rem;
            line-height: 1.7;
            animation: slideDown 0.3s ease-out;
            border-top: 1px solid transparent;
        }

        .info-accordion[open] .info-content {
            border-top-color: rgba(255, 255, 255, 0.05);
            padding-top: 14px;
            margin-top: 4px;
        }

        .info-accordion.challenge[open] .info-content {
            border-top-color: rgba(248, 113, 113, 0.15);
        }

        /* 富文本設定 */
        .info-content p {
            margin-bottom: 0.8rem;
        }

        .info-content p:last-child {
            margin-bottom: 0;
        }

        .info-content ul,
        .info-content ol {
            margin-left: 20px;
            margin-bottom: 0.8rem;
        }

        .info-content li {
            margin-bottom: 6px;
        }

        .info-content strong {
            color: var(--p-light);
            font-weight: 800;
            background: none;
            padding: 0;
        }

        .info-accordion.challenge .info-content strong {
            color: #f87171;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ✨ 視覺化標記內容樣式 (視覺關鍵點) ✨ */
        .content-segment {
            background: rgba(255, 255, 255, 0.03);
            border-left: 3px solid var(--p);
            padding: 10px 14px;
            margin-bottom: 15px;
            border-radius: 4px 12px 12px 4px;
        }

        .segment-title {
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 800;
            color: #fff;
            margin-bottom: 5px;
            font-size: 1rem;
        }

        .highlight-tag {
            background: rgba(249, 115, 22, 0.15);
            color: var(--p-light);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.85rem;
            border: 1px solid rgba(249, 115, 22, 0.3);
            display: inline-block;
            margin-right: 5px;
            font-weight: 900;
        }

        .risk-tag {
            background: rgba(239, 68, 68, 0.15);
            color: #f87171;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.85rem;
            border: 1px solid rgba(239, 68, 68, 0.3);
            display: inline-block;
            margin-right: 5px;
            font-weight: 900;
        }

        .segment-desc {
            color: #94a3b8;
            font-size: 0.92rem;
            line-height: 1.6;
        }

        /* 裝備與風險卡片網格 */
        .tab-pane.grid-layout ul {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 15px;
            padding: 0;
            list-style: none;
        }

        .tab-pane.grid-layout li {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 1.25rem;
            display: flex;
            flex-direction: column;
            gap: 8px;
            color: #cbd5e1;
            font-size: 0.95rem;
            line-height: 1.6;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        }

        .tab-pane.grid-layout li strong {
            color: #fff;
            display: block;
            border-bottom: 1px dashed rgba(255, 255, 255, 0.1);
            padding-bottom: 8px;
            margin-bottom: 4px;
            font-size: 1.1rem;
        }

        .tab-pane.grid-layout li p {
            margin: 0;
        }

        /* --- Floating Tabs (Pills) --- */
        .tabs-container {
            margin-top: 1.25rem;
            width: 100%;
        }

        .tabs-nav {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
            padding-bottom: 8px;
        }

        .tabs-nav::-webkit-scrollbar {
            display: none;
        }

        .tab-btn {
            flex: 0 0 auto;
            padding: 12px 22px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(255, 255, 255, 0.03);
            color: #94a3b8;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 50px;
        }

        .tab-btn.active {
            color: #fff;
            background: var(--p);
            border-color: var(--p);
            box-shadow: 0 4px 15px rgba(249, 115, 22, 0.3);
        }

        .tab-pane {
            display: none;
            padding: 1rem 0 0 0;
            animation: fadeIn 0.4s ease-out;
        }

        .tab-pane.active {
            display: block;
        }

        /* Form Card */
        .plan-card {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border);
            padding: 1.25rem;
            border-radius: 20px;
            margin-top: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }

        .form-row {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .form-label {
            font-size: 0.95rem;
            font-weight: 800;
            color: var(--p-light);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }

        .form-label span {
            white-space: nowrap;
        }

        .quick-chips {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .chip {
            background: #334155;
            color: #cbd5e1;
            padding: 5px 12px;
            border-radius: 50px;
            font-size: 0.8rem;
            cursor: pointer;
            border: 1px solid transparent;
            transition: 0.2s;
        }

        .chip:hover {
            border-color: var(--p);
            background: rgba(249, 115, 22, 0.1);
            color: #fff;
        }

        .form-input {
            background: #0f172a;
            border: 1px solid #334155;
            color: #fff;
            padding: 14px;
            border-radius: 12px;
            font-size: 1rem;
            outline: none;
            transition: 0.2s;
        }

        .form-input:focus {
            border-color: var(--p);
            box-shadow: 0 0 15px rgba(249, 115, 22, 0.2);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--p), #ea580c);
            color: #fff;
            border: none;
            padding: 18px;
            border-radius: 14px;
            font-weight: 900;
            font-size: 1.1rem;
            cursor: pointer;
            box-shadow: 0 8px 30px rgba(249, 115, 22, 0.4);
        }

        /* Bottom Dock Panel */
        .dock {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 1rem 1rem 2.5rem;
            background: linear-gradient(transparent, var(--bg) 60%);
            z-index: 200;
            pointer-events: none;
        }

        .dock-bar {
            width: 100%;
            max-width: 850px;
            margin: 0 auto;
            background: #1e293b;
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 99px;
            padding: 6px 6px 6px 16px;
            display: flex;
            align-items: center;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.8);
            pointer-events: auto;
        }

        .dock-input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            padding: 10px 0;
            font-size: 1rem;
            outline: none;
            min-width: 0;
            /* 防止輸入框在 flex 容器中撐破版面 */
        }

        .dock-btn {
            background: var(--p);
            color: white;
            border: none;
            padding: 0 20px;
            height: 44px;
            border-radius: 99px;
            font-weight: 900;
            cursor: pointer;
            transition: 0.2s;
            flex-shrink: 0;
            /* 防止按鈕被壓縮 */
            white-space: nowrap;
            /* 防止文字換行 */
        }

        .dock-btn:hover {
            background: #ea580c;
            transform: scale(1.05);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(15px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

    <header>
        <div class="logo">ROAD MASTER</div>
        <div
            style="font-size:0.85rem; color:var(--m); font-weight:800; text-transform:uppercase; letter-spacing:1.5px;">
            PRO V4 ELITE</div>
    </header>

    <main id="chat-scroller">
        <div id="chat-thread">
            <div class="msg ai">
                <div class="bubble">
                    <p style="font-weight:800; font-size:1.25rem; color:var(--p-light);">🚵 歡迎！我是您的單車高級嚮導</p>
                    <p style="color:var(--m); font-size:1rem; margin-top:10px; line-height:1.6;">
                        填寫下方計畫指標，我將為您計算高維度的路線細節、挑戰分析與實戰配備建議。</p>
                    <div class="plan-card">
                        <div class="form-row">
                            <div class="form-label"><span>📍 起點座標</span>
                                <div class="quick-chips"><span class="chip" onclick="iv('start','台北火車站')">台北</span><span
                                        class="chip" onclick="iv('start','新竹高鐵')">新竹</span></div>
                            </div>
                            <input type="text" id="start" class="form-input" placeholder="輸入出發地">
                        </div>
                        <div class="form-row">
                            <div class="form-label"><span>🏁 目標終點</span>
                                <div class="quick-chips"><span class="chip" onclick="iv('end','恆春古城')">恆春</span><span
                                        class="chip" onclick="iv('end','環島大圈')">環島</span></div>
                            </div>
                            <input type="text" id="end" class="form-input" placeholder="輸入目的地">
                        </div>
                        <div class="form-row">
                            <div class="form-label"><span>⏱️ 戰術天數</span>
                                <div class="quick-chips"><span class="chip" onclick="iv('days','3天')">3天</span><span
                                        class="chip" onclick="iv('days','9天')">9天</span></div>
                            </div>
                            <input type="text" id="days" class="form-input" placeholder="預定天數">
                        </div>
                        <button class="btn-primary" onclick="submitForm()">⚡ 啟動高維度戰略規劃</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div class="dock">
        <div class="dock-bar">
            <input type="text" id="chat-input" class="dock-input" placeholder="詢問坡度挑戰、裝備清單或特定路段..."
                onkeypress="if(event.key==='Enter')submitChat()">
            <button class="dock-btn" onclick="submitChat()">傳送</button>
        </div>
    </div>

    <script>
        const CF_GATEWAY = "https://hidden-surf-0579.love7053150.workers.dev/";
        const scroller = document.getElementById('chat-scroller');
        const thread = document.getElementById('chat-thread');
        const input = document.getElementById('chat-input');

        const SYSTEM_PROMPT = `你是單車旅遊界的大師級嚮導。
你的報告必須具備「路段感知」與「精準標籤化」，絕對嚴禁整坨文字混在一起。

應答規則：
### 📅 詳細路線與行程流
(請以 Markdown 表格呈現，必須包含：天數、路線、距離/爬升、必看風景美食、路線風險)

【風景美食與路線風險欄位】強制格式：
必須使用「[路段/位置] 名稱：描述內容」的標籤結構。
例如：
[龍潭➔關西] 仙草巷：這是關西必吃的名店，冰鮮草奶凍消暑一流。
[注意] 龍潭大坡：這段長達2公里的緩上坡，冬天逆風會讓你體力歸零。

### 🎒 戰術裝備建議
請將裝備「歸類彙整」後產出，每類 2-3 項，格式：- [分類] **裝備名**：用途。
例如：
- [核心] **公路車**：維持高效能輸出。
- [後勤] **車拖包**：收納換洗衣物。

### ⚠️ 實戰風險提示
請將風險「歸類彙整」後產出，格式：- [分類] **風險名**：應對。
例如：
- [環境] **高溫中暑**：補充電解質與水分。
- [交通] **砂石車**：保持安全車距。`;

        function iv(id, v) { document.getElementById(id).value = v; }

        function scrollBottom() {
            setTimeout(() => { scroller.scrollTo({ top: scroller.scrollHeight + 400, behavior: 'smooth' }); }, 300);
        }

        function addMessage(role, content, raw = false) {
            const m = document.createElement('div');
            m.className = `msg ${role}`;
            m.innerHTML = `<div class="bubble">${raw ? content : marked.parse(content)}</div>`;
            thread.appendChild(m);
            scrollBottom();
            return m;
        }

        // ✨ 強化渲染引擎：自動將 [標籤] 轉換為精美的視覺區塊 ✨
        function prettifyContent(text, isRisk = false) {
            // 將 [位置] 名稱：描述 轉換為 HTML 結構
            return text.replace(/\[(.*?)\]\s*(.*?)[：|:](.*?)(?=\n|\[|$)/gs, (match, loc, name, desc) => {
                const tagClass = isRisk ? 'risk-tag' : 'highlight-tag';
                return `
                    <div class="content-segment">
                        <div class="segment-title">
                            <span class="${tagClass}">${loc}</span>
                            <span>${name}</span>
                        </div>
                        <div class="segment-desc">${desc.trim()}</div>
                    </div>
                `;
            });
        }

        // ✨ 修改 Timeline 渲染邏輯，導入內容強化引擎 ✨
        function transformToTimeline(tableHtml) {
            const div = document.createElement('div');
            div.innerHTML = tableHtml;
            const rows = Array.from(div.querySelectorAll('tr')).slice(1);

            if (rows.length === 0) return tableHtml;

            let html = `<div class="timeline-flow">`;
            rows.forEach(row => {
                const cols = Array.from(row.querySelectorAll('td')).map(td => td.innerHTML.trim());
                if (cols.length < 5) return;

                html += `
            <div class="timeline-card">
                <div class="day-header"><span>DAY ${cols[0]}</span> <div style="font-size:0.75rem; color:var(--m); opacity:0.8;">ELITE NAVIGATION</div></div>
                <div class="day-route">${cols[1]}</div>
                <div class="day-stats"><span>📏 距離/爬升：${cols[2]}</span></div>
                <div class="day-body">
                    
                    <details class="info-accordion">
                        <summary class="info-summary">
                            <span class="info-label">📍 風景、美食與活動探勘</span>
                            <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
                        </summary>
                        <div class="info-content">${prettifyContent(cols[3])}</div>
                    </details>
                    
                    <details class="info-accordion challenge">
                        <summary class="info-summary">
                            <span class="info-label">⚡ 路線挑戰與技術風險</span>
                            <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
                        </summary>
                        <div class="info-content">${prettifyContent(cols[4], true)}</div>
                    </details>

                </div>
            </div>`;
            });
            html += `</div>`;
            return html;
        }

        function renderTabs(rawContent) {
            const cleanText = rawContent.replace(/\\n/g, '\n');
            const firstHeaderIndex = cleanText.indexOf('### ');
            if (firstHeaderIndex === -1) return marked.parse(cleanText);

            const sections = cleanText.substring(firstHeaderIndex).split(/\n?(?=### )/);

            let tabsNav = `<div class="tabs-container"><div class="tabs-nav">`;
            let tabsContent = `<div class="tabs-content">`;
            let count = 0;

            sections.forEach(sec => {
                const trimmed = sec.trim();
                if (!trimmed.startsWith('###')) return;

                const firstLineEnd = trimmed.indexOf('\n');
                let title = trimmed.substring(0, firstLineEnd !== -1 ? firstLineEnd : trimmed.length).replace(/###\s*/, '').trim();
                let body = firstLineEnd !== -1 ? trimmed.substring(firstLineEnd).trim() : "";

                const active = count === 0 ? 'active' : '';
                let layoutClass = '';
                if (title.match(/裝備|清單|提示|提醒|守則|風險/)) layoutClass = 'grid-layout';

                let parsedBody = marked.parse(body);
                // 終極淨化 + 標籤轉換：處理分類式清單 [分類] 為美觀標籤
                if (layoutClass === 'grid-layout') {
                    parsedBody = parsedBody
                        .replace(/\[(.*?)\]/g, '<span class="highlight-tag" style="margin-bottom:5px; display:inline-block;">$1</span>')
                        .replace(/<\/strong>[\s:：<br>]*\n*/gi, '</strong>')
                        .replace(/<\/strong>\s*<p>/gi, '</strong>')
                        .replace(/<\/strong><\/p>\s*<ul>/gi, '</strong><ul>')
                        .replace(/<li><p>/gi, '<li>')
                        .replace(/<\/p><\/li>/gi, '</li>');
                }

                if (count === 0 && parsedBody.includes('<table')) {
                    parsedBody = transformToTimeline(parsedBody);
                }

                tabsNav += `<button class="tab-btn ${active}" onclick="switchTab(this, ${count})">${title}</button>`;
                tabsContent += `<div class="tab-pane ${active} ${layoutClass}" data-index="${count}">${parsedBody}</div>`;
                count++;
            });

            return count === 0 ? marked.parse(cleanText) : (tabsNav + `</div>` + tabsContent + `</div></div>`);
        }

        window.switchTab = function (btn, idx) {
            const con = btn.closest('.tabs-container');
            con.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            con.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
            con.querySelector(`.tab-pane[data-index="${idx}"]`).classList.add('active');
        };

        async function submitForm() {
            const s = document.getElementById('start').value;
            const e = document.getElementById('end').value;
            const d = document.getElementById('days').value;
            if (!s || !e || !d) return alert("請完整填寫起訖點與天數規劃。");
            addMessage('user', `分析需求：從 **${s}** 騎行至 **${e}**，預定天數 **${d}**。請提供專業戰略報告。`);
            await callAI(`請為我規劃 ${s} 到 ${e}，${d}天的頂級單車行程。這份計畫必須「字數非常多、細節達到大師級長篇深度」。明確列出每一天的：1. 具體的城鎮與公路編號。2. 3-5句話以上的超詳細無敵美食小吃與風景敘述。3. 3-5句話以上的陡坡起伏、大車流量、季節風向的危險深度分析。以Markdown表格輸出。`);
        }

        async function submitChat() {
            const v = input.value.trim();
            if (!v) return;
            input.value = '';
            addMessage('user', v);
            await callAI(v);
        }

        async function callAI(q) {
            const loader = document.createElement('div');
            loader.className = 'msg ai';
            loader.innerHTML = `<div class="bubble" style="max-width:90px; padding:10px;"><div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>`;
            thread.appendChild(loader);
            scrollBottom();

            try {
                const res = await fetch(CF_GATEWAY, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: SYSTEM_PROMPT + "\n任務需求：" + q }] }] })
                });
                const data = await res.json();
                loader.remove();
                addMessage('ai', renderTabs(data.candidates?.[0]?.content?.parts?.[0]?.text || "無回應"), true);
            } catch (e) {
                loader.remove();
                addMessage('ai', "連線錯誤，請刷新頁面再試。");
            }
        }
    </script>
