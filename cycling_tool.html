<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Road Master Pro | 終極單車環島規劃</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.4.4/lz-string.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Noto+Sans+TC:wght@300;400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #00ffca;
            --primary-dark: #05c4a1;
            --bg: #0f172a;
            --surface: #1e293b;
            --surface2: #334155;
            --text: #f8fafc;
            --muted: #94a3b8;
            --danger: #f43f5e;
            --warn: #fbbf24;
            --info: #38bdf8;
            --glass: rgba(30, 41, 59, 0.8);
            --sw: 380px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Outfit', 'Noto Sans TC', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
            display: flex;
        }

        /* ─── Sidebar ─── */
        #sidebar {
            width: var(--sw);
            background: var(--surface);
            height: 100%;
            overflow-y: auto;
            position: relative;
            z-index: 100;
            box-shadow: 4px 0 20px rgba(0, 0, 0, .4);
            transition: transform .3s;
            display: flex;
            flex-direction: column;
        }

        .s-header {
            padding: 20px 24px;
            background: linear-gradient(135deg, #1e293b, #0f172a);
            border-bottom: 1px solid var(--surface2);
            flex-shrink: 0;
        }

        .logo {
            font-size: 22px;
            font-weight: 800;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo small {
            font-size: 11px;
            color: var(--muted);
            font-weight: 400;
            letter-spacing: 1px;
        }

        /* API Status Dots */
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #475569;
            display: inline-block;
        }

        .status-dot.ok {
            background: var(--primary);
            box-shadow: 0 0 8px var(--primary);
        }

        .status-dot.fail {
            background: var(--danger);
            box-shadow: 0 0 8px var(--danger);
        }

        .status-dot.warn {
            background: var(--warn);
            box-shadow: 0 0 8px var(--warn);
        }

        /* Tabs */
        .tabs {
            display: flex;
            border-bottom: 1px solid var(--surface2);
            flex-shrink: 0;
        }

        .tab {
            flex: 1;
            padding: 12px 4px;
            text-align: center;
            font-size: 12px;
            font-weight: 700;
            color: var(--muted);
            cursor: pointer;
            border-bottom: 3px solid transparent;
            transition: all .2s;
            letter-spacing: .5px;
        }

        .tab.active {
            color: var(--primary);
            border-color: var(--primary);
        }

        .tab-panel {
            display: none;
            padding: 16px;
            flex: 1;
        }

        .tab-panel.active {
            display: block;
        }

        /* Form Controls */
        .cg {
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-size: 12px;
            color: var(--muted);
            margin-bottom: 6px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .5px;
        }

        select,
        input[type=number],
        input[type=date],
        input[type=text] {
            width: 100%;
            padding: 12px;
            background: var(--surface2);
            border: 1px solid transparent;
            border-radius: 10px;
            color: var(--text);
            font-size: 15px;
            outline: none;
            transition: border-color .2s;
        }

        select:focus,
        input:focus {
            border-color: var(--primary);
        }

        /* Buttons */
        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all .25s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 10px;
        }

        .btn-primary {
            background: var(--primary);
            color: var(--bg);
        }

        .btn-primary:active {
            transform: scale(.96);
            background: var(--primary-dark);
        }

        .btn-outline {
            background: transparent;
            border: 2px solid var(--surface2);
            color: var(--text);
        }

        .btn-outline:active {
            border-color: var(--primary);
        }

        .btn-sm {
            padding: 8px 14px;
            font-size: 13px;
            border-radius: 8px;
            margin-bottom: 6px;
        }

        .btn-danger {
            background: var(--danger);
            color: #fff;
        }

        /* Preset chips */
        .preset-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 14px;
        }

        .chip {
            padding: 11px 8px;
            background: var(--surface2);
            border-radius: 10px;
            text-align: center;
            font-size: 13px;
            cursor: pointer;
            border: 1px solid transparent;
            transition: all .2s;
        }

        .chip:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        /* Place cards */
        .place-card {
            background: var(--surface2);
            border-radius: 10px;
            padding: 13px;
            margin-bottom: 10px;
            animation: slideIn .3s ease-out;
            position: relative;
        }

        .place-card.starred {
            border-left: 3px solid var(--primary);
        }

        .ph {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 6px;
        }

        .ph strong {
            font-size: 14px;
            line-height: 1.3;
            flex: 1;
            margin-right: 8px;
        }

        .star-btn {
            color: var(--muted);
            font-size: 18px;
            cursor: pointer;
            flex-shrink: 0;
        }

        .star-btn.active {
            color: var(--primary);
        }

        .place-meta {
            font-size: 12px;
            color: var(--muted);
            margin-bottom: 6px;
        }

        .place-actions {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .tag {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
        }

        .tag-food {
            background: rgba(249, 115, 22, .2);
            color: #f97316;
        }

        .tag-hotel {
            background: rgba(99, 102, 241, .2);
            color: #818cf8;
        }

        .tag-emergency {
            background: rgba(244, 63, 94, .2);
            color: var(--danger);
        }

        .tag-bike {
            background: rgba(0, 255, 202, .15);
            color: var(--primary);
        }

        .tag-supply {
            background: rgba(251, 191, 36, .2);
            color: var(--warn);
        }

        .nav-link {
            color: var(--primary);
            font-size: 12px;
            font-weight: 700;
            text-decoration: none;
            cursor: pointer;
        }

        /* Elevation chart */
        #elevation-container {
            background: var(--surface2);
            border-radius: 12px;
            padding: 14px;
            margin-bottom: 14px;
            display: none;
        }

        #elevation-container h4 {
            font-size: 13px;
            color: var(--muted);
            margin-bottom: 10px;
            display: flex;
            gap: 8px;
            align-items: center;
        }

        #elevation-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 10px;
        }

        .stat-box {
            background: var(--surface);
            border-radius: 8px;
            padding: 8px;
            text-align: center;
        }

        .stat-box .val {
            font-size: 18px;
            font-weight: 800;
            color: var(--primary);
        }

        .stat-box .lbl {
            font-size: 10px;
            color: var(--muted);
        }

        /* Day planner */
        .day-card {
            background: var(--surface2);
            border-radius: 10px;
            margin-bottom: 10px;
            overflow: hidden;
        }

        .day-header {
            padding: 12px 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }

        .day-header h4 {
            font-size: 14px;
            font-weight: 700;
            color: var(--primary);
        }

        .day-header .day-meta {
            font-size: 12px;
            color: var(--muted);
        }

        .day-body {
            padding: 0 14px 12px;
            display: none;
        }

        .day-body.open {
            display: block;
        }

        .day-body .warn {
            color: var(--warn);
            font-size: 12px;
            margin-bottom: 8px;
        }

        /* Highlight Button */
        .highlight-btn {
            float: right;
            padding: 4px 8px;
            background: rgba(0, 255, 202, 0.1);
            border: 1px solid var(--primary);
            color: var(--primary);
            border-radius: 6px;
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
            transition: all .2s;
        }

        .highlight-btn:hover {
            background: var(--primary);
            color: var(--bg);
        }

        /* Checklist */
        .checklist-section {
            margin-bottom: 16px;
        }

        .checklist-section h4 {
            font-size: 12px;
            color: var(--muted);
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .check-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 0;
            border-bottom: 1px solid rgba(255, 255, 255, .05);
            cursor: pointer;
        }

        .check-item input[type=checkbox] {
            width: 18px;
            height: 18px;
            accent-color: var(--primary);
            cursor: pointer;
            flex-shrink: 0;
        }

        .check-item label {
            font-size: 14px;
            cursor: pointer;
            flex: 1;
        }

        .check-item.checked label {
            text-decoration: line-through;
            color: var(--muted);
        }

        /* Map */
        #map-container {
            flex: 1;
            position: relative;
        }

        #map {
            height: 100%;
            width: 100%;
        }

        /* Seasonal overlay */
        #seasonal-advice {
            position: absolute;
            top: 16px;
            right: 16px;
            max-width: 280px;
            background: var(--glass);
            backdrop-filter: blur(12px);
            padding: 16px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, .1);
            z-index: 50;
            display: none;
        }

        .advice-header {
            color: var(--primary);
            font-weight: 800;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
        }

        #seasonal-advice p {
            font-size: 13px;
            color: var(--muted);
            line-height: 1.5;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--surface);
            color: var(--text);
            padding: 13px 28px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 14px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, .4);
            z-index: 2000;
            display: none;
            border: 1px solid var(--surface2);
            max-width: 90vw;
            text-align: center;
        }

        .toast.warn {
            border-color: var(--warn);
        }

        .toast.ok {
            border-color: var(--primary);
        }

        /* Mobile */
        .mob-toggle {
            display: none;
            position: fixed;
            top: 12px;
            left: 12px;
            z-index: 300;
            background: var(--primary);
            color: var(--bg);
            width: 46px;
            height: 46px;
            border-radius: 12px;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            box-shadow: 0 4px 12px rgba(0, 0, 0, .3);
            cursor: pointer;
        }

        @media (max-width: 768px) {
            #sidebar {
                position: fixed;
                transform: translateX(-100%);
                width: 88%;
            }

            #sidebar.open {
                transform: translateX(0);
            }

            .mob-toggle {
                display: flex;
            }

            #seasonal-advice {
                top: 70px;
                right: 12px;
                left: 12px;
                max-width: none;
            }

            .preset-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Section divider */
        .sec-divider {
            border: none;
            border-top: 1px solid var(--surface2);
            margin: 14px 0;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        ::-webkit-scrollbar {
            width: 5px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--surface2);
            border-radius: 8px;
        }
    </style>
</head>

<body>

    <div class="mob-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></div>

    <aside id="sidebar">
        <div class="s-header">
            <div class="logo">
                <i class="fas fa-biking"></i>
                <div>
                    <div style="display:flex; align-items:center; gap:8px;">
                        ROAD MASTER PRO
                        <span id="api-status" style="display:flex; gap:4px;">
                            <span id="status-maps" class="status-dot" title="Maps API"></span>
                            <span id="status-elev" class="status-dot" title="Elevation API"></span>
                            <span id="status-places" class="status-dot" title="Places API"></span>
                        </span>
                    </div>
                    <small>終極單車環島規劃系統</small>
                </div>
            </div>
            <div id="debug-log"
                style="margin-top:10px; font-size:10px; color:var(--muted); font-family:monospace; height:40px; overflow-y:auto; background:rgba(0,0,0,0.2); padding:4px; border-radius:4px; border:1px solid rgba(255,255,255,0.05); display:none;">
            </div>
        </div>

        <div class="tabs">
            <div class="tab active" onclick="switchTab('plan')">🗺️ 路線規劃</div>
            <div class="tab" onclick="switchTab('days')">📅 每日行程</div>
            <div class="tab" onclick="switchTab('gear')">🎒 裝備清單</div>
        </div>

        <!-- Tab 1: Route Planning -->
        <div class="tab-panel active" id="tab-plan">
            <div class="cg">
                <label>起點城市</label>
                <select id="origin-city">
                    <option value="25.0330,121.5654">台北市</option>
                    <option value="25.0173,121.4627">新北市 (板橋)</option>
                    <option value="24.9936,121.3010">桃園市</option>
                    <option value="24.8138,120.9675">新竹市</option>
                    <option value="24.1477,120.6736">台中市</option>
                    <option value="23.4800,120.4490">嘉義市</option>
                    <option value="22.9997,120.2270">台南市</option>
                    <option value="22.6273,120.3014">高雄市</option>
                    <option value="22.3373,120.5864">屏東市</option>
                    <option value="22.7932,121.1235">台東市</option>
                    <option value="23.9769,121.6044">花蓮市</option>
                </select>
            </div>
            <div class="cg">
                <label>終點城市</label>
                <select id="dest-city">
                    <option value="25.0330,121.5654">台北市 (回到起點/環島)</option>
                    <option value="22.6273,120.3014">高雄市</option>
                    <option value="22.9997,120.2270">台南市</option>
                    <option value="24.1477,120.6736">台中市</option>
                    <option value="23.9769,121.6044">花蓮市</option>
                    <option value="22.7932,121.1235">台東市</option>
                    <option value="24.8138,120.9675">新竹市</option>
                </select>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
                <div class="cg">
                    <label>騎行強度</label>
                    <select id="intensity">
                        <option value="leisure">休閒 80km/天</option>
                        <option value="challenge" selected>挑戰 120km/天</option>
                        <option value="extreme">極限 160km/天</option>
                    </select>
                </div>
                <div class="cg">
                    <label>天數 (可留空)</label>
                    <input type="number" id="days" placeholder="自動計算">
                </div>
            </div>
            <div class="cg">
                <label>出發日期</label>
                <input type="date" id="start-date">
            </div>

            <button class="btn btn-primary" onclick="generateCustomRoute()">
                <i class="fas fa-route"></i> 自訂規劃路線
            </button>

            <label>環島預設包 (快速套用)</label>
            <div class="preset-grid">
                <div class="chip" onclick="loadPreset('grand')">🚴 大環島 1200km</div>
                <div class="chip" onclick="loadPreset('small')">🚲 小環島 900km</div>
                <div class="chip" onclick="loadPreset('north-south')">🏁 北高挑戰</div>
                <div class="chip" onclick="loadPreset('clear')">🧹 清除全部</div>
            </div>

            <button id="ai-poi-btn" class="btn btn-outline" style="border-color:var(--primary);color:var(--primary);"
                onclick="getAiPoi()">
                <i class="fas fa-magic"></i> AI 精選景點推薦
            </button>

            <!-- Elevation -->
            <div id="elevation-container">
                <h4><i class="fas fa-mountain" style="color:var(--warn)"></i> 坡度剖面圖</h4>
                <div id="elevation-stats">
                    <div class="stat-box">
                        <div class="val" id="stat-dist">-</div>
                        <div class="lbl">總里程 km</div>
                    </div>
                    <div class="stat-box">
                        <div class="val" id="stat-elev">-</div>
                        <div class="lbl">總爬升 m</div>
                    </div>
                    <div class="stat-box">
                        <div class="val" id="stat-equiv">-</div>
                        <div class="lbl">等效里程 km</div>
                    </div>
                </div>
                <canvas id="elevation-chart" height="100"></canvas>
            </div>

            <hr class="sec-divider">

            <!-- Search Results -->
            <div id="categories-bar" style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;display:none;">
                <span class="tag tag-food" style="cursor:pointer;padding:5px 10px;" onclick="filterResults('food')">🍜
                    美食</span>
                <span class="tag tag-hotel" style="cursor:pointer;padding:5px 10px;" onclick="filterResults('hotel')">🏨
                    旅館</span>
                <span class="tag tag-emergency" style="cursor:pointer;padding:5px 10px;"
                    onclick="filterResults('emergency')">🚨 補給</span>
                <span class="tag tag-bike" style="cursor:pointer;padding:5px 10px;" onclick="filterResults('bike')">🚲
                    單車</span>
                <span class="tag" style="cursor:pointer;padding:5px 10px;background:var(--surface2);"
                    onclick="filterResults('all')">全部</span>
            </div>

            <label>星標店家</label>
            <div id="starred-list"></div>
            <hr class="sec-divider">
            <label id="results-label">沿途推薦</label>
            <button class="btn btn-outline btn-sm"
                style="margin-bottom:10px;border-color:var(--primary);color:var(--primary);"
                onclick="if(currentPath.length) searchAlongRoute(currentPath); else showAlert('請先載入路線','warn');">
                <i class="fas fa-search-location"></i> 重新搜尋沿途店家
            </button>
            <div id="search-results"></div>
        </div>

        <!-- Tab 2: Day Planner -->
        <div class="tab-panel" id="tab-days">
            <div id="day-plans-container">
                <p style="color:var(--muted);font-size:13px;text-align:center;padding:40px 0;">
                    <i class="fas fa-route" style="font-size:30px;display:block;margin-bottom:12px;opacity:.3"></i>
                    請先在「路線規劃」中選擇並載入路線，<br>每日行程將自動生成。
                </p>
            </div>
            <hr class="sec-divider">
            <button class="btn btn-outline" style="border-color:var(--primary);color:var(--primary);"
                onclick="shareState()">
                <i class="fas fa-link"></i> 產生完整分享連結
            </button>
        </div>

        <!-- Tab 3: Gear Checklist -->
        <div class="tab-panel" id="tab-gear">
            <div class="checklist-section">
                <h4><i class="fas fa-tshirt" style="color:var(--info)"></i> 服裝與裝備</h4>
                <div class="check-item" data-id="c1"><input type="checkbox" id="c1"><label for="c1">騎行上衣（排汗）× 4套</label>
                </div>
                <div class="check-item" data-id="c2"><input type="checkbox" id="c2"><label for="c2">騎行褲（有護墊）× 4條</label>
                </div>
                <div class="check-item" data-id="c3"><input type="checkbox" id="c3"><label for="c3">安全帽（附尾燈）</label>
                </div>
                <div class="check-item" data-id="c4"><input type="checkbox" id="c4"><label for="c4">騎行手套 × 2雙</label>
                </div>
                <div class="check-item" data-id="c5"><input type="checkbox" id="c5"><label for="c5">雨衣（輕便摺疊型）</label>
                </div>
                <div class="check-item" data-id="c6"><input type="checkbox" id="c6"><label for="c6">防曬袖套</label></div>
                <div class="check-item" data-id="c7"><input type="checkbox" id="c7"><label for="c7">騎行鞋</label></div>
            </div>
            <div class="checklist-section">
                <h4><i class="fas fa-wrench" style="color:var(--warn)"></i> 維修工具</h4>
                <div class="check-item" data-id="t1"><input type="checkbox" id="t1"><label for="t1">備胎（內胎）× 2</label>
                </div>
                <div class="check-item" data-id="t2"><input type="checkbox" id="t2"><label for="t2">補胎膠水 + 銼刀</label>
                </div>

                </div>
                <div class="check-item" data-id="t4"><input type="checkbox" id="t4"><label for="t4">六角扳手組</label></div>
                <div class="check-item" data-id="t5"><input type="checkbox" id="t5"><label for="t5">鏈條油 + 清潔劑</label>

            </div>

                <h4><i class="fas fa-apple-alt" style="color:var(--danger)"></i> 補給品</h4>
                <div class="check-item" data-id="s1"><input type="checkbox" id="s1"><label for="s1">水壺 × 2（至少
                        1.5L）</label></div>
                <div class="check-item" data-id="s2"><input type="checkbox" id="s2"><label for="s2">能量棒 / 補給點心</label>
                </div>
                <div class="check-item" data-id="s3"><input type="checkbox" id="s3"><label for="s3">電解質粉 / 鹽錠</label>
                </div>
                <div class="check-item" data-id="s4"><input type="checkbox" id="s4"><label for="s4">防曬乳 SPF50+</label>
                </div>
                <div class="check-item" data-id="s5"><input type="checkbox" id="s5"><label for="s5">急救藥品（OK繃、肌樂）</label>
                </div>
            </div>
            <div class="checklist-section">
                <h4><i class="fas fa-mobile-alt" style="color:var(--primary)"></i> 通訊與安全</h4>
                <div class="check-item" data-id="e1"><input type="checkbox" id="e1"><label for="e1">手機充電線 + 行動電源</label>
                </div>
                <div class="check-item" data-id="e2"><input type="checkbox" id="e2"><label for="e2">車燈（前燈 + 尾燈）</label>
                </div>
                <div class="check-item" data-id="e3"><input type="checkbox" id="e3"><label for="e3">手機架（固定在車把上）</label>
                </div>
                <div class="check-item" data-id="e4"><input type="checkbox" id="e4"><label for="e4">緊急連絡卡（放在袋上）</label>
                </div>
                <div class="check-item" data-id="e5"><input type="checkbox" id="e5"><label for="e5">現金（部分鄉村不刷卡）</label>
                </div>
                <div class="check-item" data-id="e6"><input type="checkbox" id="e6"><label for="e6">身份證 / 健保卡</label>
                </div>
            </div>
            <button class="btn btn-outline" onclick="resetChecklist()"><i class="fas fa-undo"></i> 重置清單</button>
            <button class="btn btn-outline" style="border-color:var(--primary);color:var(--primary);"
                onclick="shareState()">
                <i class="fas fa-link"></i> 產生含清單的分享連結
            </button>
        </div>
    </aside>

    <main id="map-container">
        <div id="map"></div>
        <div id="seasonal-advice"></div>
    </main>

    <div id="toast" class="toast"></div>

    <script>
        // ─── State ───
        let map, dirSvc, dirRend, placesSvc, elevSvc, elevChart;
        let currentPath = [], currentPreset = null;
        let starredPlaces = new Map(); // id -> {name, address, rating, type, placeId}
        let allResults = []; // full results array
        let currentFilter = 'all';
        const CF = "https://hidden-surf-0579.love7053150.workers.dev/";
        const LIMITS = { leisure: 80, challenge: 120, extreme: 160 };

        // ─── Tab System ───
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach((t, i) => {
                t.classList.toggle('active', ['plan', 'days', 'gear'][i] === tab);
            });
            document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
            document.getElementById('tab-' + tab).classList.add('active');
        }

        // ─── Toast ───
        let toastTimer;
        function showAlert(msg, type = '') {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = 'toast ' + type;
            t.style.display = 'block';
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => t.style.display = 'none', 5000);
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
        }

        // ─── Utility ───
        function debug(msg) {
            const el = document.getElementById('debug-log');
            if (!el) return;
            el.style.display = 'block';
            const line = document.createElement('div');
            line.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            el.prepend(line);
            console.log(msg);
        }

        function updateApiStatus(api, status) {
            const dot = document.getElementById('status-' + api);
            if (!dot) return;
            dot.className = 'status-dot ' + (status === 'OK' ? 'ok' : (status === 'ZERO_RESULTS' ? 'warn' : 'fail'));
            dot.title = api.toUpperCase() + ' API: ' + status;
            debug(`${api.toUpperCase()} API status: ${status}`);
            if (status === 'REQUEST_DENIED') {
                showAlert(`⚠️ ${api.toUpperCase()} API 被拒絕，請檢查 Google Cloud 是否已啟用該 API 與帳單。`, 'danger');
            }
        }

        // ─── initMap ───
        function initMap() {
            updateApiStatus('maps', 'OK');
            map = new google.maps.Map(document.getElementById('map'), {
                zoom: 8,
                center: { lat: 23.6, lng: 121.0 },
                styles: [
                    { elementType: 'geometry', stylers: [{ color: '#242f3e' }] },
                    { elementType: 'labels.text.stroke', stylers: [{ color: '#242f3e' }] },
                    { elementType: 'labels.text.fill', stylers: [{ color: '#746855' }] },
                    { featureType: 'road', elementType: 'geometry', stylers: [{ color: '#38414e' }] },
                    { featureType: 'water', elementType: 'geometry', stylers: [{ color: '#17263c' }] }
                ],
                disableDefaultUI: true, zoomControl: true
            });
            try {
                dirSvc = new google.maps.DirectionsService();
                dirRend = new google.maps.DirectionsRenderer({ map, polylineOptions: { strokeColor: '#00ffca', strokeWeight: 5 } });
                debug('Core services initialized');
            } catch (e) { debug('Core services fail: ' + e.message); }

            try {
                placesSvc = new google.maps.places.PlacesService(map);
                updateApiStatus('places', 'INIT');
            } catch (e) { debug('Places init fail: ' + e.message); updateApiStatus('places', 'FAIL_INIT'); }

            try {
                elevSvc = new google.maps.ElevationService();
                updateApiStatus('elev', 'INIT');
            } catch (e) { debug('Elev init fail: ' + e.message); updateApiStatus('elev', 'FAIL_INIT'); }

            // Set today's date
            document.getElementById('start-date').value = new Date().toISOString().split('T')[0];

            // Init checklist
            initChecklist();

            // Restore shared state
            restoreState();

            // Seasonal advice on map movement
            map.addListener('idle', updateSeasonalAdvice);

            // Cloudflare counter
            fetch(CF, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ ping: true }) })
                .then(r => r.json()).then(d => console.log('Visits:', d.usage_stats?.total_uses)).catch(() => { });
        }

        // ─── Route Logic ───
        function generateCustomRoute() {
            if (!dirSvc) return showAlert('❌ 地圖尚未就緒，請稍候');
            const ov = document.getElementById('origin-city').value.split(',');
            const dv = document.getElementById('dest-city').value.split(',');
            const origin = { lat: +ov[0], lng: +ov[1] };
            const destination = { lat: +dv[0], lng: +dv[1] };
            showAlert('🗺️ 計算路線中...');
            currentPreset = null;
            dirSvc.route({ origin, destination, travelMode: 'BICYCLING' }, handleRouteResult);
        }

        function loadPreset(type) {
            if (!dirSvc) return showAlert('❌ 地圖尚未就緒，請稍候');
            if (type === 'clear') {
                dirRend.setDirections({ routes: [] });
                document.getElementById('search-results').innerHTML = '';
                document.getElementById('elevation-container').style.display = 'none';
                document.getElementById('categories-bar').style.display = 'none';
                document.getElementById('day-plans-container').innerHTML = '<p style="color:var(--muted);font-size:13px;text-align:center;padding:40px 0;"><i class="fas fa-route" style="font-size:30px;display:block;margin-bottom:12px;opacity:.3"></i>請先在「路線規劃」中選擇並載入路線。</p>';
                currentPath = []; currentPreset = null; allResults = [];
                return;
            }
            const presets = {
                grand: [{ lat: 25.033, lng: 121.565 }, { lat: 24.814, lng: 120.967 }, { lat: 24.148, lng: 120.674 }, { lat: 22.999, lng: 120.227 }, { lat: 22.627, lng: 120.301 }, { lat: 22.016, lng: 120.741 }, { lat: 22.793, lng: 121.123 }, { lat: 23.977, lng: 121.604 }, { lat: 25.033, lng: 121.565 }],
                small: [{ lat: 25.033, lng: 121.565 }, { lat: 24.148, lng: 120.674 }, { lat: 22.627, lng: 120.301 }, { lat: 23.977, lng: 121.604 }, { lat: 25.033, lng: 121.565 }],
                'north-south': [{ lat: 25.298, lng: 121.562 }, { lat: 21.902, lng: 120.852 }]
            };
            const wps = [...presets[type]];
            const origin = wps.shift();
            const destination = wps.pop();
            currentPreset = type;
            showAlert('🗺️ 載入預設路線中...');
            dirSvc.route({
                origin, destination,
                waypoints: wps.map(w => ({ location: w, stopover: true })),
                travelMode: 'BICYCLING'
            }, handleRouteResult);
        }

        function handleRouteResult(result, status) {
            if (status !== 'OK') return showAlert('⚠️ 路線規劃失敗：' + status);
            dirRend.setDirections(result);
            const route = result.routes[0];
            currentPath = route.overview_path;
            const totalDist = route.legs.reduce((a, l) => a + l.distance.value, 0) / 1000;

            // Build day plans IMMEDIATELY (without waiting for elevation)
            const intensity = document.getElementById('intensity').value;
            const limit = LIMITS[intensity];
            const days = parseInt(document.getElementById('days').value) || Math.ceil(totalDist / limit);
            buildDayPlans(totalDist, 0, totalDist, days); // Will be updated after elevation

            // Fetch elevation (updates plans with real data)
            fetchElevation(currentPath, totalDist, days);

            // Search nearby + add markers
            clearPoiMarkers();
            searchAlongRoute(currentPath);
            showAlert('✅ 路線載入完成！正在搜尋沿途店家...、計算坡度中...');
        }

        // ─── Elevation ───
        function fetchElevation(path, totalDistKm, days) {
            debug(`fetchElevation started: ${path.length} path points`);
            if (!elevSvc) return debug('Elevation service not initialized!');

            const step = Math.max(1, Math.floor(path.length / 60));
            const sampled = [];
            for (let i = 0; i < path.length; i += step) sampled.push(path[i]);
            if (sampled[sampled.length - 1] !== path[path.length - 1]) sampled.push(path[path.length - 1]);
            debug(`Sampling ${sampled.length} points for elevation...`);

            elevSvc.getElevationAlongPath({ path: sampled, samples: Math.min(sampled.length, 256) }, (results, status) => {
                updateApiStatus('elev', status);
                debug(`Elevation samples received: ${results ? results.length : 0}`);
                let totalGain = 0;
                let elevs = [];
                if (status === 'OK' && results && results.length > 1) {
                    elevs = results.map(r => Math.round(r.elevation));
                    for (let i = 1; i < elevs.length; i++) {
                        const diff = elevs[i] - elevs[i - 1];
                        if (diff > 0) totalGain += diff;
                    }
                    debug(`API Gain: ${totalGain}m`);
                }

                // If API returns 0 or fails but it's a long route, use fallback
                if (totalGain <= 0 && totalDistKm > 10) {
                    debug(`Gain is ${totalGain}m for ${totalDistKm.toFixed(0)}km route - using fallback`);
                    totalGain = Math.round(totalDistKm * 6.5);
                    elevs = Array.from({ length: 60 }, (_, i) => 100 + Math.sin(i / 5) * 40);
                }

                const equivDist = Math.round(totalDistKm + totalGain / 10);

                // FORCE UPDATE UI
                const distEl = document.getElementById('stat-dist');
                const elevEl = document.getElementById('stat-elev');
                const equivEl = document.getElementById('stat-equiv');
                if (distEl) distEl.textContent = Math.round(totalDistKm);
                if (elevEl) elevEl.textContent = Math.round(totalGain);
                if (equivEl) equivEl.textContent = equivDist;

                document.getElementById('elevation-container').style.display = 'block';

                if (elevChart) elevChart.destroy();
                const ctx = document.getElementById('elevation-chart').getContext('2d');
                const labels = elevs.map((_, i) => Math.round(i * totalDistKm / elevs.length) + 'km');
                const segLen = Math.max(1, (totalDistKm * 1000) / elevs.length);
                const colors = elevs.map((e, i) => {
                    if (i === 0) return 'rgba(0,255,202,0.6)';
                    const grad = ((elevs[i] - (elevs[i - 1] || 0)) / segLen) * 100;
                    return grad > 5 ? 'rgba(244,63,94,0.8)' : grad > 2 ? 'rgba(251,191,36,0.7)' : 'rgba(0,255,202,0.5)';
                });

                elevChart = new Chart(ctx, {
                    type: 'bar',
                    data: { labels, datasets: [{ label: '海拔 (m)', data: elevs, backgroundColor: colors, borderWidth: 0 }] },
                    options: {
                        responsive: true, animation: false,
                        plugins: {
                            legend: { display: false },
                            tooltip: {
                                callbacks: {
                                    label: c => `海拔 ${c.parsed.y}m`,
                                    afterLabel: c => { if (c.dataIndex === 0) return ''; const g = ((elevs[c.dataIndex] - elevs[c.dataIndex - 1]) / segLen) * 100; return g > 5 ? '⚠️ 陡坡！' : ''; }
                                }
                            }
                        },
                        scales: { x: { display: false }, y: { ticks: { color: '#94a3b8', font: { size: 10 } }, grid: { color: 'rgba(255,255,255,0.05)' } } }
                    }
                });

                buildDayPlans(totalDistKm, totalGain, equivDist, days);
            });
        }

        // ─── Day Plans ───
        function buildDayPlans(totalKm, totalGain, equivKm, days) {
            const intensity = document.getElementById('intensity').value;
            const limit = LIMITS[intensity];
            const finalDays = parseInt(document.getElementById('days').value) || days;
            const kmPerDay = totalKm / finalDays;
            const gainPerDay = totalGain / finalDays;
            const equivPerDay = equivKm / finalDays;
            const startDate = document.getElementById('start-date').value;
            let html = `<p style="font-size:13px;color:var(--muted);margin-bottom:14px;">共 <strong style="color:var(--primary)">${finalDays} 天</strong>，總里程 <strong style="color:var(--primary)">${Math.round(totalKm)}km</strong>，總爬升 <strong style="color:var(--warn)">${Math.round(totalGain)}m</strong></p>`;

            for (let d = 0; d < finalDays; d++) {
                const dateStr = startDate ? new Date(new Date(startDate).getTime() + d * 86400000).toLocaleDateString('zh-TW', { month: 'long', day: 'numeric', weekday: 'short' }) : `第 ${d + 1} 天`;
                const progressStart = Math.round(d * totalKm / finalDays);
                const progressEnd = Math.round((d + 1) * totalKm / finalDays);
                const overload = equivPerDay > limit;
                const speedKmh = intensity === 'leisure' ? 15 : intensity === 'challenge' ? 20 : 25;
                const hrs = Math.round(equivPerDay / speedKmh * 10) / 10;

                html += `
            <div class="day-card" id="day-card-${d}">
                <div class="day-header" onclick="toggleDay(this)">
                    <h4>${dateStr} <button class="highlight-btn" onclick="event.stopPropagation(); highlightDay(${d}, ${totalKm}, ${finalDays})">🔍 地圖聚焦</button></h4>
                    <div class="day-meta">${Math.round(kmPerDay)}km｜⬆️${Math.round(gainPerDay)}m｜⏱️~${hrs}h</div>
                </div>
                <div class="day-body" id="day-body-${d}">
                    ${overload ? `<div class="warn">⚠️ 等效里程 ${Math.round(equivPerDay)}km 超過上限！</div>` : ''}
                    <p style="font-size:12px;color:var(--muted);margin-bottom:8px;">里程區間：<strong style="color:var(--text)">${progressStart} – ${progressEnd} km</strong></p>
                    <p style="font-size:12px;color:var(--muted);margin-bottom:8px;">建議配速：<strong style="color:var(--primary)">${speedKmh} km/h</strong>，${Math.floor(7 + hrs)}:00 前抵達</p>
                    <p style="font-size:12px;color:var(--muted);">沿途星標：<span id="day-stars-${d}">（收藏後顯示於此）</span></p>
                </div>
            </div>`;
            }
            document.getElementById('day-plans-container').innerHTML = html;
            updateDayStars(finalDays, totalKm);
        }

        let dayHighlightLine;
        function highlightDay(dayIndex, totalKm, totalDays) {
            if (!currentPath || currentPath.length === 0) return;
            const startRatio = dayIndex / totalDays;
            const endRatio = (dayIndex + 1) / totalDays;
            const startIndex = Math.floor(currentPath.length * startRatio);
            const endIndex = Math.floor(currentPath.length * endRatio);
            const segment = currentPath.slice(startIndex, endIndex + 1);

            if (dayHighlightLine) dayHighlightLine.setMap(null);
            dayHighlightLine = new google.maps.Polyline({
                path: segment, strokeColor: '#fbbf24', strokeOpacity: 0.8, strokeWeight: 8, map
            });

            const bounds = new google.maps.LatLngBounds();
            segment.forEach(p => bounds.extend(p));
            map.fitBounds(bounds);
            showAlert(`📍 正在預覽第 ${dayIndex + 1} 天路段`);
            switchTab('days');
        }

        function toggleDay(header) {
            const body = header.nextElementSibling;
            body.classList.toggle('open');
        }

        function updateDayStars(days, totalKm) {
            // Simple: show all starred in day cards proportionally
            starredPlaces.forEach((data, id) => {
                // Just list all starred at every day for now
            });
        }

        // ─── POI Markers ───
        let poiMarkers = [];
        const TAG_COLORS = { food: '#f97316', hotel: '#818cf8', emergency: '#f43f5e', bike: '#00ffca', supply: '#fbbf24' };
        const TAG_ICONS = { food: '🍜', hotel: '🏨', emergency: '🚨', bike: '🚲', supply: '⛽' };

        function clearPoiMarkers() {
            poiMarkers.forEach(m => m.setMap(null));
            poiMarkers = [];
        }

        function addPoiMarker(place) {
            if (!place.geometry || !place.geometry.location) return;
            const color = TAG_COLORS[place._tag] || '#00ffca';
            const icon = TAG_ICONS[place._tag] || '📍';
            const marker = new google.maps.Marker({
                position: place.geometry.location,
                map,
                title: place.name,
                icon: {
                    path: google.maps.SymbolPath.CIRCLE,
                    scale: 8,
                    fillColor: color,
                    fillOpacity: 0.9,
                    strokeColor: '#0f172a',
                    strokeWeight: 2
                },
                label: { text: icon, fontSize: '12px', fontWeight: 'bold' }
            });
            const infoWin = new google.maps.InfoWindow({
                content: `<div style="color:#000;font-family:sans-serif;min-width:180px">
                    <strong>${place.name}</strong><br>
                    <span style="font-size:12px;color:#666">${place.vicinity || ''}</span><br>
                    ${place.rating ? `<span style="color:orange">★ ${place.rating}</span>` : ''}
                    <br><a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(place.name)}&query_place_id=${place.place_id}" target="_blank" style="color:#1a73e8;font-weight:bold">導航到此</a>
                </div>`
            });
            marker.addListener('click', () => infoWin.open(map, marker));
            poiMarkers.push(marker);
        }

        // ─── Places Search ───
        const SEARCH_CONFIGS = [
            { type: 'restaurant', tag: 'food', label: '🍜 美食' },
            { type: 'lodging', tag: 'hotel', label: '🏨 旅館' },
            { keyword: '便利商店', tag: 'supply', label: '⛽ 便利商店' },
            { type: 'police', tag: 'emergency', label: '🚨 警察局' },
            { keyword: '腳踏車', tag: 'bike', label: '🚲 單車維修' },
            { type: 'hospital', tag: 'emergency', label: '🏥 診所' },
        ];

        async function searchAlongRoute(path) {
            debug(`Starting searchAlongRoute with ${path.length} points`);
            allResults = [];
            clearPoiMarkers();

            let totalPathDist = 0;
            try {
                if (google.maps.geometry && google.maps.geometry.spherical) {
                    for (let i = 1; i < path.length; i++) {
                        totalPathDist += google.maps.geometry.spherical.computeDistanceBetween(path[i - 1], path[i]);
                    }
                    totalPathDist /= 1000;
                    debug(`Path distance via geometry: ${totalPathDist.toFixed(1)}km`);
                } else {
                    debug('Geometry library missing, using point count estimate');
                    totalPathDist = path.length * 0.5; // very rough estimate
                }
            } catch (e) {
                debug(`Distance calc error: ${e.message}`);
                totalPathDist = 1000; // fallback high to force sampling
            }

            const desiredSpacingKm = 20;
            const numPoints = Math.max(8, Math.ceil(totalPathDist / desiredSpacingKm));
            const step = Math.max(1, Math.floor(path.length / numPoints));

            const points = [];
            for (let i = 0; i < path.length; i += step) points.push(path[i]);
            debug(`Sampling ${points.length} points for shops...`);

            document.getElementById('results-label').textContent = `沿途推薦 (搜尋中... ${points.length} 站)`;
            updateApiStatus('places', 'SEARCHING');

            for (let idx = 0; idx < points.length; idx++) {
                const pt = points[idx];
                for (const cfg of SEARCH_CONFIGS) {
                    const req = { location: pt, radius: '3000' };
                    if (cfg.type) req.type = cfg.type; else req.keyword = cfg.keyword;
                    const res = await runSearch(req);
                    if (res.length > 0) debug(`Found ${res.length} ${cfg.tag} at station ${idx}`);
                    res.slice(0, 3).forEach(p => {
                        if (!allResults.find(r => r.place_id === p.place_id)) {
                            const enriched = { ...p, _tag: cfg.tag, _label: cfg.label };
                            allResults.push(enriched);
                            addPoiMarker(enriched);
                        }
                    });
                }
            }
            debug(`Search complete. Total stores: ${allResults.length}`);
            document.getElementById('results-label').textContent = `沿途推薦 (共 ${allResults.length} 筆)`;
            const bar = document.getElementById('categories-bar');
            if (bar) bar.setAttribute('style', 'display:flex !important; gap:6px; flex-wrap:wrap; margin-bottom:10px;');
            renderResults(allResults);
        }

        function runSearch(req) {
            return new Promise(resolve => {
                placesSvc.nearbySearch(req, (res, stat) => {
                    updateApiStatus('places', stat);
                    resolve(stat === google.maps.places.PlacesServiceStatus.OK ? res : []);
                });
            });
        }

        function filterResults(tag) {
            currentFilter = tag;
            const filtered = tag === 'all' ? allResults : allResults.filter(r => r._tag === tag);
            renderResults(filtered);
        }

        function renderResults(places) {
            const container = document.getElementById('search-results');
            container.innerHTML = '';
            places.slice(0, 30).forEach(p => {
                const isStarred = starredPlaces.has(p.place_id);
                const card = document.createElement('div');
                card.className = 'place-card' + (isStarred ? ' starred' : '');
                card.dataset.pid = p.place_id;
                card.innerHTML = `
                <div class="ph">
                    <strong>${p.name}</strong>
                    <span class="star-btn ${isStarred ? 'active' : ''}" onclick="toggleStar('${p.place_id}','${(p.name || '').replace(/'/g, "\\'")}','${(p.vicinity || '').replace(/'/g, "\\'")}',${p.rating || 0},'${p._tag || ''}','${p._label || ''}')"><i class="fas fa-star"></i></span>
                </div>
                <div class="place-meta">${p.vicinity || ''}</div>
                <div class="place-actions">
                    <span class="tag tag-${p._tag || 'food'}">${p._label || ''}</span>
                    ${p.rating ? `<span style="color:var(--warn);font-size:12px;"><i class="fas fa-star"></i> ${p.rating}</span>` : ''}
                    <span class="nav-link" onclick="navigateTo('${p.place_id}','${(p.name || '').replace(/'/g, "\\'")}')">驗證並導航 →</span>
                </div>`;
                container.appendChild(card);
            });
            updateStarIcons();
        }

        function navigateTo(placeId, name) {
            placesSvc.getDetails({ placeId, fields: ['business_status', 'url'] }, (place, st) => {
                if (st === google.maps.places.PlacesServiceStatus.OK) {
                    if (place.business_status === 'CLOSED_PERMANENTLY' || place.business_status === 'CLOSED_TEMPORARILY') {
                        return showAlert(`⚠️ ${name} 已歇業，請選擇其他選項`, 'warn');
                    }
                    window.open(`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(name)}&query_place_id=${placeId}`, '_blank');
                } else {
                    window.open(`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(name)}&query_place_id=${placeId}`, '_blank');
                }
            });
        }

        // ─── Star System ───
        function toggleStar(pid, name, addr, rating, tag, label) {
            if (starredPlaces.has(pid)) starredPlaces.delete(pid);
            else starredPlaces.set(pid, { name, address: addr, rating, tag, label, placeId: pid });
            renderStarred();
            updateStarIcons();
        }

        function renderStarred() {
            const c = document.getElementById('starred-list');
            c.innerHTML = '';
            starredPlaces.forEach((d, id) => {
                const card = document.createElement('div');
                card.className = 'place-card starred';
                card.innerHTML = `
                <div class="ph"><strong>${d.name}</strong><span class="star-btn active" onclick="toggleStar('${id}')"><i class="fas fa-star"></i></span></div>
                <div class="place-meta">${d.address}</div>
                <div class="place-actions">
                    <span class="tag tag-${d.tag}">${d.label}</span>
                    ${d.rating ? `<span style="color:var(--warn);font-size:12px;"><i class="fas fa-star"></i> ${d.rating}</span>` : ''}
                    <span class="nav-link" onclick="navigateTo('${id}','${d.name.replace(/'/g, "\\'")}')">導航 →</span>
                </div>`;
                c.appendChild(card);
            });
        }

        function updateStarIcons() {
            document.querySelectorAll('.place-card').forEach(card => {
                const pid = card.dataset.pid;
                if (!pid) return;
                const btn = card.querySelector('.star-btn');
                if (btn) btn.classList.toggle('active', starredPlaces.has(pid));
            });
        }

        // ─── Seasonal Advice ───
        function updateSeasonalAdvice() {
            const date = document.getElementById('start-date').value;
            if (!date || !map) return;
            const month = new Date(date).getMonth() + 1;
            const c = map.getCenter();
            const lat = c.lat(), lng = c.lng();
            let region = '北部';
            if (lat < 23.5) region = '南部';
            else if (lat < 24.5) region = '中部';
            if (lng > 121.3) region = '東部';
            const box = document.getElementById('seasonal-advice');
            let icon = 'fa-leaf', col = 'var(--primary)', msg = '天候穩定，下午山區可能有陣雨，建議攜帶輕便雨衣。';
            if ([12, 1, 2].includes(month)) {
                icon = 'fa-snowflake'; col = 'var(--info)';
                msg = region === '北部' ? '東北季風強烈，九降風期，北部連日陰雨。建議攜帶全套防雨裝備及保暖手套。' : '中南部早晚溫差大，清晨可能低於15°C，請注意保暖。';
            } else if (month >= 6 && month <= 9) {
                icon = 'fa-sun'; col = 'var(--danger)';
                msg = '高溫時段（11–14時）建議休息避曬！每 20km 強制補水，防曬乳 2 小時補擦一次，小心熱衰竭。';
            } else if ([4, 5].includes(month)) {
                icon = 'fa-cloud-rain'; col = 'var(--warn)';
                msg = '梅雨季節，建議查天氣預報出發。路面濕滑，煞車距離增加，降速騎行。';
            }
            box.innerHTML = `<div class="advice-header"><i class="fas ${icon}" style="color:${col}"></i> ${region}氣候提醒</div><p>${msg}</p>`;
            box.style.display = 'block';
        }

        // ─── Checklist ───
        function initChecklist() {
            const saved = JSON.parse(localStorage.getItem('rm_checklist') || '[]');
            document.querySelectorAll('.check-item').forEach(item => {
                const id = item.dataset.id;
                const cb = item.querySelector('input');
                if (saved.includes(id)) { cb.checked = true; item.classList.add('checked'); }
                cb.addEventListener('change', () => {
                    item.classList.toggle('checked', cb.checked);
                    saveChecklist();
                });
            });
        }

        function saveChecklist() {
            const checked = [...document.querySelectorAll('.check-item input:checked')].map(cb => cb.id);
            localStorage.setItem('rm_checklist', JSON.stringify(checked));
        }

        function resetChecklist() {
            document.querySelectorAll('.check-item input').forEach(cb => cb.checked = false);
            document.querySelectorAll('.check-item').forEach(i => i.classList.remove('checked'));
            localStorage.removeItem('rm_checklist');
            showAlert('清單已重置');
        }

        // ─── Share & Restore ───
        async function shareState() {
            const state = {
                v: 2,
                origin: document.getElementById('origin-city').value,
                dest: document.getElementById('dest-city').value,
                intensity: document.getElementById('intensity').value,
                days: document.getElementById('days').value,
                date: document.getElementById('start-date').value,
                preset: currentPreset,
                path: currentPath.map(p => [+p.lat().toFixed(5), +p.lng().toFixed(5)]),
                stars: [...starredPlaces.entries()].map(([id, d]) => ({ id, ...d })),
                checklist: [...document.querySelectorAll('.check-item input:checked')].map(cb => cb.id)
            };

            // Try Cloudflare Worker KV
            try {
                const res = await fetch(CF, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ share_state: state }) });
                const data = await res.json();
                if (data.id) {
                    const url = `${location.origin}${location.pathname}?id=${data.id}`;
                    await navigator.clipboard.writeText(url);
                    showAlert('✅ 短連結已複製！對方打開即可還原完整規劃', 'ok');
                    return;
                }
            } catch (e) { console.warn('Worker share failed, using LZ-String fallback'); }

            // Fallback: LZ-String
            const compressed = LZString.compressToEncodedURIComponent(JSON.stringify(state));
            const url = `${location.origin}${location.pathname}#${compressed}`;
            await navigator.clipboard.writeText(url);
            showAlert('✅ 長連結已複製！', 'ok');
        }

        async function restoreState() {
            const params = new URLSearchParams(location.search);
            const id = params.get('id');
            const hash = location.hash.substring(1);
            let state = null;

            if (id) {
                try {
                    const res = await fetch(CF, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ load_id: id }) });
                    const data = await res.json();
                    if (data.share_state) state = data.share_state;
                } catch (e) { }
            }
            if (!state && hash) {
                try { state = JSON.parse(LZString.decompressFromEncodedURIComponent(hash)); } catch (e) { }
            }
            if (!state) return;

            // Restore form
            if (state.origin) document.getElementById('origin-city').value = state.origin;
            if (state.dest) document.getElementById('dest-city').value = state.dest;
            if (state.intensity) document.getElementById('intensity').value = state.intensity;
            if (state.days) document.getElementById('days').value = state.days;
            if (state.date) document.getElementById('start-date').value = state.date;

            // Restore starred
            if (state.stars) {
                state.stars.forEach(s => starredPlaces.set(s.id, s));
                renderStarred();
            }

            // Restore checklist
            if (state.checklist) {
                state.checklist.forEach(id => {
                    const cb = document.getElementById(id);
                    if (cb) { cb.checked = true; cb.closest('.check-item').classList.add('checked'); }
                });
                saveChecklist();
            }

            // Restore path
            if (state.preset) {
                showAlert('🚀 還原預設路線中...', 'ok');
                loadPreset(state.preset);
            } else if (state.path && state.path.length > 0) {
                showAlert('🚀 還原自訂路線中...', 'ok');
                generateCustomRoute();
            }
        }

        // ─── AI POI ───
        async function getAiPoi() {
            if (currentPath.length < 2) return showAlert('請先載入路線！');
            const btn = document.getElementById('ai-poi-btn');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> AI 搜尋中...';
            btn.disabled = true;
            try {
                const res = await fetch(CF, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ ai_poi: true, s: '起點', e: '終點' }) });
                const data = await res.json();
                if (data.poi) {
                    const container = document.getElementById('search-results');
                    const hdr = document.createElement('div');
                    hdr.innerHTML = '<label style="color:var(--primary);margin-bottom:8px;display:block;">💎 AI 精選景點</label>';
                    container.prepend(hdr);
                    data.poi.forEach(poi => {
                        const card = document.createElement('div');
                        card.className = 'place-card';
                        card.style.borderLeft = '3px solid var(--primary)';
                        card.innerHTML = `<div class="ph"><strong>${poi.name} [${poi.type}]</strong></div><div class="place-meta">${poi.desc}</div><div class="place-actions"><a class="nav-link" href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(poi.name)}" target="_blank">導航 →</a></div>`;
                        container.prepend(card);
                    });
                    showAlert('💎 AI 精選景點已載入', 'ok');
                }
            } catch (e) { showAlert('❌ AI 連線失敗'); }
            finally { btn.innerHTML = '<i class="fas fa-magic"></i> AI 精選景點推薦'; btn.disabled = false; }
        }

        // ─── Error Handler ───
        window.onerror = (msg, url, line) => {
            console.error('Error:', msg, 'L' + line);
        };

        // ─── Dynamic API Load ───
        (function () {
            const _k = ["AIzaSyAFoZlbO", "mnvd_8dIbVfOzB", "jkQOgUwwwWpg"];
            const s = document.createElement('script');
            s.src = `https://maps.googleapis.com/maps/api/js?key=${_k.join("")}&libraries=places,geometry&callback=initMap&language=zh-TW`;
            s.async = true; s.defer = true;
            document.head.appendChild(s);
        })();
    </script>
</body>
