<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Road Master | 單車智慧導航</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=Noto+Sans+TC:wght@400;500;700;900&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --p: #f97316;
            --p-light: #fdba74;
            --bg: #030712;
            --c: #1e293b;
            --t: #f1f5f9;
            --m: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
            --glass: rgba(15, 23, 42, 0.8);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', 'Noto Sans TC', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--bg);
            color: var(--t);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background-image:
                radial-gradient(circle at 0% 0%, rgba(249, 115, 22, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 100% 100%, rgba(56, 189, 248, 0.05) 0%, transparent 40%);
        }

        /* Responsive Header */
        header {
            padding: 0.8rem 1.2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(3, 7, 18, 0.9);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--border);
            z-index: 100;
        }

        .logo {
            font-weight: 900;
            font-size: 1.1rem;
            color: var(--p);
            letter-spacing: 0.5px;
        }

        /* Main Area */
        main {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem 1rem 300px;
            scroll-behavior: smooth;
        }

        #chat-thread {
            max-width: 850px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 2rem;
            width: 100%;
        }

        /* Message Bubbles */
        .msg {
            display: flex;
            flex-direction: column;
            animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            width: 100%;
        }

        .msg.user {
            align-items: flex-end;
        }

        .msg.ai {
            align-items: center;
        }

        .bubble {
            padding: 1.2rem;
            border-radius: 20px;
            line-height: 1.6;
            font-size: 0.95rem;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            width: 100%;
        }

        .msg.user .bubble {
            max-width: 85%;
            background: var(--p);
            color: #fff;
            border-bottom-right-radius: 4px;
            font-weight: 600;
            box-shadow: 0 4px 20px rgba(249, 115, 22, 0.3);
        }

        .msg.ai .bubble {
            background: var(--glass);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
            color: var(--t);
        }

        /* --- ✨ 旗艦級 Timeline 視覺模體 ✨ --- */
        .timeline-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 16px;
            margin-bottom: 20px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: 0.3s;
        }

        .timeline-card:hover {
            border-color: var(--p);
            background: rgba(255, 255, 255, 0.05);
        }

        .day-header {
            background: rgba(249, 115, 22, 0.15);
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            font-weight: 900;
            color: var(--p-light);
            font-size: 1.1rem;
        }

        .day-route {
            padding: 15px 16px;
            font-weight: 700;
            color: #fff;
            border-bottom: 1px dashed var(--border);
        }

        .day-stats {
            display: flex;
            gap: 15px;
            padding: 10px 16px;
            background: rgba(0, 0, 0, 0.2);
            font-size: 0.85rem;
            color: var(--m);
            font-weight: 600;
        }

        .day-body {
            padding: 15px 16px;
            display: grid;
            gap: 15px;
            grid-template-columns: 1fr;
        }

        @media(min-width: 600px) {
            .day-body {
                grid-template-columns: 1fr 1fr;
            }
        }

        .info-section {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .info-label {
            font-size: 0.75rem;
            color: var(--p);
            font-weight: 900;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .info-label::before {
            content: "";
            width: 4px;
            height: 12px;
            background: var(--p);
            border-radius: 2px;
        }

        .info-text {
            font-size: 0.9rem;
            color: #cbd5e1;
            line-height: 1.5;
        }

        /* Equipment Cards */
        .tab-pane.grid-layout ul {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 12px;
            padding: 0;
            list-style: none;
        }

        @media(min-width: 600px) {
            .tab-pane.grid-layout ul {
                grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
                gap: 16px;
            }
        }

        .tab-pane.grid-layout li {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .tab-pane.grid-layout li strong {
            color: var(--p);
            display: block;
            border-bottom: 1px solid rgba(249, 115, 22, 0.2);
            padding-bottom: 4px;
        }

        /* Tabs Navigation */
        .tabs-container {
            border-radius: 16px;
            border: 1px solid var(--border);
            overflow: hidden;
            margin-top: 1rem;
            width: 100%;
        }

        .tabs-nav {
            display: flex;
            background: rgba(0, 0, 0, 0.6);
            overflow-x: auto;
            scrollbar-width: none;
            border-bottom: 1px solid var(--border);
        }

        .tabs-nav::-webkit-scrollbar {
            display: none;
        }

        .tab-btn {
            flex: 1;
            min-width: 100px;
            padding: 14px 10px;
            border: none;
            background: transparent;
            color: var(--m);
            font-weight: 800;
            font-size: 0.9rem;
            cursor: pointer;
            white-space: nowrap;
            transition: 0.2s;
            border-bottom: 3px solid transparent;
        }

        @media(min-width: 600px) {
            .tab-btn {
                min-width: 150px;
                padding: 16px 20px;
                font-size: 1rem;
            }
        }

        .tab-btn.active {
            color: var(--p);
            border-bottom-color: var(--p);
            background: rgba(249, 115, 22, 0.05);
        }

        .tab-pane {
            display: none;
            padding: 1.2rem;
            animation: fadeIn 0.4s ease-out;
        }

        .tab-pane.active {
            display: block;
        }

        /* Form Card */
        .plan-card {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border);
            padding: 1.5rem;
            border-radius: 18px;
            margin-top: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        .form-row {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-label {
            font-size: 0.85rem;
            font-weight: 800;
            color: var(--p-light);
            display: flex;
            justify-content: space-between;
        }

        .quick-chips {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .chip {
            background: #334155;
            color: #cbd5e1;
            padding: 4px 10px;
            border-radius: 50px;
            font-size: 0.75rem;
            cursor: pointer;
        }

        .form-input {
            background: #0f172a;
            border: 1px solid #334155;
            color: #fff;
            padding: 12px;
            border-radius: 10px;
            font-size: 0.95rem;
            outline: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--p), #ea580c);
            color: #fff;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-weight: 900;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(249, 115, 22, 0.3);
        }

        /* Bottom Dock Panel */
        .dock {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 1rem 1.2rem 2rem;
            background: linear-gradient(transparent, var(--bg) 60%);
            z-index: 200;
            pointer-events: none;
        }

        .dock-bar {
            width: 100%;
            max-width: 850px;
            margin: 0 auto;
            background: #1e293b;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 99px;
            padding: 6px 6px 6px 18px;
            display: flex;
            align-items: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
            pointer-events: auto;
        }

        .dock-input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            padding: 10px 0;
            font-size: 1rem;
            outline: none;
        }

        .dock-btn {
            background: var(--p);
            color: white;
            border: none;
            padding: 0 18px;
            height: 42px;
            border-radius: 99px;
            font-weight: 900;
            cursor: pointer;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

    <header>
        <div class="logo">ROAD MASTER</div>
        <div style="font-size:0.75rem; color:var(--m); font-weight:800; text-transform:uppercase; letter-spacing:1px;">
            App Elite Pro</div>
    </header>

    <main id="chat-scroller">
        <div id="chat-thread">
            <div class="msg ai">
                <div class="bubble">
                    <p style="font-weight:700; font-size:1.1rem; color:var(--p-light);">🚵 歡迎來到單車專業規劃領域</p>
                    <p style="color:var(--m); font-size:0.9rem; margin-top:5px;">我是 Road Master
                        教練，請填寫下方座標，我將為您算繪高動態的行程流。</p>
                    <div class="plan-card">
                        <div class="form-row">
                            <div class="form-label"><span>📍 出發點</span>
                                <div class="quick-chips"><span class="chip" onclick="iv('start','台北')">台北</span><span
                                        class="chip" onclick="iv('start','新竹')">新竹</span></div>
                            </div>
                            <input type="text" id="start" class="form-input" placeholder="例如：台北火車站">
                        </div>
                        <div class="form-row">
                            <div class="form-label"><span>🏁 終點</span>
                                <div class="quick-chips"><span class="chip" onclick="iv('end','恆春')">恆春</span><span
                                        class="chip" onclick="iv('end','環島')">環島</span></div>
                            </div>
                            <input type="text" id="end" class="form-input" placeholder="例如：恆春古城">
                        </div>
                        <div class="form-row">
                            <div class="form-label"><span>⏱️ 天數</span>
                                <div class="quick-chips"><span class="chip" onclick="iv('days','3天')">3天</span><span
                                        class="chip" onclick="iv('days','9天')">9天</span></div>
                            </div>
                            <input type="text" id="days" class="form-input" placeholder="預定天數">
                        </div>
                        <button class="btn-primary" onclick="submitForm()">🚀 產出高級戰術行程</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div class="dock">
        <div class="dock-bar">
            <input type="text" id="chat-input" class="dock-input" placeholder="詢問裝備或特定路況..."
                onkeypress="if(event.key==='Enter')submitChat()">
            <button class="dock-btn" onclick="submitChat()">傳送</button>
        </div>
    </div>

    <script>
        const CF_GATEWAY = "https://hidden-surf-0579.love7053150.workers.dev/";
        const scroller = document.getElementById('chat-scroller');
        const thread = document.getElementById('chat-thread');
        const input = document.getElementById('chat-input');

        const SYSTEM_PROMPT = `你是核心單車專家。嚴禁廢話前言或結語。
當收到規劃需求時，必須產出以下三個標題：

### 📅 詳細路線與行程流
必須產出 Markdown 表格，欄位嚴格如下：
1. **天數**
2. **路線**
3. **數據** (公里/爬升)
4. **必看風景與補給**
5. **路線挑戰與提醒**

### 🎒 戰術裝備建議
(清單格式：- **裝備名**：精簡用途)

### ⚠️ 實戰風險提示
(清單格式：- **主題**：具體應對)

不准有表格之外的說明文字扣除標題。文字必須極簡化。`;

        function iv(id, v) { document.getElementById(id).value = v; }

        function scrollBottom() {
            setTimeout(() => { scroller.scrollTo({ top: scroller.scrollHeight + 300, behavior: 'smooth' }); }, 300);
        }

        function addMessage(role, content, raw = false) {
            const m = document.createElement('div');
            m.className = `msg ${role}`;
            m.innerHTML = `<div class="bubble">${raw ? content : marked.parse(content)}</div>`;
            thread.appendChild(m);
            scrollBottom();
            return m;
        }

        // ✨ 高級 UI 轉換器：將 Markdown 表格轉化為 Timeline Cards ✨
        function transformToTimeline(tableHtml) {
            const div = document.createElement('div');
            div.innerHTML = tableHtml;
            const rows = Array.from(div.querySelectorAll('tr')).slice(1); // 捨棄標頭

            if (rows.length === 0) return tableHtml;

            let timelineHtml = `<div class="timeline-flow">`;
            rows.forEach(row => {
                const cols = Array.from(row.querySelectorAll('td')).map(td => td.innerText.trim());
                if (cols.length < 5) return;

                timelineHtml += `
            <div class="timeline-card">
                <div class="day-header"><span>DAY ${cols[0]}</span> <div style="font-size:0.7rem; color:var(--m);">ELITE ROUTE</div></div>
                <div class="day-route">${cols[1]}</div>
                <div class="day-stats"><span>📏 ${cols[2]}</span></div>
                <div class="day-body">
                    <div class="info-section">
                        <div class="info-label">📍 風景與補給</div>
                        <div class="info-text">${cols[3]}</div>
                    </div>
                    <div class="info-section">
                        <div class="info-label">⚡ 挑戰與提醒</div>
                        <div class="info-text">${cols[4]}</div>
                    </div>
                </div>
            </div>`;
            });
            timelineHtml += `</div>`;
            return timelineHtml;
        }

        function renderTabs(rawContent) {
            const cleanText = rawContent.replace(/\\n/g, '\n');
            const firstHeaderIndex = cleanText.indexOf('### ');
            if (firstHeaderIndex === -1) return marked.parse(cleanText);

            const sections = cleanText.substring(firstHeaderIndex).split(/\n?(?=### )/);

            let tabsNav = `<div class="tabs-container"><div class="tabs-nav">`;
            let tabsContent = `</div><div class="tabs-content">`;
            let count = 0;

            sections.forEach(sec => {
                const trimmed = sec.trim();
                if (!trimmed.startsWith('###')) return;

                const firstLineEnd = trimmed.indexOf('\n');
                let title = trimmed.substring(0, firstLineEnd !== -1 ? firstLineEnd : trimmed.length).replace(/###\s*/, '').trim();
                let body = firstLineEnd !== -1 ? trimmed.substring(firstLineEnd).trim() : "";

                const active = count === 0 ? 'active' : '';
                let layoutClass = '';
                if (title.match(/裝備|提示|提醒|守則/)) layoutClass = 'grid-layout';

                let parsedBody = marked.parse(body);
                // 如果是第一個分頁 (行程)，嘗試轉換表格為 Timeline
                if (count === 0 && parsedBody.includes('<table')) {
                    parsedBody = transformToTimeline(parsedBody);
                }

                tabsNav += `<button class="tab-btn ${active}" onclick="switchTab(this, ${count})">${title}</button>`;
                tabsContent += `<div class="tab-pane ${active} ${layoutClass}" data-index="${count}">${parsedBody}</div>`;
                count++;
            });

            return count === 0 ? marked.parse(cleanText) : (tabsNav + tabsContent + `</div></div>`);
        }

        window.switchTab = function (btn, idx) {
            const con = btn.closest('.tabs-container');
            con.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            con.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
            con.querySelector(`.tab-pane[data-index="${idx}"]`).classList.add('active');
        };

        async function submitForm() {
            const s = document.getElementById('start').value;
            const e = document.getElementById('end').value;
            const d = document.getElementById('days').value;
            if (!s || !e || !d) return alert("請填寫完整規劃資訊。");
            addMessage('user', `分析：從 **${s}** 騎到 **${e}**，完成天數 **${d}**。`);
            await callAI(`詳細行程規劃：${s} 至 ${e}，${d}。內容應包含坡度與景點細節。`);
        }

        async function submitChat() {
            const v = input.value.trim();
            if (!v) return;
            input.value = '';
            addMessage('user', v);
            await callAI(v);
        }

        async function callAI(q) {
            const loader = document.createElement('div');
            loader.className = 'msg ai';
            loader.innerHTML = `<div class="bubble" style="max-width:80px; padding:10px;"><div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>`;
            thread.appendChild(loader);
            scrollBottom();

            try {
                const res = await fetch(CF_GATEWAY, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: SYSTEM_PROMPT + "\n需求：" + q }] }] })
                });
                const data = await res.json();
                loader.remove();
                addMessage('ai', renderTabs(data.candidates?.[0]?.content?.parts?.[0]?.text || "無回應"), true);
            } catch (e) {
                loader.remove();
                addMessage('ai', "連線錯誤，請再次嘗試。");
            }
        }
    </script>
</body>

</html>
