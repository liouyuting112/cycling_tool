<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Road Master | 單車智慧導航</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=Noto+Sans+TC:wght@400;500;700;900&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --p: #f97316;
            --p-light: #fdba74;
            --bg: #030712;
            --c: #1e293b;
            --t: #f1f5f9;
            --m: #94a3b8;
            --border: rgba(255, 255, 255, 0.12);
            --glass: rgba(15, 23, 42, 0.85);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', 'Noto Sans TC', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--bg);
            color: var(--t);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background-image:
                radial-gradient(circle at 0% 0%, rgba(249, 115, 22, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 100% 100%, rgba(56, 189, 248, 0.05) 0%, transparent 40%);
        }

        /* Header */
        header {
            padding: 1rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(3, 7, 18, 0.9);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--border);
            z-index: 100;
        }

        .logo {
            font-weight: 900;
            font-size: 1.25rem;
            color: var(--p);
            letter-spacing: 0.5px;
        }

        /* Main Area */
        main {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem 1rem 320px;
            scroll-behavior: smooth;
        }

        #chat-thread {
            max-width: 900px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 2.5rem;
            width: 100%;
        }

        /* Message Bubbles */
        .msg {
            display: flex;
            flex-direction: column;
            animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            width: 100%;
        }

        .msg.user {
            align-items: flex-end;
        }

        .msg.ai {
            align-items: center;
        }

        .bubble {
            padding: 1.5rem;
            border-radius: 24px;
            line-height: 1.7;
            font-size: 1rem;
            box-shadow: 0 12px 48px rgba(0, 0, 0, 0.4);
            width: 100%;
        }

        .msg.user .bubble {
            max-width: 85%;
            background: var(--p);
            color: #fff;
            border-bottom-right-radius: 4px;
            font-weight: 600;
            box-shadow: 0 4px 20px rgba(249, 115, 22, 0.3);
        }

        .msg.ai .bubble {
            background: var(--glass);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
            color: var(--t);
        }

        /* --- ✨ 旗艦級資訊展示元件 (Timeline) ✨ --- */
        .timeline-card {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border);
            border-radius: 20px;
            margin-bottom: 25px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: 0.3s;
        }

        .timeline-card:hover {
            border-color: rgba(249, 115, 22, 0.4);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
        }

        .day-header {
            background: rgba(249, 115, 22, 0.15);
            padding: 14px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            font-weight: 900;
            color: var(--p-light);
            font-size: 1.25rem;
        }

        .day-route {
            padding: 18px 20px;
            font-weight: 800;
            color: #fff;
            border-bottom: 1px dashed var(--border);
            font-size: 1.15rem;
        }

        .day-stats {
            display: flex;
            gap: 20px;
            padding: 12px 20px;
            background: rgba(0, 0, 0, 0.3);
            font-size: 0.9rem;
            color: var(--m);
            font-weight: 700;
        }

        .day-body {
            padding: 15px 20px 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* ✅ 全新設計：可點擊展開的資訊手風琴 (Accordion) ✅ */
        .info-accordion {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 14px;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .info-accordion[open] {
            background: rgba(255, 255, 255, 0.02);
            border-color: rgba(255, 255, 255, 0.15);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        }

        .info-accordion.challenge[open] {
            border-color: rgba(248, 113, 113, 0.4);
            background: rgba(248, 113, 113, 0.05);
        }

        .info-summary {
            padding: 14px 18px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            list-style: none;
            /* 隱藏原生三角形 */
            color: #e2e8f0;
            font-weight: 700;
            user-select: none;
            transition: 0.2s;
        }

        .info-summary::-webkit-details-marker {
            display: none;
        }

        .info-summary:hover {
            background: rgba(255, 255, 255, 0.04);
        }

        .info-label {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 800;
            font-size: 0.95rem;
            color: var(--p-light);
        }

        .challenge .info-label {
            color: #fca5a5;
        }

        .chevron {
            width: 18px;
            height: 18px;
            opacity: 0.6;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            color: #94a3b8;
        }

        .info-accordion[open] .chevron {
            transform: rotate(180deg);
            opacity: 1;
            color: var(--p-light);
        }

        .info-accordion.challenge[open] .chevron {
            color: #fca5a5;
        }

        .info-content {
            padding: 0 18px 18px 18px;
            color: #cbd5e1;
            font-size: 0.95rem;
            line-height: 1.7;
            animation: slideDown 0.3s ease-out;
            border-top: 1px solid transparent;
        }

        .info-accordion[open] .info-content {
            border-top-color: rgba(255, 255, 255, 0.05);
            padding-top: 14px;
            margin-top: 4px;
        }

        .info-accordion.challenge[open] .info-content {
            border-top-color: rgba(248, 113, 113, 0.15);
        }

        /* 富文本設定 */
        .info-content p {
            margin-bottom: 0.8rem;
        }

        .info-content p:last-child {
            margin-bottom: 0;
        }

        .info-content ul,
        .info-content ol {
            margin-left: 20px;
            margin-bottom: 0.8rem;
        }

        .info-content li {
            margin-bottom: 6px;
        }

        .info-content strong {
            color: var(--p-light);
            font-weight: 800;
            background: none;
            padding: 0;
        }

        .info-accordion.challenge .info-content strong {
            color: #f87171;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 裝備清單網格 */
        .tab-pane.grid-layout ul {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 15px;
            padding: 0;
            list-style: none;
        }

        @media(min-width: 768px) {
            .tab-pane.grid-layout ul {
                grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
                gap: 20px;
            }
        }

        .tab-pane.grid-layout li {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.25rem;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .tab-pane.grid-layout li strong {
            color: var(--p);
            display: block;
            border-bottom: 1px solid rgba(249, 115, 22, 0.2);
            padding-bottom: 6px;
            font-size: 1.1rem;
        }

        /* --- Tabs --- */
        .tabs-container {
            border-radius: 20px;
            border: 1px solid var(--border);
            overflow: hidden;
            margin-top: 1.25rem;
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
        }

        .tabs-nav {
            display: flex;
            background: rgba(15, 23, 42, 0.9);
            overflow-x: auto;
            scrollbar-width: none;
            border-bottom: 1px solid var(--border);
            -webkit-overflow-scrolling: touch;
        }

        .tabs-nav::-webkit-scrollbar {
            display: none;
        }

        .tab-btn {
            flex: 0 0 auto;
            padding: 18px 25px;
            border: none;
            background: transparent;
            color: var(--m);
            font-weight: 800;
            font-size: 0.95rem;
            cursor: pointer;
            white-space: nowrap;
            transition: 0.3s;
            border-bottom: 4px solid transparent;
            text-align: center;
        }

        .tab-btn.active {
            color: var(--p);
            border-bottom-color: var(--p);
            background: rgba(249, 115, 22, 0.1);
        }

        .tab-pane {
            display: none;
            padding: 1.5rem;
            animation: fadeIn 0.4s ease-out;
        }

        @media(min-width: 768px) {
            .tab-pane {
                padding: 2rem;
            }
        }

        .tab-pane.active {
            display: block;
        }

        /* Form Card */
        .plan-card {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border);
            padding: 1.75rem;
            border-radius: 20px;
            margin-top: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .form-row {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .form-label {
            font-size: 0.9rem;
            font-weight: 800;
            color: var(--p-light);
            display: flex;
            justify-content: space-between;
        }

        .quick-chips {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .chip {
            background: #334155;
            color: #cbd5e1;
            padding: 5px 12px;
            border-radius: 50px;
            font-size: 0.8rem;
            cursor: pointer;
            border: 1px solid transparent;
            transition: 0.2s;
        }

        .chip:hover {
            border-color: var(--p);
            background: rgba(249, 115, 22, 0.1);
            color: #fff;
        }

        .form-input {
            background: #0f172a;
            border: 1px solid #334155;
            color: #fff;
            padding: 14px;
            border-radius: 12px;
            font-size: 1rem;
            outline: none;
            transition: 0.2s;
        }

        .form-input:focus {
            border-color: var(--p);
            box-shadow: 0 0 15px rgba(249, 115, 22, 0.2);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--p), #ea580c);
            color: #fff;
            border: none;
            padding: 18px;
            border-radius: 14px;
            font-weight: 900;
            font-size: 1.1rem;
            cursor: pointer;
            box-shadow: 0 8px 30px rgba(249, 115, 22, 0.4);
        }

        /* Bottom Dock Panel */
        .dock {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 1.5rem 1.5rem 3rem;
            background: linear-gradient(transparent, var(--bg) 60%);
            z-index: 200;
            pointer-events: none;
        }

        .dock-bar {
            width: 100%;
            max-width: 850px;
            margin: 0 auto;
            background: #1e293b;
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 99px;
            padding: 8px 8px 8px 24px;
            display: flex;
            align-items: center;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.8);
            pointer-events: auto;
        }

        .dock-input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            padding: 12px 0;
            font-size: 1.05rem;
            outline: none;
        }

        .dock-btn {
            background: var(--p);
            color: white;
            border: none;
            padding: 0 25px;
            height: 50px;
            border-radius: 99px;
            font-weight: 900;
            cursor: pointer;
            transition: 0.2s;
        }

        .dock-btn:hover {
            background: #ea580c;
            transform: scale(1.05);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(15px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

    <header>
        <div class="logo">ROAD MASTER</div>
        <div
            style="font-size:0.85rem; color:var(--m); font-weight:800; text-transform:uppercase; letter-spacing:1.5px;">
            PRO V4 ELITE</div>
    </header>

    <main id="chat-scroller">
        <div id="chat-thread">
            <div class="msg ai">
                <div class="bubble">
                    <p style="font-weight:800; font-size:1.25rem; color:var(--p-light);">🚵 歡迎！我是您的單車高級嚮導</p>
                    <p style="color:var(--m); font-size:1rem; margin-top:10px; line-height:1.6;">
                        填寫下方計畫指標，我將為您計算高維度的路線細節、挑戰分析與實戰配備建議。</p>
                    <div class="plan-card">
                        <div class="form-row">
                            <div class="form-label"><span>📍 起點座標</span>
                                <div class="quick-chips"><span class="chip" onclick="iv('start','台北火車站')">台北</span><span
                                        class="chip" onclick="iv('start','新竹高鐵')">新竹</span></div>
                            </div>
                            <input type="text" id="start" class="form-input" placeholder="輸入出發地">
                        </div>
                        <div class="form-row">
                            <div class="form-label"><span>🏁 目標終點</span>
                                <div class="quick-chips"><span class="chip" onclick="iv('end','恆春古城')">恆春</span><span
                                        class="chip" onclick="iv('end','環島大圈')">環島</span></div>
                            </div>
                            <input type="text" id="end" class="form-input" placeholder="輸入目的地">
                        </div>
                        <div class="form-row">
                            <div class="form-label"><span>⏱️ 戰術天數</span>
                                <div class="quick-chips"><span class="chip" onclick="iv('days','3天')">3天</span><span
                                        class="chip" onclick="iv('days','9天')">9天</span></div>
                            </div>
                            <input type="text" id="days" class="form-input" placeholder="預定天數">
                        </div>
                        <button class="btn-primary" onclick="submitForm()">⚡ 啟動高維度戰略規劃</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div class="dock">
        <div class="dock-bar">
            <input type="text" id="chat-input" class="dock-input" placeholder="詢問坡度挑戰、裝備清單或特定路段..."
                onkeypress="if(event.key==='Enter')submitChat()">
            <button class="dock-btn" onclick="submitChat()">傳送</button>
        </div>
    </div>

    <script>
        const CF_GATEWAY = "https://hidden-surf-0579.love7053150.workers.dev/";
        const scroller = document.getElementById('chat-scroller');
        const thread = document.getElementById('chat-thread');
        const input = document.getElementById('chat-input');

        const SYSTEM_PROMPT = `你是核心單車專家。嚴禁廢話前言或結語。
當收到規劃需求時，必須產出以下三個標題：

### 📅 詳細路線與行程流
必須產出 Markdown 表格，欄位嚴格如下：
1. **天數**
2. **路線**
3. **數據** (公里/爬升)
4. **必看風景與補給** (必須詳盡描述美食、風景)
5. **路線挑戰與提醒** (必須詳細分析坡度陡度、逆風、車流量等風險)

### 🎒 戰術裝備建議
(清單格式：- **裝備名**：精簡用途)

### ⚠️ 實戰風險提示
(清單格式：- **主題**：具體應對)

不准有表格之外的說明文字扣除標題。文字必須極簡化但資訊要極度詳細。`;

        function iv(id, v) { document.getElementById(id).value = v; }

        function scrollBottom() {
            setTimeout(() => { scroller.scrollTo({ top: scroller.scrollHeight + 400, behavior: 'smooth' }); }, 300);
        }

        function addMessage(role, content, raw = false) {
            const m = document.createElement('div');
            m.className = `msg ${role}`;
            m.innerHTML = `<div class="bubble">${raw ? content : marked.parse(content)}</div>`;
            thread.appendChild(m);
            scrollBottom();
            return m;
        }

        // ✨ 全新突破：利用 Accordion 收納巨量文字，保持版面清爽 ✨
        function transformToTimeline(tableHtml) {
            const div = document.createElement('div');
            div.innerHTML = tableHtml;
            const rows = Array.from(div.querySelectorAll('tr')).slice(1);

            if (rows.length === 0) return tableHtml;

            let html = `<div class="timeline-flow">`;
            rows.forEach(row => {
                const cols = Array.from(row.querySelectorAll('td')).map(td => td.innerHTML.trim());
                if (cols.length < 5) return;

                html += `
            <div class="timeline-card">
                <div class="day-header"><span>DAY ${cols[0]}</span> <div style="font-size:0.75rem; color:var(--m); opacity:0.8;">ELITE NAVIGATION</div></div>
                <div class="day-route">${cols[1]}</div>
                <div class="day-stats"><span>📏 距離/爬升：${cols[2]}</span></div>
                <div class="day-body">
                    
                    <details class="info-accordion">
                        <summary class="info-summary">
                            <span class="info-label">📍 風景、美食與活動探勘</span>
                            <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
                        </summary>
                        <div class="info-content">${cols[3]}</div>
                    </details>
                    
                    <details class="info-accordion challenge">
                        <summary class="info-summary">
                            <span class="info-label">⚡ 路線挑戰與技術風險</span>
                            <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
                        </summary>
                        <div class="info-content">${cols[4]}</div>
                    </details>

                </div>
            </div>`;
            });
            html += `</div>`;
            return html;
        }

        function renderTabs(rawContent) {
            const cleanText = rawContent.replace(/\\n/g, '\n');
            const firstHeaderIndex = cleanText.indexOf('### ');
            if (firstHeaderIndex === -1) return marked.parse(cleanText);

            const sections = cleanText.substring(firstHeaderIndex).split(/\n?(?=### )/);

            let tabsNav = `<div class="tabs-container"><div class="tabs-nav">`;
            let tabsContent = `<div class="tabs-content">`;
            let count = 0;

            sections.forEach(sec => {
                const trimmed = sec.trim();
                if (!trimmed.startsWith('###')) return;

                const firstLineEnd = trimmed.indexOf('\n');
                let title = trimmed.substring(0, firstLineEnd !== -1 ? firstLineEnd : trimmed.length).replace(/###\s*/, '').trim();
                let body = firstLineEnd !== -1 ? trimmed.substring(firstLineEnd).trim() : "";

                const active = count === 0 ? 'active' : '';
                let layoutClass = '';
                if (title.match(/裝備|清單|提示|提醒|守則|風險/)) layoutClass = 'grid-layout';

                let parsedBody = marked.parse(body);
                if (count === 0 && parsedBody.includes('<table')) {
                    parsedBody = transformToTimeline(parsedBody);
                }

                tabsNav += `<button class="tab-btn ${active}" onclick="switchTab(this, ${count})">${title}</button>`;
                tabsContent += `<div class="tab-pane ${active} ${layoutClass}" data-index="${count}">${parsedBody}</div>`;
                count++;
            });

            return count === 0 ? marked.parse(cleanText) : (tabsNav + `</div>` + tabsContent + `</div></div>`);
        }

        window.switchTab = function (btn, idx) {
            const con = btn.closest('.tabs-container');
            con.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            con.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
            con.querySelector(`.tab-pane[data-index="${idx}"]`).classList.add('active');
        };

        async function submitForm() {
            const s = document.getElementById('start').value;
            const e = document.getElementById('end').value;
            const d = document.getElementById('days').value;
            if (!s || !e || !d) return alert("請完整填寫起訖點與天數規劃。");
            addMessage('user', `分析需求：從 **${s}** 騎行至 **${e}**，預定天數 **${d}**。請提供專業戰略報告。`);
            await callAI(`請為我規劃 ${s} 到 ${e}，${d}天的單車行程。極度詳細地列出每一天的美食、風景細節、精確技術坡度與交通安全分析。以Markdown表格輸出。`);
        }

        async function submitChat() {
            const v = input.value.trim();
            if (!v) return;
            input.value = '';
            addMessage('user', v);
            await callAI(v);
        }

        async function callAI(q) {
            const loader = document.createElement('div');
            loader.className = 'msg ai';
            loader.innerHTML = `<div class="bubble" style="max-width:90px; padding:10px;"><div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>`;
            thread.appendChild(loader);
            scrollBottom();

            try {
                const res = await fetch(CF_GATEWAY, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: SYSTEM_PROMPT + "\n任務需求：" + q }] }] })
                });
                const data = await res.json();
                loader.remove();
                addMessage('ai', renderTabs(data.candidates?.[0]?.content?.parts?.[0]?.text || "無回應"), true);
            } catch (e) {
                loader.remove();
                addMessage('ai', "連線錯誤，請刷新頁面再試。");
            }
        }
    </script>
</body>

</html>
