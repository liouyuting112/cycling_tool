<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0b1120">
    <title>Road Master | 單車智慧導航</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:ital,wght@0,400;0,700;0,900;1,900&family=Noto+Sans+TC:wght@400;500;700;900&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        /* ══════════════════════════════════════════
           Design System — Road Master V5 Elite
           ══════════════════════════════════════════ */
        :root {
            --p: #f97316;
            --p-light: #fdba74;
            --p-dark: #ea580c;
            --s: #06b6d4;
            --s-light: #67e8f9;
            --bg: #0b1120;
            --surface: rgba(30, 41, 59, 0.45);
            --t: #f8fafc;
            --t-muted: #94a3b8;
            --t-dim: #64748b;
            --border: rgba(255, 255, 255, 0.08);
            --border-focus: rgba(249, 115, 22, 0.5);
            --radius-sm: 12px;
            --radius-md: 16px;
            --radius-lg: 24px;
            --radius-xl: 32px;
            --radius-pill: 100px;
            --ease: cubic-bezier(0.16, 1, 0.3, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', 'Noto Sans TC', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg);
            color: var(--t);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            background-image:
                radial-gradient(circle at 0% 0%, rgba(249, 115, 22, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 100% 100%, rgba(6, 182, 212, 0.1) 0%, transparent 40%);
            background-attachment: fixed;
        }

        /* ── Container ── */
        .app-container {
            max-width: 720px;
            margin: 0 auto;
            width: 100%;
            flex: 1;
            padding: 2rem 1.5rem 180px;
        }

        /* ══════════════════════════════════════════
           Hero Header
           ══════════════════════════════════════════ */
        .hero-header {
            text-align: center;
            margin-bottom: 2.5rem;
            animation: fadeDown 1s var(--ease);
        }

        .hero-header h1 {
            font-size: 3.2rem;
            font-weight: 900;
            font-style: italic;
            letter-spacing: -2px;
            background: linear-gradient(135deg, #fff 0%, var(--p) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.4rem;
            filter: drop-shadow(0 10px 20px rgba(249, 115, 22, 0.2));
            text-transform: uppercase;
        }

        .hero-header .subtitle {
            color: var(--t-muted);
            font-size: 1rem;
            font-weight: 500;
            letter-spacing: 2px;
        }

        /* ══════════════════════════════════════════
           Form Card — 沉浸式表單
           ══════════════════════════════════════════ */
        .form-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-xl);
            padding: 2.5rem 2rem;
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            animation: fadeUp 0.8s var(--ease) 0.1s both;
            transition: transform 0.3s var(--ease), box-shadow 0.3s var(--ease);
        }

        .form-group {
            margin-bottom: 1.8rem;
        }

        .form-group:last-of-type {
            margin-bottom: 0;
        }

        .form-group label {
            display: flex;
            align-items: center;
            font-size: 0.85rem;
            font-weight: 800;
            color: var(--s);
            margin-bottom: 12px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .form-group label::before {
            content: '';
            display: inline-block;
            width: 8px;
            height: 8px;
            background: var(--s);
            border-radius: 50%;
            margin-right: 8px;
            box-shadow: 0 0 10px var(--s);
        }

        /* ── Chips 快速標籤 ── */
        .chips {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 12px;
        }

        .chip {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
            color: var(--t-muted);
            padding: 8px 16px;
            border-radius: var(--radius-pill);
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s var(--ease);
            user-select: none;
        }

        .chip:hover {
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            transform: translateY(-2px);
        }

        .chip.active {
            background: var(--p);
            color: #fff;
            border-color: var(--p);
            box-shadow: 0 8px 20px rgba(249, 115, 22, 0.4);
            transform: translateY(-2px);
        }

        /* ── Input 輸入框 ── */
        .form-input {
            width: 100%;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.12);
            color: #fff;
            padding: 16px 20px;
            border-radius: var(--radius-md);
            outline: none;
            transition: all 0.3s ease;
            font-size: 1.05rem;
            font-weight: 500;
        }

        .form-input:focus {
            border-color: var(--p);
            background: rgba(249, 115, 22, 0.05);
            box-shadow: 0 0 25px rgba(249, 115, 22, 0.15);
        }

        .form-input::placeholder {
            color: var(--t-dim);
            font-weight: 400;
        }

        /* ── 超能按鈕 ── */
        .btn-hero {
            width: 100%;
            background: linear-gradient(135deg, #f97316, #ef4444);
            color: #fff;
            border: none;
            font-weight: 900;
            border-radius: var(--radius-md);
            cursor: pointer;
            height: 60px;
            margin-top: 2rem;
            font-size: 1.2rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            box-shadow: 0 15px 35px rgba(249, 115, 22, 0.3);
            transition: all 0.4s var(--ease);
            position: relative;
            overflow: hidden;
        }

        .btn-hero::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transform: skewX(-20deg);
            transition: 0.5s;
        }

        .btn-hero:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 20px 45px rgba(249, 115, 22, 0.5);
        }

        .btn-hero:hover::after {
            left: 150%;
        }

        .btn-hero:active {
            transform: translateY(0) scale(0.98);
        }

        /* ══════════════════════════════════════════
           Chat / Results Area
           ══════════════════════════════════════════ */
        .results-area {
            padding-top: 1rem;
        }

        #chat-thread {
            display: flex;
            flex-direction: column;
            gap: 2rem;
            width: 100%;
        }

        /* ── Message Bubbles ── */
        .msg {
            display: flex;
            flex-direction: column;
            animation: fadeUp 0.5s var(--ease);
            width: 100%;
        }

        .msg.user {
            align-items: flex-end;
        }

        .msg.ai {
            align-items: stretch;
        }

        .bubble {
            line-height: 1.7;
            font-size: 1rem;
            width: 100%;
        }

        .msg.user .bubble {
            max-width: 85%;
            background: linear-gradient(135deg, var(--p), var(--p-dark));
            color: #fff;
            padding: 1rem 1.5rem;
            border-radius: var(--radius-lg);
            border-bottom-right-radius: 6px;
            font-weight: 600;
            box-shadow: 0 8px 25px rgba(249, 115, 22, 0.3);
        }

        .msg.ai .bubble {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 2rem;
            border-radius: var(--radius-xl);
            color: var(--t);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.08);
        }

        /* ── Result Card (for rich AI responses) ── */
        .result-card {
            background: var(--surface);
            border-radius: var(--radius-xl);
            padding: 2.5rem;
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            animation: sweep 0.8s var(--ease);
            line-height: 1.8;
            font-size: 1.05rem;
            color: #f1f5f9;
        }

        .result-card h3 {
            margin-bottom: 1.5rem;
            font-size: 1.5rem;
            color: var(--s);
            font-weight: 900;
            display: flex;
            align-items: center;
            gap: 10px;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }

        .result-card p {
            margin-bottom: 1rem;
        }

        .result-card strong {
            color: #fff;
            font-weight: 800;
            background: rgba(6, 182, 212, 0.15);
            padding: 2px 6px;
            border-radius: 4px;
        }

        .result-card ul,
        .result-card ol {
            margin-bottom: 1.2rem;
            padding-left: 1.5rem;
        }

        .result-card li {
            margin-bottom: 0.6rem;
        }

        .result-card table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            margin: 1.5rem 0;
            background: rgba(0, 0, 0, 0.4);
            border-radius: var(--radius-md);
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .result-card th {
            background: rgba(255, 255, 255, 0.05);
            color: var(--p);
            padding: 16px;
            text-align: left;
            font-size: 0.9rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid var(--border);
        }

        .result-card td {
            padding: 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.02);
            font-size: 0.95rem;
        }

        .result-card tr:last-child td {
            border-bottom: none;
        }

        .result-card tr:hover td {
            background: rgba(6, 182, 212, 0.05);
        }

        /* ══════════════════════════════════════════
           Timeline Card (行程卡片)
           ══════════════════════════════════════════ */
        .timeline-card {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border);
            border-radius: 20px;
            margin-bottom: 20px;
            overflow: hidden;
            transition: 0.3s;
        }

        .timeline-card:hover {
            border-color: rgba(249, 115, 22, 0.4);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
            transform: translateY(-2px);
        }

        .day-header {
            background: rgba(249, 115, 22, 0.15);
            padding: 14px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            font-weight: 900;
            color: var(--p-light);
            font-size: 1.2rem;
        }

        .day-route {
            padding: 16px 20px;
            font-weight: 800;
            color: #fff;
            border-bottom: 1px dashed var(--border);
            font-size: 1.1rem;
        }

        .day-stats {
            display: flex;
            gap: 20px;
            padding: 12px 20px;
            background: rgba(0, 0, 0, 0.3);
            font-size: 0.9rem;
            color: var(--t-muted);
            font-weight: 700;
        }

        .day-body {
            padding: 15px 20px 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* ── Accordion (手風琴展開) ── */
        .info-accordion {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 14px;
            overflow: hidden;
            transition: all 0.3s var(--ease);
        }

        .info-accordion[open] {
            background: rgba(255, 255, 255, 0.02);
            border-color: rgba(255, 255, 255, 0.15);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        }

        .info-accordion.challenge[open] {
            border-color: rgba(248, 113, 113, 0.4);
            background: rgba(248, 113, 113, 0.05);
        }

        .info-summary {
            padding: 14px 18px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            list-style: none;
            color: #e2e8f0;
            font-weight: 700;
            user-select: none;
            transition: 0.2s;
        }

        .info-summary::-webkit-details-marker {
            display: none;
        }

        .info-summary:hover {
            background: rgba(255, 255, 255, 0.04);
        }

        .info-label {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 800;
            font-size: 0.95rem;
            color: var(--p-light);
        }

        .challenge .info-label {
            color: #fca5a5;
        }

        .chevron {
            width: 18px;
            height: 18px;
            opacity: 0.6;
            transition: transform 0.3s var(--ease);
            color: var(--t-muted);
        }

        .info-accordion[open] .chevron {
            transform: rotate(180deg);
            opacity: 1;
            color: var(--p-light);
        }

        .info-accordion.challenge[open] .chevron {
            color: #fca5a5;
        }

        .info-content {
            padding: 0 18px 18px 18px;
            color: #cbd5e1;
            font-size: 0.95rem;
            line-height: 1.7;
            animation: slideDown 0.3s ease-out;
            border-top: 1px solid transparent;
        }

        .info-accordion[open] .info-content {
            border-top-color: rgba(255, 255, 255, 0.05);
            padding-top: 14px;
            margin-top: 4px;
        }

        .info-accordion.challenge[open] .info-content {
            border-top-color: rgba(248, 113, 113, 0.15);
        }

        .info-content p {
            margin-bottom: 0.8rem;
        }

        .info-content p:last-child {
            margin-bottom: 0;
        }

        .info-content ul,
        .info-content ol {
            margin-left: 20px;
            margin-bottom: 0.8rem;
        }

        .info-content li {
            margin-bottom: 6px;
        }

        .info-content strong {
            color: var(--p-light);
            font-weight: 800;
        }

        .info-accordion.challenge .info-content strong {
            color: #f87171;
        }

        /* ── Segment Tags (視覺標記) ── */
        .content-segment {
            background: rgba(255, 255, 255, 0.03);
            border-left: 3px solid var(--p);
            padding: 10px 14px;
            margin-bottom: 12px;
            border-radius: 4px 12px 12px 4px;
        }

        .segment-title {
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 800;
            color: #fff;
            margin-bottom: 5px;
            font-size: 1rem;
        }

        .highlight-tag {
            background: rgba(249, 115, 22, 0.15);
            color: var(--p-light);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.85rem;
            border: 1px solid rgba(249, 115, 22, 0.3);
            display: inline-block;
            margin-right: 5px;
            font-weight: 900;
        }

        .risk-tag {
            background: rgba(239, 68, 68, 0.15);
            color: #f87171;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.85rem;
            border: 1px solid rgba(239, 68, 68, 0.3);
            display: inline-block;
            margin-right: 5px;
            font-weight: 900;
        }

        .segment-desc {
            color: var(--t-muted);
            font-size: 0.92rem;
            line-height: 1.6;
        }

        /* ── Floating Tabs (藥丸式分頁) ── */
        .tabs-container {
            margin-top: 1rem;
            width: 100%;
        }

        .tabs-nav {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
            padding-bottom: 8px;
        }

        .tabs-nav::-webkit-scrollbar {
            display: none;
        }

        .tab-btn {
            flex: 0 0 auto;
            padding: 10px 20px;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.03);
            color: var(--t-muted);
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.3s var(--ease);
            border-radius: var(--radius-pill);
        }

        .tab-btn:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.06);
        }

        .tab-btn.active {
            color: #fff;
            background: var(--p);
            border-color: var(--p);
            box-shadow: 0 4px 15px rgba(249, 115, 22, 0.3);
        }

        .tab-pane {
            display: none;
            padding: 1rem 0 0 0;
            animation: fadeUp 0.4s ease-out;
        }

        .tab-pane.active {
            display: block;
        }

        /* ── Grid Layout (裝備/風險卡片) ── */
        .tab-pane.grid-layout ul {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 12px;
            padding: 0;
            list-style: none;
        }

        .tab-pane.grid-layout li {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: var(--radius-md);
            padding: 1.25rem;
            display: flex;
            flex-direction: column;
            gap: 8px;
            color: #cbd5e1;
            font-size: 0.95rem;
            line-height: 1.6;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            transition: 0.2s;
        }

        .tab-pane.grid-layout li:hover {
            border-color: rgba(249, 115, 22, 0.3);
            transform: translateY(-2px);
        }

        .tab-pane.grid-layout li strong {
            color: #fff;
            display: block;
            border-bottom: 1px dashed rgba(255, 255, 255, 0.1);
            padding-bottom: 8px;
            margin-bottom: 4px;
            font-size: 1.05rem;
        }

        .tab-pane.grid-layout li p {
            margin: 0;
        }

        /* ══════════════════════════════════════════
           Bottom Dock (浮動輸入列)
           ══════════════════════════════════════════ */
        .dock {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, var(--bg) 60%, transparent);
            padding: 2rem 1.5rem 2rem;
            z-index: 1000;
            pointer-events: none;
        }

        .dock-bar {
            max-width: 720px;
            margin: 0 auto;
            display: flex;
            gap: 10px;
            background: rgba(15, 23, 42, 0.7);
            border-radius: var(--radius-pill);
            padding: 10px;
            border: 1px solid var(--border);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
            transition: 0.3s;
            pointer-events: auto;
        }

        .dock-bar:focus-within {
            border-color: rgba(6, 182, 212, 0.5);
            box-shadow: 0 10px 40px rgba(6, 182, 212, 0.2);
        }

        .dock-input {
            flex: 1;
            background: transparent;
            border: none;
            color: #fff;
            padding: 0 20px;
            outline: none;
            font-size: 1.05rem;
            font-weight: 500;
            min-width: 0;
        }

        .dock-input::placeholder {
            color: var(--t-dim);
        }

        .dock-btn {
            background: #fff;
            border: none;
            color: #0f172a;
            border-radius: var(--radius-pill);
            padding: 0 28px;
            font-weight: 900;
            cursor: pointer;
            height: 48px;
            transition: all 0.3s;
            font-size: 1rem;
            flex-shrink: 0;
            white-space: nowrap;
        }

        .dock-btn:hover {
            background: var(--p);
            color: #fff;
            transform: scale(1.05);
        }

        /* ══════════════════════════════════════════
           Loading States
           ══════════════════════════════════════════ */
        .loader {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 4rem 0;
            color: var(--s);
            font-weight: 700;
            letter-spacing: 2px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(6, 182, 212, 0.2);
            border-radius: 50%;
            border-top-color: var(--p);
            animation: spin 1s ease-in-out infinite;
            margin-bottom: 1.5rem;
        }

        .typing {
            display: flex;
            gap: 6px;
            padding: 8px 16px;
        }

        .dot {
            width: 8px;
            height: 8px;
            background: var(--t-muted);
            border-radius: 50%;
            animation: dotPulse 1.4s ease-in-out infinite;
        }

        .dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        /* ══════════════════════════════════════════
           Welcome Idle Card
           ══════════════════════════════════════════ */
        .welcome-idle {
            text-align: center;
            padding: 3rem 1rem 1rem;
            color: var(--t-dim);
        }

        .welcome-idle .emoji {
            font-size: 3.5rem;
            display: block;
            margin-bottom: 1.5rem;
            animation: float 3s ease-in-out infinite;
        }

        .welcome-idle h4 {
            font-size: 1.2rem;
            margin-bottom: 0.5rem;
            color: var(--t-muted);
        }

        /* ══════════════════════════════════════════
           Animations
           ══════════════════════════════════════════ */
        @keyframes fadeDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes sweep {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.95);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-10px);
            }
        }

        @keyframes dotPulse {

            0%,
            80%,
            100% {
                transform: scale(0.6);
                opacity: 0.4;
            }

            40% {
                transform: scale(1);
                opacity: 1;
            }
        }

        /* ══════════════════════════════════════════
           Responsive
           ══════════════════════════════════════════ */
        @media (max-width: 600px) {
            .app-container {
                padding: 1.5rem 1rem 160px;
            }

            .hero-header h1 {
                font-size: 2.5rem;
            }

            .form-card {
                padding: 1.5rem 1.25rem;
            }

            .msg.ai .bubble {
                padding: 1.25rem;
            }

            .result-card {
                padding: 1.5rem;
            }

            .dock {
                padding: 1rem 1rem 1.5rem;
            }
        }
    </style>
</head>

<body>

    <div class="app-container">
        <!-- ═══ Hero Header ═══ -->
        <header class="hero-header">
            <h1>Road Master</h1>
            <p class="subtitle">頂級騎行路線智囊引擎</p>
        </header>

        <!-- ═══ Form Card ═══ -->
        <div class="form-card" id="form-section">
            <div class="form-group">
                <label>出發地 / 城市</label>
                <div class="chips">
                    <span class="chip" onclick="setChip(this,'start','台北火車站')">台北</span>
                    <span class="chip" onclick="setChip(this,'start','新竹高鐵站')">新竹</span>
                    <span class="chip" onclick="setChip(this,'start','台中火車站')">台中</span>
                    <span class="chip" onclick="setChip(this,'start','高雄火車站')">高雄</span>
                </div>
                <input type="text" id="start" class="form-input" placeholder="規劃起點，例如：台北松山車站">
            </div>

            <div class="form-group">
                <label>目的地 / 挑戰目標</label>
                <div class="chips">
                    <span class="chip" onclick="setChip(this,'end','花蓮太魯閣')">太魯閣</span>
                    <span class="chip" onclick="setChip(this,'end','墾丁大街')">墾丁</span>
                    <span class="chip" onclick="setChip(this,'end','公路車環島')">逆風環島</span>
                    <span class="chip" onclick="setChip(this,'end','武嶺')">武嶺挑戰</span>
                </div>
                <input type="text" id="end" class="form-input" placeholder="目標終點，例如：恆春古城">
            </div>

            <div class="form-group">
                <label>行程天數</label>
                <div class="chips">
                    <span class="chip" onclick="setChip(this,'days','1天 (單日挑戰)')">單日挑戰</span>
                    <span class="chip" onclick="setChip(this,'days','3天 (輕旅行)')">3天</span>
                    <span class="chip" onclick="setChip(this,'days','7天 (深度遊)')">7天</span>
                    <span class="chip" onclick="setChip(this,'days','9天 (大環島)')">大環島</span>
                </div>
                <input type="text" id="days" class="form-input" placeholder="規劃時間，例如：4天">
            </div>

            <button class="btn-hero" onclick="submitForm()">⚡ 運算專屬軌跡</button>
        </div>

        <!-- ═══ Results Area ═══ -->
        <div class="results-area" id="results-area">
            <div id="chat-thread"></div>
            <div class="welcome-idle" id="welcome-msg">
                <span class="emoji">🚵‍♂️</span>
                <h4>準備好踏上旅程了嗎？</h4>
                <p>填寫上方路線，或直接在下方詢問單車問題。</p>
            </div>
        </div>
    </div>

    <!-- ═══ Bottom Dock ═══ -->
    <div class="dock">
        <div class="dock-bar">
            <input type="text" id="chat-input" class="dock-input" placeholder="輸入裝備、路線、維修等任何問題..."
                onkeypress="if(event.key==='Enter')submitChat()">
            <button class="dock-btn" onclick="submitChat()">傳送</button>
        </div>
    </div>

    <script>
        const CF_GATEWAY = "https://hidden-surf-0579.love7053150.workers.dev/";
        const thread = document.getElementById('chat-thread');
        const input = document.getElementById('chat-input');
        let _busy = false;

        const SYSTEM_PROMPT = `你是單車旅遊界的大師級嚮導。
你的報告必須具備「路段感知」與「精準標籤化」，絕對嚴禁整坨文字混在一起。

應答規則：
### 📅 詳細路線與行程流
(請以 Markdown 表格呈現，必須包含：天數、路線、距離/爬升、必看風景美食、路線風險)

【風景美食與路線風險欄位】強制格式：
必須使用「[路段/位置] 名稱：描述內容」的標籤結構。
例如：
[龍潭➔關西] 仙草巷：這是關西必吃的名店，冰鮮草奶凍消暑一流。
[注意] 龍潭大坡：這段長達2公里的緩上坡，冬天逆風會讓你體力歸零。

### 🎒 戰術裝備建議
請將裝備「歸類彙整」後產出，每類 2-3 項，格式：- [分類] **裝備名**：用途。
例如：
- [核心] **公路車**：維持高效能輸出。
- [後勤] **車拖包**：收納換洗衣物。

### ⚠️ 實戰風險提示
請將風險「歸類彙整」後產出，格式：- [分類] **風險名**：應對。
例如：
- [環境] **高溫中暑**：補充電解質與水分。
- [交通] **砂石車**：保持安全車距。`;

        // ═══ Chip 雙態切換 ═══
        window.setChip = function (el, id, v) {
            document.getElementById(id).value = v;
            el.parentElement.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
        };

        // ═══ Scroll 至底 ═══
        function scrollBottom() {
            setTimeout(() => { window.scrollTo({ top: document.body.scrollHeight + 400, behavior: 'smooth' }); }, 300);
        }

        // ═══ 新增訊息 ═══
        function addMessage(role, content, raw = false) {
            document.getElementById('welcome-msg')?.remove();
            const m = document.createElement('div');
            m.className = `msg ${role}`;
            m.innerHTML = `<div class="bubble">${raw ? content : marked.parse(content)}</div>`;
            thread.appendChild(m);
            scrollBottom();
            return m;
        }

        // ═══ 標籤美化引擎 ═══
        function prettifyContent(text, isRisk = false) {
            return text.replace(/\[(.*?)\]\s*(.*?)[：|:](.*?)(?=\n|\[|$)/gs, (match, loc, name, desc) => {
                const tagClass = isRisk ? 'risk-tag' : 'highlight-tag';
                return `
                    <div class="content-segment">
                        <div class="segment-title">
                            <span class="${tagClass}">${loc}</span>
                            <span>${name}</span>
                        </div>
                        <div class="segment-desc">${desc.trim()}</div>
                    </div>
                `;
            });
        }

        // ═══ Timeline 渲染 ═══
        function transformToTimeline(tableHtml) {
            const div = document.createElement('div');
            div.innerHTML = tableHtml;
            const rows = Array.from(div.querySelectorAll('tr')).slice(1);
            if (rows.length === 0) return tableHtml;

            let html = `<div class="timeline-flow">`;
            rows.forEach(row => {
                const cols = Array.from(row.querySelectorAll('td')).map(td => td.innerHTML.trim());
                if (cols.length < 5) return;

                html += `
            <div class="timeline-card">
                <div class="day-header"><span>DAY ${cols[0]}</span> <div style="font-size:0.75rem; color:var(--t-muted); opacity:0.8;">ELITE NAVIGATION</div></div>
                <div class="day-route">${cols[1]}</div>
                <div class="day-stats"><span>📏 距離/爬升：${cols[2]}</span></div>
                <div class="day-body">
                    <details class="info-accordion">
                        <summary class="info-summary">
                            <span class="info-label">📍 風景、美食與活動探勘</span>
                            <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
                        </summary>
                        <div class="info-content">${prettifyContent(cols[3])}</div>
                    </details>
                    <details class="info-accordion challenge">
                        <summary class="info-summary">
                            <span class="info-label">⚡ 路線挑戰與技術風險</span>
                            <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
                        </summary>
                        <div class="info-content">${prettifyContent(cols[4], true)}</div>
                    </details>
                </div>
            </div>`;
            });
            html += `</div>`;
            return html;
        }

        // ═══ Tab 渲染引擎 ═══
        function renderTabs(rawContent) {
            const cleanText = rawContent.replace(/\\n/g, '\n');
            const firstHeaderIndex = cleanText.indexOf('### ');
            if (firstHeaderIndex === -1) return marked.parse(cleanText);

            const sections = cleanText.substring(firstHeaderIndex).split(/\n?(?=### )/);

            let tabsNav = `<div class="tabs-container"><div class="tabs-nav">`;
            let tabsContent = `<div class="tabs-content">`;
            let count = 0;

            sections.forEach(sec => {
                const trimmed = sec.trim();
                if (!trimmed.startsWith('###')) return;

                const firstLineEnd = trimmed.indexOf('\n');
                let title = trimmed.substring(0, firstLineEnd !== -1 ? firstLineEnd : trimmed.length).replace(/###\s*/, '').trim();
                let body = firstLineEnd !== -1 ? trimmed.substring(firstLineEnd).trim() : "";

                const active = count === 0 ? 'active' : '';
                let layoutClass = '';
                if (title.match(/裝備|清單|提示|提醒|守則|風險/)) layoutClass = 'grid-layout';

                let parsedBody = marked.parse(body);
                if (layoutClass === 'grid-layout') {
                    parsedBody = parsedBody
                        .replace(/\[(.*?)\]/g, '<span class="highlight-tag" style="margin-bottom:5px; display:inline-block;">$1</span>')
                        .replace(/<\/strong>[\s:：<br>]*\n*/gi, '</strong>')
                        .replace(/<\/strong>\s*<p>/gi, '</strong>')
                        .replace(/<\/strong><\/p>\s*<ul>/gi, '</strong><ul>')
                        .replace(/<li><p>/gi, '<li>')
                        .replace(/<\/p><\/li>/gi, '</li>');
                }

                if (count === 0 && parsedBody.includes('<table')) {
                    parsedBody = transformToTimeline(parsedBody);
                }

                tabsNav += `<button class="tab-btn ${active}" onclick="switchTab(this, ${count})">${title}</button>`;
                tabsContent += `<div class="tab-pane ${active} ${layoutClass}" data-index="${count}">${parsedBody}</div>`;
                count++;
            });

            return count === 0 ? marked.parse(cleanText) : (tabsNav + `</div>` + tabsContent + `</div></div>`);
        }

        window.switchTab = function (btn, idx) {
            const con = btn.closest('.tabs-container');
            con.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            con.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
            con.querySelector(`.tab-pane[data-index="${idx}"]`).classList.add('active');
        };

        // ═══ 表單提交 ═══
        function submitForm() {
            const s = document.getElementById('start').value;
            const e = document.getElementById('end').value;
            const d = document.getElementById('days').value;
            if (!s || !e || !d) return alert("車友你好！請幫我填寫起點、終點與天數，我才能幫你排行程喔！");

            // 隱藏表單，顯示對話
            document.getElementById('form-section').style.display = 'none';
            addMessage('user', `分析需求：從 **${s}** 騎行至 **${e}**，預定天數 **${d}**。請提供專業戰略報告。`);
            callAI(`請為我規劃 ${s} 到 ${e}，${d}的頂級單車行程。這份計畫必須「字數非常多、細節達到大師級長篇深度」。明確列出每一天的：1. 具體的城鎮與公路編號。2. 3-5句話以上的超詳細無敵美食小吃與風景敘述。3. 3-5句話以上的陡坡起伏、大車流量、季節風向的危險深度分析。以Markdown表格輸出。`);
        }

        // ═══ Dock 聊天提交 ═══
        function submitChat() {
            const v = input.value.trim();
            if (!v) return;
            input.value = '';
            addMessage('user', v);
            callAI(v);
        }

        // ═══ AI 呼叫 ═══
        async function callAI(q) {
            if (_busy) return;
            _busy = true;

            const loader = document.createElement('div');
            loader.className = 'msg ai';
            loader.innerHTML = `<div class="bubble" style="max-width:100px; padding:16px; display:flex; justify-content:center;">
                <div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
            </div>`;
            thread.appendChild(loader);
            scrollBottom();

            try {
                const res = await fetch(CF_GATEWAY, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: SYSTEM_PROMPT + "\n任務需求：" + q }] }] })
                });
                const data = await res.json();
                loader.remove();
                addMessage('ai', renderTabs(data.candidates?.[0]?.content?.parts?.[0]?.text || "無回應"), true);
            } catch (e) {
                loader.remove();
                addMessage('ai', "連線錯誤，請刷新頁面再試。");
            } finally {
                _busy = false;
            }
        }
    </script>
</body>

</html>
