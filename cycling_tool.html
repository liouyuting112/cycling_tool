<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Road Master | 單車智慧導航</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=Noto+Sans+TC:wght@400;500;700;900&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --p: #f97316;
            --p-light: #fdba74;
            --bg: #030712;
            --c: #1e293b;
            --t: #f1f5f9;
            --m: #94a3b8;
            --border: rgba(255, 255, 255, 0.08);
            --glass: rgba(30, 41, 59, 0.7);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', 'Noto Sans TC', sans-serif;
        }

        body {
            background: var(--bg);
            color: var(--t);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background-image:
                radial-gradient(circle at 0% 0%, rgba(249, 115, 22, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 100% 100%, rgba(56, 189, 248, 0.05) 0%, transparent 40%);
        }

        /* Header */
        header {
            padding: 1rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(3, 7, 18, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            z-index: 100;
        }

        .logo {
            font-weight: 900;
            font-size: 1.25rem;
            color: var(--p);
            letter-spacing: 0.5px;
        }

        /* Main Chat Area */
        main {
            flex: 1;
            overflow-y: auto;
            padding: 2rem 1.5rem 240px;
            /* 增加底部墊高 */
            scroll-behavior: smooth;
        }

        #chat-thread {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 2rem;
            width: 100%;
        }

        /* Message Bubbles */
        .msg {
            display: flex;
            flex-direction: column;
            animation: fadeIn 0.3s ease-out;
            width: 100%;
        }

        .msg.user {
            align-items: flex-end;
        }

        .msg.ai {
            align-items: flex-start;
        }

        .bubble {
            max-width: 95%;
            /* 稍微加寬 */
            padding: 1.25rem;
            border-radius: 16px;
            line-height: 1.6;
            font-size: 0.95rem;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            width: 100%;
            /* 強制對齊 */
        }

        .msg.user .bubble {
            max-width: fit-content;
            background: var(--p);
            color: #fff;
            border-bottom-right-radius: 4px;
            font-weight: 500;
        }

        .msg.ai .bubble {
            background: var(--glass);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
            backdrop-filter: blur(10px);
            color: var(--t);
        }

        /* Rich content styling */
        .bubble table {
            width: 100%;
            border-collapse: collapse;
            margin: 1rem 0;
            font-size: 0.85rem;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            overflow-x: auto;
            display: table;
        }

        .bubble th {
            background: rgba(255, 255, 255, 0.05);
            color: var(--p-light);
            padding: 12px;
            text-align: left;
            border-bottom: 2px solid var(--p);
        }

        .bubble td {
            padding: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }

        .bubble p {
            margin-bottom: 0.8rem;
        }

        .bubble strong {
            color: var(--p-light);
            font-weight: 700;
        }

        /* --- 視覺化卡片元件 - 完美對齊網格 --- */
        .tab-pane.grid-layout ul {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 16px;
            padding: 0;
            list-style: none;
            margin: 0;
        }

        .tab-pane.grid-layout li {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.25rem;
            font-size: 0.9rem;
            height: 100%;
            display: flex;
            flex-direction: column;
            transition: 0.2s;
        }

        .tab-pane.grid-layout li:hover {
            border-color: var(--p);
            background: rgba(255, 255, 255, 0.08);
        }

        .tab-pane.grid-layout li strong {
            display: block;
            font-size: 1.1rem;
            margin-bottom: 8px;
            color: var(--p);
            background: none;
            padding: 0;
            border-bottom: 1px solid rgba(249, 115, 22, 0.2);
            padding-bottom: 4px;
        }

        /* ----------------------- */

        /* Tab System Fixes */
        .tabs-container {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            margin-top: 1rem;
            width: 100%;
        }

        .tabs-nav {
            display: flex;
            background: rgba(0, 0, 0, 0.5);
            border-bottom: 1px solid var(--border);
            overflow-x: auto;
            scrollbar-width: none;
        }

        .tabs-nav::-webkit-scrollbar {
            display: none;
        }

        .tab-btn {
            flex: 1;
            background: transparent;
            color: var(--m);
            border: none;
            padding: 14px 12px;
            font-size: 0.9rem;
            font-weight: 800;
            cursor: pointer;
            white-space: nowrap;
            border-bottom: 3px solid transparent;
            min-width: 120px;
        }

        .tab-btn.active {
            color: var(--p);
            border-bottom-color: var(--p);
            background: rgba(249, 115, 22, 0.05);
        }

        .tab-pane {
            display: none;
            padding: 1.5rem;
            animation: fadeIn 0.3s;
        }

        .tab-pane.active {
            display: block;
        }

        /* Form Card */
        .plan-card {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border);
            padding: 1.5rem;
            border-radius: 12px;
            margin-top: 1rem;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .form-row {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-label {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--p-light);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .quick-chips {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .chip {
            background: #334155;
            color: #cbd5e1;
            padding: 4px 12px;
            border-radius: 50px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .chip:hover {
            background: var(--p);
            color: #fff;
        }

        .form-input {
            background: #0f172a;
            border: 1px solid #334155;
            color: #fff;
            padding: 12px;
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
        }

        .btn-primary {
            background: var(--p);
            color: #fff;
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-weight: 900;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 4px 15px rgba(249, 115, 22, 0.3);
        }

        .btn-primary:active {
            transform: scale(0.98);
        }

        /* Input Dock Panel */
        .dock {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 1.5rem;
            background: linear-gradient(transparent, var(--bg) 40%);
            z-index: 200;
            pointer-events: none;
        }

        .dock-bar {
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            background: #1e293b;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            padding: 8px;
            display: flex;
            align-items: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.7);
            pointer-events: auto;
        }

        .dock-input {
            flex: 1;
            background: transparent;
            border: none;
            color: #fff;
            padding: 10px 15px;
            font-size: 1rem;
            outline: none;
        }

        .dock-btn {
            background: var(--p);
            color: #fff;
            border: none;
            padding: 0 20px;
            height: 44px;
            border-radius: 16px;
            font-weight: 800;
            cursor: pointer;
        }

        /* Typing Dots */
        .typing {
            display: flex;
            gap: 4px;
            padding: 8px;
        }

        .dot {
            width: 8px;
            height: 8px;
            background: var(--p);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .dot:nth-child(2) {
            animation-delay: -0.32s;
        }

        .dot:nth-child(3) {
            animation-delay: -0.16s;
        }

        @keyframes bounce {

            0%,
            80%,
            100% {
                transform: scale(0);
            }

            40% {
                transform: scale(1);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

    <header>
        <div class="logo">ROAD MASTER</div>
        <div style="font-size:0.8rem; color:var(--m); font-weight:600;">專業單車教練</div>
    </header>

    <main id="chat-scroller">
        <div id="chat-thread">
            <div class="msg ai">
                <div class="bubble">
                    <p>🚵 您好！我是您的單車教練 Road Master。</p>
                    <p style="color:var(--m); font-size:0.85rem;">填寫下方表單即刻產出「分類視覺化行程」卡片，或直接對話詢問。</p>
                    <div class="plan-card">
                        <div class="form-row">
                            <div class="form-label"><span>📍 起點</span>
                                <div class="quick-chips"><span class="chip" onclick="iv('start','台北')">台北</span><span
                                        class="chip" onclick="iv('start','新竹')">新竹</span></div>
                            </div>
                            <input type="text" id="start" class="form-input" placeholder="例如：台北火車站">
                        </div>
                        <div class="form-row">
                            <div class="form-label"><span>🏁 終點</span>
                                <div class="quick-chips"><span class="chip" onclick="iv('end','恆春')">恆春</span><span
                                        class="chip" onclick="iv('end','環島')">環島</span></div>
                            </div>
                            <input type="text" id="end" class="form-input" placeholder="例如：台東火車站">
                        </div>
                        <div class="form-row">
                            <div class="form-label"><span>⏱️ 天數</span>
                                <div class="quick-chips"><span class="chip" onclick="iv('days','3天')">3天</span><span
                                        class="chip" onclick="iv('days','9天')">9天</span></div>
                            </div>
                            <input type="text" id="days" class="form-input" placeholder="例如：3天">
                        </div>
                        <button class="btn-primary" onclick="submitForm()">⚡ 產出智慧行程分析</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div class="dock">
        <div class="dock-bar">
            <input type="text" id="chat-input" class="dock-input" placeholder="輸入任何單車問題..."
                onkeypress="if(event.key==='Enter')submitChat()">
            <button class="dock-btn" onclick="submitChat()">傳送</button>
        </div>
    </div>

    <script>
        const CF_GATEWAY = "https://hidden-surf-0579.love7053150.workers.dev/";
        const scroller = document.getElementById('chat-scroller');
        const thread = document.getElementById('chat-thread');
        const input = document.getElementById('chat-input');

        const SYSTEM_PROMPT = `你是單車專家教練。
你的回應必須結構化，嚴禁雜亂的文字。

【規劃專屬規則】：
當使用者提供起訖點與天數，你必須嚴格輸出以下內容，且每個標題前必須有 ### ：
### 📅 路線排程
(提供 Markdown 表格：天數 | 路線 | 公里 | 重點)
### 🎒 裝備建議
(使用清單：- **名稱**：說明)
### ⚠️ 實戰提示
(使用清單：- **名稱**：說明)

如果是普通對話，也要保持條列式與重點標註。`;

        function iv(id, v) { document.getElementById(id).value = v; }

        function scrollBottom() {
            setTimeout(() => {
                scroller.scrollTo({ top: scroller.scrollHeight + 100, behavior: 'smooth' });
            }, 300);
        }

        function addMessage(role, content, raw = false) {
            const m = document.createElement('div');
            m.className = `msg ${role}`;
            m.innerHTML = `<div class="bubble">${raw ? content : marked.parse(content)}</div>`;
            thread.appendChild(m);
            scrollBottom();
            return m;
        }

        // 強化版解析器：精準分割標題與內容
        function renderTabs(text) {
            // 先處理可能的換行符號問題
            const cleanText = text.replace(/\\n/g, '\n');
            const sections = cleanText.split(/\n?(?=### )/);

            if (sections.length <= 1) return marked.parse(cleanText);

            let tabsNav = `<div class="tabs-container"><div class="tabs-nav">`;
            let tabsContent = `</div><div class="tabs-content">`;
            let count = 0;

            sections.forEach(sec => {
                const trimmed = sec.trim();
                if (!trimmed) return;

                let title = "分析說明";
                let body = trimmed;

                if (trimmed.startsWith('###')) {
                    const firstLineEnd = trimmed.indexOf('\n');
                    if (firstLineEnd !== -1) {
                        title = trimmed.substring(0, firstLineEnd).replace(/###\s*/, '').trim();
                        body = trimmed.substring(firstLineEnd).trim();
                    } else {
                        title = trimmed.replace(/###\s*/, '').trim();
                        body = "";
                    }
                }

                const active = count === 0 ? 'active' : '';
                // 判斷是否需要網格排版 (包含裝備, 提示, 守則等關鍵字)
                let layoutClass = '';
                if (title.match(/裝備|提示|守則|注意|亮點/)) layoutClass = 'grid-layout';

                tabsNav += `<button class="tab-btn ${active}" onclick="switchTab(this, ${count})">${title}</button>`;
                tabsContent += `<div class="tab-pane ${active} ${layoutClass}" data-index="${count}">${marked.parse(body)}</div>`;
                count++;
            });

            return tabsNav + tabsContent + `</div></div>`;
        }

        window.switchTab = function (btn, idx) {
            const con = btn.closest('.tabs-container');
            con.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            con.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
            con.querySelector(`.tab-pane[data-index="${idx}"]`).classList.add('active');
        };

        async function submitForm() {
            const s = document.getElementById('start').value;
            const e = document.getElementById('end').value;
            const d = document.getElementById('days').value;
            if (!s || !e || !d) return alert("請填寫起點、終點與欲騎乘天數！");
            addMessage('user', `📍 從 **${s}** 出發到 **${e}**，預計騎乘 **${d}**。請規劃行程。`);
            await callAI(`規劃：${s} 到 ${e}，${d}。`);
        }

        async function submitChat() {
            const v = chatInput.value = input.value.trim();
            if (!v) return;
            input.value = '';
            addMessage('user', v);
            await callAI(v);
        }

        async function callAI(q) {
            const loader = document.createElement('div');
            loader.className = 'msg ai';
            loader.innerHTML = `<div class="bubble"><div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>`;
            thread.appendChild(loader);
            scrollBottom();

            try {
                const res = await fetch(CF_GATEWAY, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: SYSTEM_PROMPT + "\n\n目前需求：" + q }] }] })
                });
                const data = await res.json();
                loader.remove();
                const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || "抱歉，連線失敗。";
                addMessage('ai', renderTabs(reply), true);
            } catch (e) {
                loader.remove();
                addMessage('ai', "連線錯誤，請檢查網路狀態。");
            }
        }
    </script>
</body>

</html>
