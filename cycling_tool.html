<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Road Master | 單車智慧導航</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=Noto+Sans+TC:wght@400;500;700;900&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --p: #f97316;
            --p-light: #fdba74;
            --bg: #030712;
            --c: #1e293b;
            --t: #f1f5f9;
            --m: #94a3b8;
            --border: rgba(255, 255, 255, 0.08);
            --glass: rgba(30, 41, 59, 0.7);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', 'Noto Sans TC', sans-serif;
        }

        body {
            background: var(--bg);
            color: var(--t);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background-image:
                radial-gradient(circle at 0% 0%, rgba(249, 115, 22, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 100% 100%, rgba(56, 189, 248, 0.05) 0%, transparent 40%);
        }

        /* Header */
        header {
            padding: 1rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(3, 7, 18, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            z-index: 10;
        }

        .logo {
            font-weight: 900;
            font-size: 1.25rem;
            color: var(--p);
            letter-spacing: 0.5px;
        }

        /* Main Chat Area */
        main {
            flex: 1;
            overflow-y: auto;
            padding: 2rem 1.5rem 220px;
            /* 增加底部墊高，確保對話能完全浮出 Dock 以上 */
            scroll-behavior: smooth;
        }

        #chat-thread {
            max-width: 800px;
            /* 限制閱讀寬度，黃金比例 */
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        /* Message Bubbles */
        .msg {
            display: flex;
            flex-direction: column;
            animation: fadeIn 0.3s ease-out;
            width: 100%;
        }

        .msg.user {
            align-items: flex-end;
        }

        .msg.ai {
            align-items: flex-start;
        }

        .bubble {
            max-width: 90%;
            padding: 1.25rem;
            border-radius: 16px;
            line-height: 1.6;
            font-size: 0.95rem;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        }

        .msg.user .bubble {
            background: var(--p);
            color: #fff;
            border-bottom-right-radius: 4px;
            font-weight: 500;
        }

        .msg.ai .bubble {
            background: var(--glass);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
            backdrop-filter: blur(10px);
            color: var(--t);
            width: 100%;
        }

        /* Rich content styling */
        .bubble table {
            width: 100%;
            border-collapse: collapse;
            margin: 1rem 0;
            font-size: 0.85rem;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            overflow-x: auto;
            display: block;
        }

        .bubble th {
            background: rgba(255, 255, 255, 0.05);
            color: var(--p-light);
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid var(--border);
            white-space: nowrap;
        }

        .bubble td {
            padding: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            min-width: 80px;
        }

        .bubble p {
            margin-bottom: 0.8rem;
        }

        .bubble strong {
            color: var(--p-light);
            font-weight: 700;
            background: rgba(249, 115, 22, 0.1);
            padding: 0 4px;
            border-radius: 4px;
        }

        /* --- 視覺化卡片元件 --- */
        .tab-pane.equipment-grid ul {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 12px;
            padding: 0;
            list-style: none;
        }

        .tab-pane.equipment-grid li {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 1rem;
            font-size: 0.85rem;
        }

        .tab-pane.equipment-grid li strong {
            display: block;
            font-size: 1rem;
            margin-bottom: 4px;
            color: var(--p);
            background: none;
            padding: 0;
        }

        .tab-pane.notes-grid ul {
            list-style: none;
            padding: 0;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .tab-pane.notes-grid li {
            background: rgba(249, 115, 22, 0.05);
            border-left: 3px solid var(--p);
            padding: 10px 15px;
            border-radius: 0 6px 6px 0;
            font-size: 0.85rem;
        }

        /* ----------------------- */

        /* Tab System Fixes */
        .tabs-container {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            margin-top: 1rem;
            width: 100%;
        }

        .tabs-nav {
            display: flex;
            background: rgba(0, 0, 0, 0.5);
            border-bottom: 1px solid var(--border);
            overflow-x: auto;
            scrollbar-width: none;
        }

        .tabs-nav::-webkit-scrollbar {
            display: none;
        }

        .tab-btn {
            flex: 1;
            background: transparent;
            color: var(--m);
            border: none;
            padding: 12px 10px;
            font-size: 0.85rem;
            font-weight: 700;
            cursor: pointer;
            white-space: nowrap;
            border-bottom: 2px solid transparent;
            min-width: 100px;
        }

        .tab-btn.active {
            color: var(--p);
            border-bottom-color: var(--p);
            background: rgba(249, 115, 22, 0.05);
        }

        .tab-pane {
            display: none;
            padding: 1.25rem;
            animation: fadeIn 0.2s;
        }

        .tab-pane.active {
            display: block;
        }

        /* Form Card */
        .plan-card {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border);
            padding: 1.2rem;
            border-radius: 12px;
            margin-top: 1rem;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .form-row {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .form-label {
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--p-light);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .quick-chips {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .chip {
            background: #334155;
            color: #cbd5e1;
            padding: 3px 10px;
            border-radius: 50px;
            font-size: 0.75rem;
            cursor: pointer;
        }

        .form-input {
            background: #0f172a;
            border: 1px solid #334155;
            color: #fff;
            padding: 10px;
            border-radius: 8px;
            font-size: 0.9rem;
            outline: none;
        }

        .btn-primary {
            background: var(--p);
            color: #fff;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            transition: 0.2s;
        }

        /* Input Dock Panel */
        .dock {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 1.5rem;
            background: linear-gradient(transparent, var(--bg) 60%);
            /* 降低漸層透明度覆蓋範圍 */
            z-index: 20;
            pointer-events: none;
        }

        .dock-bar {
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            background: #1e293b;
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 5px;
            display: flex;
            align-items: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
            pointer-events: auto;
        }

        .dock-input {
            flex: 1;
            background: transparent;
            border: none;
            color: #fff;
            padding: 10px 15px;
            font-size: 1rem;
            outline: none;
        }

        .dock-btn {
            background: var(--p);
            color: #fff;
            border: none;
            padding: 0 15px;
            height: 38px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
        }

        /* Typing Dots */
        .typing {
            display: flex;
            gap: 4px;
            padding: 5px;
        }

        .dot {
            width: 6px;
            height: 6px;
            background: var(--p);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .dot:nth-child(2) {
            animation-delay: -0.32s;
        }

        .dot:nth-child(3) {
            animation-delay: -0.16s;
        }

        @keyframes bounce {

            0%,
            80%,
            100% {
                transform: scale(0);
            }

            40% {
                transform: scale(1);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

    <header>
        <div class="logo">ROAD MASTER</div>
        <div style="font-size:0.8rem; color:var(--m); font-weight:600;">AI 單車管家</div>
    </header>

    <main id="chat-scroller">
        <div id="chat-thread">
            <div class="msg ai">
                <div class="bubble">
                    <p>🚵 您好！準備好單車冒險了嗎？</p>
                    <p style="color:var(--m); font-size:0.85rem;">使用下方表單可快速產生分類行程，或直接問我裝備、維修、路況問題。</p>
                    <div class="plan-card">
                        <div class="form-row">
                            <div class="form-label"><span>📍 起點</span>
                                <div class="quick-chips"><span class="chip" onclick="iv('start','台北')">台北</span><span
                                        class="chip" onclick="iv('start','台南')">台南</span></div>
                            </div>
                            <input type="text" id="start" class="form-input" placeholder="起點">
                        </div>
                        <div class="form-row">
                            <div class="form-label"><span>🏁 終點</span>
                                <div class="quick-chips"><span class="chip" onclick="iv('end','恆春')">恆春</span><span
                                        class="chip" onclick="iv('end','環島')">環島</span></div>
                            </div>
                            <input type="text" id="end" class="form-input" placeholder="終點">
                        </div>
                        <div class="form-row">
                            <div class="form-label"><span>⏱️ 天數</span>
                                <div class="quick-chips"><span class="chip" onclick="iv('days','3天')">3天</span><span
                                        class="chip" onclick="iv('days','9天')">9天</span></div>
                            </div>
                            <input type="text" id="days" class="form-input" placeholder="天數">
                        </div>
                        <button class="btn-primary" onclick="submitForm()">產出智慧行程報表</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div class="dock">
        <div class="dock-bar">
            <input type="text" id="chat-input" class="dock-input" placeholder="問問路況或裝備..."
                onkeypress="if(event.key==='Enter')submitChat()">
            <button class="dock-btn" onclick="submitChat()">傳送</button>
        </div>
    </div>

    <script>
        const CF_GATEWAY = "https://hidden-surf-0579.love7053150.workers.dev/";
        const scroller = document.getElementById('chat-scroller');
        const thread = document.getElementById('chat-thread');
        const input = document.getElementById('chat-input');

        const SYSTEM_PROMPT = `你是單車專家。請嚴格遵守以下格式：
如果是給「行程規劃」，必須包含 ### 📅 路線排程, ### 🎒 裝備清單, ### ⚠️ 實戰守則。
每個標題後必須換行。每個清單項必須使用「- **名稱**：描述」。
文字要精簡，避免廢話語助詞。`;

        function iv(id, v) { document.getElementById(id).value = v; }

        function scrollBottom() {
            // 使用 setTimeout 確保內容已完全渲染後才滾動
            setTimeout(() => {
                scroller.scrollTo({ top: scroller.scrollHeight + 500, behavior: 'smooth' });
            }, 100);
        }

        function addMessage(role, content, raw = false) {
            const m = document.createElement('div');
            m.className = `msg ${role}`;
            m.innerHTML = `<div class="bubble">${raw ? content : marked.parse(content)}</div>`;
            thread.appendChild(m);
            scrollBottom();
            return m;
        }

        // 重寫 Tab 渲染邏輯，修正 \n 與分段問題
        function renderTabs(rawText) {
            // 解決不同平台換行符號問題，先統一轉為 \n
            const text = rawText.replace(/\r\n/g, '\n');
            const sections = text.split(/### /);

            if (sections.length <= 1) return marked.parse(text);

            let tabsNav = `<div class="tabs-container"><div class="tabs-nav">`;
            let tabsContent = `</div><div class="tabs-content">`;
            let count = 0;

            sections.forEach(sec => {
                if (!sec.trim()) return;

                // 找到第一行作為標題
                const lines = sec.split('\n');
                const title = lines[0].trim();
                const body = lines.slice(1).join('\n').trim();

                const active = count === 0 ? 'active' : '';
                let typeClass = '';
                if (title.includes('裝備')) typeClass = 'equipment-grid';
                if (title.includes('守則') || title.includes('注意')) typeClass = 'notes-grid';

                tabsNav += `<button class="tab-btn ${active}" onclick="switchTab(this, ${count})">${title}</button>`;
                tabsContent += `<div class="tab-pane ${active} ${typeClass}" data-index="${count}">${marked.parse(body)}</div>`;
                count++;
            });

            return tabsNav + tabsContent + `</div></div>`;
        }

        window.switchTab = function (btn, idx) {
            const con = btn.closest('.tabs-container');
            con.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            con.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
            con.querySelector(`.tab-pane[data-index="${idx}"]`).classList.add('active');
        };

        async function submitForm() {
            const s = document.getElementById('start').value;
            const e = document.getElementById('end').value;
            const d = document.getElementById('days').value;
            if (!s || !e || !d) return alert("請填好規劃條件喔！");
            addMessage('user', `📍 從 ${s} 到 ${e}，騎乘 ${d} 天，請給我專業建議。`);
            await callAI(`規劃：${s} 到 ${e}，${d}天。`);
        }

        async function submitChat() {
            const v = input.value.trim();
            if (!v) return;
            input.value = '';
            addMessage('user', v);
            await callAI(v);
        }

        async function callAI(q) {
            const loader = document.createElement('div');
            loader.className = 'msg ai';
            loader.innerHTML = `<div class="bubble"><div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>`;
            thread.appendChild(loader);
            scrollBottom();

            try {
                const res = await fetch(CF_GATEWAY, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: SYSTEM_PROMPT + "\n需求：" + q }] }] })
                });
                const data = await res.json();
                loader.remove();
                const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || "抱歉，連線失敗。";
                addMessage('ai', renderTabs(reply), true);
            } catch (e) {
                loader.remove();
                addMessage('ai', "連線錯誤，請檢查網路。");
            }
        }
    </script>
</body>

</html>
