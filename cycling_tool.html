<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Road Master | 單車智慧導航</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=Noto+Sans+TC:wght@400;500;700;900&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --p: #f97316;
            --p-light: #fdba74;
            --bg: #030712;
            --c: #1e293b;
            --t: #f1f5f9;
            --m: #94a3b8;
            --border: rgba(255, 255, 255, 0.08);
            --glass: rgba(30, 41, 59, 0.7);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', 'Noto Sans TC', sans-serif;
        }

        body {
            background: var(--bg);
            color: var(--t);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background-image:
                radial-gradient(circle at 0% 0%, rgba(249, 115, 22, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 100% 100%, rgba(56, 189, 248, 0.05) 0%, transparent 40%);
        }

        /* Header */
        header {
            padding: 1rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(3, 7, 18, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            z-index: 100;
        }

        .logo {
            font-weight: 900;
            font-size: 1.25rem;
            color: var(--p);
            letter-spacing: 0.5px;
        }

        /* Main Chat Area */
        main {
            flex: 1;
            overflow-y: auto;
            padding: 2rem 1.5rem 240px;
            scroll-behavior: smooth;
        }

        #chat-thread {
            max-width: 900px;
            /* 增加寬度以顯示更多表格內容 */
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 2.5rem;
            width: 100%;
        }

        /* Message Bubbles - 強化 OCD 對齊 */
        .msg {
            display: flex;
            flex-direction: column;
            animation: fadeIn 0.3s ease-out;
            width: 100%;
        }

        .msg.user {
            align-items: flex-end;
        }

        .msg.ai {
            align-items: center;
        }

        /* 強制 AI 報表置中對齊 */

        .bubble {
            max-width: 100%;
            padding: 1.5rem;
            border-radius: 20px;
            line-height: 1.7;
            font-size: 1rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            width: 100%;
            position: relative;
        }

        .msg.user .bubble {
            max-width: 85%;
            background: var(--p);
            color: #fff;
            border-bottom-right-radius: 4px;
            font-weight: 600;
            padding: 1rem 1.5rem;
            box-shadow: 0 4px 15px rgba(249, 115, 22, 0.3);
        }

        .msg.ai .bubble {
            background: var(--glass);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
            backdrop-filter: blur(15px);
            color: var(--t);
        }

        /* 表格排版高度優化 */
        .bubble table {
            width: 100%;
            border-collapse: collapse;
            margin: 1.5rem 0;
            font-size: 0.9rem;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .bubble th {
            background: rgba(249, 115, 22, 0.2);
            color: var(--p-light);
            padding: 15px 12px;
            text-align: left;
            font-weight: 800;
            border-bottom: 2px solid var(--p);
        }

        .bubble td {
            padding: 15px 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            vertical-align: top;
            color: #cbd5e1;
        }

        .bubble tr:last-child td {
            border-bottom: none;
        }

        .bubble tr:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        .bubble strong {
            color: var(--p-light);
            font-weight: 800;
            background: rgba(249, 115, 22, 0.1);
            padding: 0 4px;
            border-radius: 4px;
        }

        /* 卡片網格模組 - OCD 完美網格 */
        .tab-pane.grid-layout ul {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 20px;
            padding: 0;
            list-style: none;
            margin: 0;
        }

        .tab-pane.grid-layout li {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .tab-pane.grid-layout li:hover {
            border-color: var(--p);
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.4);
        }

        .tab-pane.grid-layout li strong {
            display: block;
            font-size: 1.2rem;
            margin-bottom: 10px;
            color: var(--p);
            border-bottom: 2px solid rgba(249, 115, 22, 0.2);
            padding-bottom: 8px;
            background: none;
            padding-left: 0;
        }

        /* Tab System - 旗艦級設計 */
        .tabs-container {
            background: rgba(15, 23, 42, 0.3);
            border: 1px solid var(--border);
            border-radius: 18px;
            overflow: hidden;
            margin-top: 1rem;
            width: 100%;
        }

        .tabs-nav {
            display: flex;
            background: rgba(0, 0, 0, 0.7);
            border-bottom: 1px solid var(--border);
            overflow-x: auto;
            scrollbar-width: none;
        }

        .tabs-nav::-webkit-scrollbar {
            display: none;
        }

        .tab-btn {
            flex: 1;
            background: transparent;
            color: var(--m);
            border: none;
            padding: 18px 15px;
            font-size: 1rem;
            font-weight: 900;
            cursor: pointer;
            white-space: nowrap;
            border-bottom: 4px solid transparent;
            min-width: 150px;
            transition: all 0.3s;
        }

        .tab-btn.active {
            color: var(--p);
            border-bottom-color: var(--p);
            background: rgba(249, 115, 22, 0.1);
        }

        .tab-pane {
            display: none;
            padding: 2rem;
            animation: fadeIn 0.4s ease-out;
        }

        .tab-pane.active {
            display: block;
        }

        /* Form Card */
        .plan-card {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 1.75rem;
            border-radius: 20px;
            margin-top: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .form-row {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .form-label {
            font-size: 0.9rem;
            font-weight: 800;
            color: var(--p-light);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .quick-chips {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .chip {
            background: #334155;
            color: #cbd5e1;
            padding: 5px 14px;
            border-radius: 50px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid transparent;
        }

        .chip:hover {
            background: var(--p);
            color: #fff;
            border-color: var(--p-light);
        }

        .form-input {
            background: #0f172a;
            border: 1px solid #334155;
            color: #fff;
            padding: 14px;
            border-radius: 12px;
            font-size: 1rem;
            outline: none;
            transition: 0.2s;
        }

        .form-input:focus {
            border-color: var(--p);
            box-shadow: 0 0 10px rgba(249, 115, 22, 0.2);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--p), #f97316);
            color: #fff;
            border: none;
            padding: 16px;
            border-radius: 14px;
            font-weight: 900;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 8px 20px rgba(249, 115, 22, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 25px rgba(249, 115, 22, 0.6);
        }

        /* Input Panel */
        .dock {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 1.5rem 2rem 2.5rem;
            background: linear-gradient(transparent, var(--bg) 50%);
            z-index: 200;
            pointer-events: none;
        }

        .dock-bar {
            width: 100%;
            max-width: 850px;
            margin: 0 auto;
            background: #1e293b;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 24px;
            padding: 8px 12px;
            display: flex;
            align-items: center;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.8);
            pointer-events: auto;
        }

        .dock-input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            padding: 12px;
            font-size: 1.05rem;
            outline: none;
        }

        .dock-btn {
            background: var(--p);
            color: white;
            border: none;
            padding: 0 24px;
            height: 48px;
            border-radius: 18px;
            font-weight: 900;
            cursor: pointer;
            transition: 0.2s;
        }

        .dock-btn:hover {
            background: #ea580c;
            transform: scale(1.05);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(15px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

    <header>
        <div class="logo">ROAD MASTER</div>
        <div style="font-size:0.85rem; color:var(--m); font-weight:700;">AI 進階單車護照</div>
    </header>

    <main id="chat-scroller">
        <div id="chat-thread">
            <div class="msg ai">
                <div class="bubble">
                    <p>🚵 您好！準備好產出您的戰術級單車規劃報告了嗎？</p>
                    <p style="color:var(--m); font-size:0.9rem;">請在下方表單輸入起訖點與天數，我將為您算繪高精細度的「動態地圖與行程卡片」。</p>
                    <div class="plan-card">
                        <div class="form-row">
                            <div class="form-label"><span>📍 起點</span>
                                <div class="quick-chips"><span class="chip" onclick="iv('start','台北火車站')">台北</span><span
                                        class="chip" onclick="iv('start','新竹高鐵站')">新竹</span></div>
                            </div>
                            <input type="text" id="start" class="form-input" placeholder="例如：台北火車站">
                        </div>
                        <div class="form-row">
                            <div class="form-label"><span>🏁 目的地</span>
                                <div class="quick-chips"><span class="chip" onclick="iv('end','恆春古城')">恆春</span><span
                                        class="chip" onclick="iv('end','環島一圈')">環島</span></div>
                            </div>
                            <input type="text" id="end" class="form-input" placeholder="例如：恆春古城">
                        </div>
                        <div class="form-row">
                            <div class="form-label"><span>⏱️ 騎乘天數</span>
                                <div class="quick-chips"><span class="chip" onclick="iv('days','3天')">3天</span><span
                                        class="chip" onclick="iv('days','9天')">9天</span></div>
                            </div>
                            <input type="text" id="days" class="form-input" placeholder="預計騎乘天數">
                        </div>
                        <button class="btn-primary" onclick="submitForm()">🚀 啟動高精細度規劃分析</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div class="dock">
        <div class="dock-bar">
            <input type="text" id="chat-input" class="dock-input" placeholder="詢問裝備重點、單車維修或特定路況..."
                onkeypress="if(event.key==='Enter')submitChat()">
            <button class="dock-btn" onclick="submitChat()">傳送</button>
        </div>
    </div>

    <script>
        const CF_GATEWAY = "https://hidden-surf-0579.love7053150.workers.dev/";
        const scroller = document.getElementById('chat-scroller');
        const thread = document.getElementById('chat-thread');
        const input = document.getElementById('chat-input');

        const SYSTEM_PROMPT = `你是資深單車顧問。嚴禁廢話前言或總結。
當收到規劃需求時，必須產出以下三個標題：

### 📅 詳細路線與環境分析
必須呈現為 Markdown 表格，表格欄位如下：
1. **天數**
2. **路線路段** (明確的起訖地點)
3. **數據** (公里數/預估爬升)
4. **景點與活動** (請詳細說明該路段可以幹嘛、值得停留的風景、補給名店、特殊地標)
5. **挑戰與提醒** (在此詳細標註：挑戰等級、是否陡坡、逆風區、路況注意事項、交通風險)

### 🎒 建議裝備清單
(格式：- **裝備名稱**：功能說明與建議)

### ⚠️ 核心實戰提醒
(格式：- **重點標題**：具體分析與應對方案)

如果是普通問答，保持專業精簡，並使用 Markdown 結構化。`;

        function iv(id, v) { document.getElementById(id).value = v; }

        function scrollBottom() {
            setTimeout(() => {
                scroller.scrollTo({ top: scroller.scrollHeight + 500, behavior: 'smooth' });
            }, 350);
        }

        function addMessage(role, content, raw = false) {
            const m = document.createElement('div');
            m.className = `msg ${role}`;
            m.innerHTML = `<div class="bubble">${raw ? content : marked.parse(content)}</div>`;
            thread.appendChild(m);
            scrollBottom();
            return m;
        }

        // 智能解析：過濾非標題贅詞，直接從第一個 ### 開始
        function renderTabs(rawContent) {
            const cleanText = rawContent.replace(/\\n/g, '\n');

            // 分割內容，並確保只保留包含 ### 的部分
            const firstHeaderIndex = cleanText.indexOf('### ');
            if (firstHeaderIndex === -1) return marked.parse(cleanText);

            const meaningfulContent = cleanText.substring(firstHeaderIndex);
            const sections = meaningfulContent.split(/\n?(?=### )/);

            let tabsNav = `<div class="tabs-container"><div class="tabs-nav">`;
            let tabsContent = `</div><div class="tabs-content">`;
            let count = 0;

            sections.forEach(sec => {
                const trimmed = sec.trim();
                if (!trimmed) return;

                const firstLineEnd = trimmed.indexOf('\n');
                let title = "分析說明";
                let body = trimmed;

                if (trimmed.startsWith('###')) {
                    if (firstLineEnd !== -1) {
                        title = trimmed.substring(0, firstLineEnd).replace(/###\s*/, '').trim();
                        body = trimmed.substring(firstLineEnd).trim();
                    } else {
                        title = trimmed.replace(/###\s*/, '').trim();
                        body = "";
                    }
                } else return; // 跳過非標題區塊

                const active = count === 0 ? 'active' : '';
                let layoutClass = '';
                if (title.match(/裝備|清單|提示|提醒|守則/)) layoutClass = 'grid-layout';

                tabsNav += `<button class="tab-btn ${active}" onclick="switchTab(this, ${count})">${title}</button>`;
                tabsContent += `<div class="tab-pane ${active} ${layoutClass}" data-index="${count}">${marked.parse(body)}</div>`;
                count++;
            });

            if (count === 0) return marked.parse(cleanText);

            return tabsNav + tabsContent + `</div></div>`;
        }

        window.switchTab = function (btn, idx) {
            const con = btn.closest('.tabs-container');
            con.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            con.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
            con.querySelector(`.tab-pane[data-index="${idx}"]`).classList.add('active');
        };

        async function submitForm() {
            const s = document.getElementById('start').value;
            const e = document.getElementById('end').value;
            const d = document.getElementById('days').value;
            if (!s || !e || !d) return alert("請填寫起點、終點與預計天數！");
            addMessage('user', `📍 從 **${s}** 出發，騎到 **${e}**，預計 **${d}** 完成。請產出戰術分析報告。`);
            await callAI(`詳細規劃：${s} 到 ${e}，${d}。務必包含景點與坡度挑戰分析。`);
        }

        async function submitChat() {
            const v = input.value.trim();
            if (!v) return;
            input.value = '';
            addMessage('user', v);
            await callAI(v);
        }

        async function callAI(q) {
            const loader = document.createElement('div');
            loader.className = 'msg ai';
            loader.innerHTML = `<div class="bubble" style="max-width:80px; padding:10px;"><div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>`;
            thread.appendChild(loader);
            scrollBottom();

            try {
                const res = await fetch(CF_GATEWAY, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: SYSTEM_PROMPT + "\n\n目前需求：" + q }] }] })
                });
                const data = await res.json();
                loader.remove();
                const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || "連線失敗。";
                addMessage('ai', renderTabs(reply), true);
            } catch (e) {
                loader.remove();
                addMessage('ai', "連線錯誤，請檢查網路。");
            }
        }
    </script>
</body>

</html>
